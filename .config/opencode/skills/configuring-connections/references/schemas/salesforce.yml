Salesforce:
  type: object
  description: |
    Configuration for Salesforce CRM connections. Used when the connection type is "salesforce".

    Salesforce connections authenticate via OAuth 2.0 with two supported flows:
    - JWT Bearer Token — server-to-server auth using a Salesforce Connected App. Recommended for automated integrations.
    - Refresh Token — interactive OAuth flow where the user authorizes via browser. Good for user-context integrations.

    ## REQUIRED FIELDS BY FLOW TYPE
    - oauth2FlowType "jwtBearerToken": username (Salesforce username of the authorized user)
    - oauth2FlowType "refreshToken": refreshToken (obtained via browser-based OAuth flow)

    ## SANDBOX VS PRODUCTION
    Set sandbox to true for Salesforce sandbox orgs. This changes the login endpoint
    from login.salesforce.com to test.salesforce.com.
  properties:
    sandbox:
      type: boolean
      description: |
        Whether this connection targets a Salesforce sandbox environment.

        - true — Uses test.salesforce.com for authentication.
        - false — Uses login.salesforce.com for authentication (production).

        Must match the actual Salesforce org type — using the wrong setting will
        cause authentication to fail.
      default: false
    baseURI:
      type: string
      description: |
        Custom Salesforce instance URL. Overrides the default login URL.

        Normally auto-discovered during OAuth authentication. Only set this to
        force a specific instance URL (e.g., "https://mycompany.my.salesforce.com").
      format: uri
    oauth2FlowType:
      type: string
      enum:
        - jwtBearerToken
        - refreshToken
      description: |
        OAuth 2.0 authentication flow type.

        - "jwtBearerToken" — Server-to-server JWT Bearer Token flow. Does not require
          user interaction. Requires a Salesforce Connected App with a digital certificate,
          and the username field must be set to the authorized Salesforce user.
        - "refreshToken" — Authorization Code / Refresh Token flow. Requires initial
          browser-based authorization, then uses the refresh token for ongoing access.

        Choose "jwtBearerToken" for automated server-to-server integrations.
        Choose "refreshToken" for integrations that operate in a specific user's context.
    username:
      type: string
      description: |
        Salesforce username for JWT Bearer Token authentication.
        REQUIRED when oauth2FlowType is "jwtBearerToken".

        This is the Salesforce login username (email) of the user whose permissions
        the integration will operate under.
    bearerToken:
      type: string
      description: |
        OAuth access/bearer token (encrypted at rest).
        Typically auto-managed by the system during OAuth flows. Rarely set manually.
      writeOnly: true
    refreshToken:
      type: string
      description: |
        OAuth refresh token (encrypted at rest). REQUIRED when oauth2FlowType is "refreshToken".
        Obtained during the initial browser-based OAuth authorization flow.
      writeOnly: true
    packagedOAuth:
      type: boolean
      description: |
        When true, uses Celigo's pre-configured Connected App for OAuth.
        When false, you must provide your own Connected App credentials via iClient.
      default: false
    scope:
      type: array
      items:
        type: string
      description: |
        OAuth scopes to request during authorization. Controls the level of access granted.

        Common scopes:
        - "full" — Full access to all Salesforce APIs.
        - "refresh_token" — Allows obtaining refresh tokens for long-lived access.
        - "api" — Access to REST and SOAP APIs.

        Defaults to ["full", "refresh_token"] which provides complete API access.
      default: ["full", "refresh_token"]
    concurrencyLevel:
      type: number
      description: |
        Maximum number of concurrent API requests to Salesforce.
        Salesforce enforces per-org API request limits. Setting this too high
        may exhaust your org's API call allocation faster.
      minimum: 1
      maximum: 25
      default: 5
    targetConcurrencyLevel:
      type: number
      description: |
        Target concurrency level for auto-scaling. The system adjusts concurrency
        between 1 and this value based on rate limit feedback from Salesforce.
      minimum: 1
      maximum: 25
