    expressionAttributeNames:
      type: string
      description: |-
        expressionAttributeNames is a map of substitution tokens used to safely reference attribute names within DynamoDB expressions. This property allows you to define placeholder tokens for attribute names that might otherwise cause conflicts due to being reserved words, containing special characters, or having names that are dynamically generated. By using these placeholders, you can avoid syntax errors and ambiguities in expressions such as ProjectionExpression, FilterExpression, UpdateExpression, and ConditionExpression, ensuring your queries and updates are both valid and maintainable.

        ## FIELD BEHAVIOR:
        - Functions as a dictionary where each key is a placeholder token starting with a '#' character, and each value is the actual attribute name it represents.
        - Enables the use of reserved words, special characters, or otherwise problematic attribute names within DynamoDB expressions.
        - Supports complex expressions by allowing multiple attribute name substitutions within a single expression.
        - Prevents syntax errors and improves clarity by explicitly mapping placeholders to attribute names.
        - Applies only within the scope of the expression where it is defined, ensuring localized substitution without affecting other parts of the request.

        ## IMPLEMENTATION GUIDANCE:
        - Always prefix keys with a '#' to clearly indicate they are substitution tokens.
        - Ensure each placeholder token is unique within the scope of the expression to avoid conflicts.
        - Use expressionAttributeNames whenever attribute names are reserved words, contain special characters, or are dynamically generated.
        - Combine with expressionAttributeValues when expressions require both attribute name and value substitutions.
        - Verify that the attribute names used as values exactly match those defined in your DynamoDB table schema to prevent runtime errors.
        - Keep the mapping concise and relevant to the attributes used in the expression to maintain readability.
        - Avoid overusing substitution tokens for attribute names that do not require it, to keep expressions straightforward.

        ## EXAMPLES:
        - `{"#N": "Name", "#A": "Age"}` to substitute attribute names "Name" and "Age" in an expression.
        - `{"#status": "Status"}` when "Status" is a reserved word or needs escaping in an expression.
        - `{"#yr": "Year", "#mn": "Month"}` for expressions involving multiple date-related attributes.
        - `{"#addr": "Address", "#zip": "ZipCode"}` to handle attribute names with special characters or spaces.
        - `{"#P": "Price", "#Q": "Quantity"}` used in an UpdateExpression to increment numeric attributes.

        ## IMPORTANT NOTES:
        - Keys must always begin with the '#' character; otherwise, the substitution
    expressionAttributeValues:
      type: string
      description: |-
        expressionAttributeValues is a map of substitution tokens for attribute values used within DynamoDB expressions. These tokens serve as placeholders that safely inject values into expressions such as ConditionExpression, FilterExpression, UpdateExpression, and KeyConditionExpression. By separating data from code, this mechanism prevents injection attacks and syntax errors, ensuring secure and reliable query and update operations. Each key in this map is a placeholder string that begins with a colon (":"), and each corresponding value is a DynamoDB attribute value object representing the actual data to be used in the expression. This design enforces that user input is never directly embedded into expressions, enhancing both security and maintainability.

        ## FIELD BEHAVIOR:
        - Contains key-value pairs where keys are placeholders prefixed with a colon (e.g., ":val1") used within DynamoDB expressions.
        - Each key maps to a DynamoDB attribute value object specifying the data type and value, supporting all DynamoDB data types including strings, numbers, binaries, lists, maps, sets, and booleans.
        - Enables safe and dynamic substitution of attribute values in expressions, avoiding direct string concatenation and reducing the risk of injection vulnerabilities.
        - Mandatory when expressions reference attribute values to ensure correct parsing and execution of queries or updates.
        - Placeholders are case-sensitive and must exactly match those used in the corresponding expressions.
        - Supports complex data structures, allowing nested maps and lists as attribute values for advanced querying scenarios.

        ## IMPLEMENTATION GUIDANCE:
        - Always prefix placeholder keys with a colon (":") to clearly identify them as substitution tokens within expressions.
        - Ensure every placeholder referenced in an expression has a corresponding entry in expressionAttributeValues to avoid runtime errors.
        - Format each value according to DynamoDB’s attribute value specification, such as { "S": "string" }, { "N": "123" }, { "BOOL": true }, or complex nested structures.
        - Avoid using reserved words, spaces, or invalid characters in placeholder names to prevent syntax errors and conflicts.
        - Validate that the data types of values align with the expected attribute types defined in the table schema to maintain data integrity.
        - When multiple expressions are used simultaneously, maintain unique and consistent placeholder names to prevent collisions and ambiguity.
        - Use expressionAttributeValues in conjunction with expressionAttributeNames when attribute names are reserved words or contain special characters to ensure proper expression parsing.
        - Consider the size limitations of expressionAttributeValues to avoid exceeding DynamoDB’s request size limits.

