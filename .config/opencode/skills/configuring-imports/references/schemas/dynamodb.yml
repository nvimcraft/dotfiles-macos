    ignoreExtract:
      type: string
      description: "Specifies whether the extraction process from DynamoDB data should be ignored or skipped during the operation,\
        \ enabling conditional control over data retrieval to optimize performance, reduce latency, or avoid redundant processing\
        \ in data workflows. This flag allows systems to bypass the extraction step when data is already available, cached,\
        \ or deemed unnecessary for the current operation, thereby improving efficiency and resource utilization.  \n## FIELD\
        \ BEHAVIOR:  \n- When set to true, the extraction of data from DynamoDB is completely bypassed, preventing any data\
        \ retrieval from the source.  \n- When set to false or omitted, the extraction process proceeds as normal, retrieving\
        \ data for further processing.  \n- Primarily used to optimize workflows by skipping unnecessary extraction steps\
        \ when data is already available or not needed.  \n- Influences the flow of data processing by controlling whether\
        \ DynamoDB data is fetched or not.  \n- Affects downstream processing by potentially providing no new data input if\
        \ extraction is skipped.  \n## IMPLEMENTATION GUIDANCE:  \n- Accepts a boolean value: true to skip extraction, false\
        \ to perform extraction.  \n- Ensure that downstream components can handle scenarios where no data is extracted due\
        \ to this flag being true.  \n- Validate input to avoid unintended skipping of extraction that could cause data inconsistencies\
        \ or stale results.  \n- Use this flag judiciously, especially in complex pipelines where data dependencies exist,\
        \ to prevent breaking data integrity.  \n- Incorporate appropriate logging or monitoring to track when extraction\
        \ is skipped for auditability and debugging.  \n## EXAMPLES:  \n- ignoreExtract: true — extraction from DynamoDB is\
        \ skipped, useful when data is cached or pre-fetched.  \n- ignoreExtract: false — extraction occurs normally, retrieving\
        \ fresh data from DynamoDB.  \n- omit the property entirely — defaults to false, extraction proceeds as usual.  \n\
        ## IMPORTANT NOTES:  \n- Skipping extraction may result in incomplete, outdated, or stale data if subsequent operations\
        \ rely on fresh DynamoDB data.  \n- This option should only be enabled when you are certain that extraction is unnecessary\
        \ or redundant to avoid data inconsistencies.  \n- Consider the impact on data integrity, consistency, and downstream\
        \ processing before enabling this flag.  \n- Misuse can lead to errors, unexpected behavior, or data quality issues\
        \ in data workflows.  \n- Ensure that any caching or alternative data sources used in place of extraction are reliable\
        \ and up-to-date.  \n## DEPENDENCY CHAIN:  \n- Requires a valid DynamoDB data source configuration to be relevant.\
        \  \n-"
