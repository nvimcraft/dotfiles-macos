        overrideMergeQuery:
          type: boolean
          description: |-
            A custom SQL query string that fully overrides the default merge operation executed during bulk load processes in a relational database management system (RDBMS). This property empowers users to define precise, tailored merge logic that governs how records are inserted, updated, or deleted in the target database table when handling large-scale data operations. By specifying this query, users can implement complex matching conditions, custom conflict resolution strategies, additional filtering criteria, or conditional logic that surpasses the system-generated default behavior, ensuring the bulk load aligns perfectly with specific business rules, data integrity requirements, or performance optimizations.

            ## FIELD BEHAVIOR:
            - When provided, this query completely replaces the standard merge statement used in bulk load operations.
            - Supports detailed customization of merge logic, including custom join conditions, conditional updates, selective inserts, and optional deletes.
            - If omitted, the system automatically generates and executes a default merge query based on the schema, keys, and data mappings.
            - The query must be syntactically compatible with the target RDBMS and support any required parameterization for dynamic data injection.
            - Executed within the transactional context of the bulk load to maintain atomicity, consistency, and rollback capabilities in case of failure.
            - The system expects the query to handle all necessary merge scenarios to avoid partial or inconsistent data states.
            - Overrides apply globally for the bulk load operation, affecting all records processed in that batch.

            ## IMPLEMENTATION GUIDANCE:
            - Validate the custom SQL syntax thoroughly before execution to prevent runtime errors and ensure compatibility with the target RDBMS.
            - Ensure the query comprehensively addresses all required merge operations—insert, update, and optionally delete—to maintain data integrity.
            - Support parameter placeholders or bind variables if the system injects dynamic values during execution, and document their usage clearly.
            - Provide users with clear documentation, templates, or examples outlining the expected query structure, required clauses, and best practices.
            - Implement robust safeguards against SQL injection and other security vulnerabilities when accepting and executing custom queries.
            - Test the custom query extensively in a controlled staging environment to verify correctness, performance, and side effects before deploying to production.
            - Consider transaction isolation levels and locking behavior to avoid deadlocks or contention during bulk load operations.
            - Encourage users to include comprehensive error handling and logging within the query or surrounding execution context to facilitate troubleshooting.

