        If `queryType` is `["per_record"]` (for standard inserts, updates, or upserts), this object MUST be omitted/null.
        
        This object defines the specific settings (table name, batch size) required to execute an optimized bulk load. It overrides standard SQL query behavior.
        
        ## FIELD BEHAVIOR:
        - Enables batch insertion of multiple records into a database table within a single operation to improve efficiency and throughput.
        - Controls parameters such as batch size, transaction handling (atomicity), error management, conflict resolution, and data validation during bulk inserts.
        - Supports options for handling duplicate keys, upserts (insert or update), and pre-insertion data validation to maintain data integrity.
        - Improves overall performance by reducing the frequency of database round-trips and minimizing transaction overhead.
        - Allows configuration of commit frequency and transaction boundaries to balance durability, consistency, and performance.
        - Provides mechanisms to handle partial failures gracefully, including rollback strategies or continuation with error logging.
        - Accommodates database-specific features and limitations, such as handling triggers, constraints, and locking behavior during bulk operations.
        - Supports customization to align with different RDBMS bulk insert protocols and optimizations, ensuring compatibility and maximizing throughput.
        
        ## IMPLEMENTATION GUIDANCE:
        - **REQUIRED ONLY** when `queryType` is `["bulk_insert"]`.
        - Configure batch size carefully to balance memory consumption, network overhead, and database performance; avoid excessively large batches that may cause resource exhaustion.
        - Specify transactional behavior to ensure atomicity when required, preventing partial data commits and maintaining consistency.
        - Implement comprehensive error handling to detect, log, and respond to failures during bulk operations, including retry or abort strategies.
        - Validate data against schema constraints, business rules, and referential integrity before insertion to prevent runtime errors and data corruption.
        - Utilize native bulk insert features or APIs provided by the target RDBMS for optimal throughput and compatibility.
        - Consider disabling or adjusting bulk insert settings for tables with triggers, foreign key constraints, or dependencies that require row-level processing.
        - Monitor system resource utilization and performance metrics continuously, adjusting parameters dynamically to optimize throughput and stability.
        - Test bulk insert configurations under realistic workloads to identify bott
    bulkLoad:
      type: object
      properties:
        tableName:
          type: string
          description: |-
            The name of the target table within the relational database management system (RDBMS) where the bulk load operation will insert, update, or merge data. This property specifies the exact destination table for the bulk data operation and must correspond to a valid, existing table in the database schema. It can include schema qualifiers if supported by the database (e.g., schema.tableName), and must adhere to the naming conventions and case sensitivity rules of the target RDBMS. Proper specification of this property is critical to ensure data is loaded into the correct location without errors or unintended data modification. Accurate definition of the table name helps maintain data integrity and prevents operational failures during bulk load processes.

            ## FIELD BEHAVIOR:
            - Identifies the specific table in the database to receive the bulk-loaded data.
            - Must reference an existing table accessible with the current database credentials.
            - Supports schema-qualified names where applicable (e.g., schema.tableName).
            - Used as the target for insert, update, or merge operations during bulk load.
            - Case sensitivity and naming conventions depend on the underlying database system.
            - Determines the scope and context of the bulk load operation within the database.
            - Influences transactional behavior, locking, and concurrency controls during the operation.

            ## IMPLEMENTATION GUIDANCE:
            - Verify the target table exists and the executing user has sufficient permissions for data modification.
            - Ensure the table name respects the case sensitivity and naming rules of the RDBMS.
            - Avoid reserved keywords or special characters unless properly escaped or quoted according to database requirements.
            - Support fully qualified names including schema or database prefixes if required to avoid ambiguity.
            - Validate compatibility between the table schema and the incoming data to prevent type mismatches or constraint violations.
            - Consider transactional behavior, locking, and concurrency implications on the target table during bulk load.
            - Test the bulk load operation in a development or staging environment to confirm correct table targeting.
            - Implement error handling to catch and report issues related to invalid or inaccessible table names.

            ## EXAMPLES:
            - "customers"
            - "sales_data_2024"
            - "public.orders"
            - "inventory.products"
            - "dbo.EmployeeRecords"

            ## IMPORTANT NOTES:
            - Incorrect or misspelled table names will cause the bulk load operation to fail.
            - The target table schema must be compatible with the incoming data structure to avoid errors.
            - Bulk loading may overwrite, append, or merge data depending on the load mode; ensure this aligns with business requirements.
            - Some databases require quoting or escaping of table names, especially if they
