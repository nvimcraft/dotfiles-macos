Rdbms:
  type: object
  description: |
    Configuration for RDBMS import operations. Used for database imports into SQL Server, MySQL, PostgreSQL, Snowflake, Oracle, MariaDB, and other relational databases.

    ## QUERY TYPE DETERMINES WHICH FIELDS ARE REQUIRED

    | queryType          | Required fields                | Do NOT set        |
    |--------------------|--------------------------------|-------------------|
    | ["per_record"]     | query (array of SQL strings)   | bulkInsert        |
    | ["per_page"]       | query (array of SQL strings)   | bulkInsert        |
    | ["bulk_insert"]    | bulkInsert object              | query             |
    | ["bulk_load"]      | bulkLoad object                | query             |

    ## CRITICAL: query IS AN ARRAY OF STRINGS
    The query field must be an array of plain strings, NOT a single string and NOT an array of objects.
    Correct: ["MERGE INTO target USING ..."]
    Wrong: "MERGE INTO target ..."
    Wrong: [{"query": "MERGE INTO target ..."}]
  properties:
    lookups:
      type: string
      nullable: true
      description: |-
        A collection of predefined reference data sets or key-value pairs designed to standardize, validate, and streamline input values across the application. These lookup entries serve as a centralized repository of commonly used values, enabling consistent data entry, minimizing errors, and facilitating efficient data retrieval and processing. They are essential for populating user interface elements such as dropdown menus, autocomplete fields, and for enforcing validation rules within business logic. Lookup data can be static or dynamically updated, and may support localization to accommodate diverse user bases. Additionally, lookups often include metadata such as descriptions, effective dates, and status indicators to provide context and support lifecycle management. They play a critical role in maintaining data integrity, enhancing user experience, and ensuring interoperability across different system modules and external integrations.

        ## FIELD BEHAVIOR:
        - Contains structured sets of reference data including codes, labels, enumerations, or mappings.
        - Drives UI components by providing selectable options and autocomplete suggestions.
        - Ensures data consistency by standardizing input values across different modules.
        - Supports both static and dynamic updates to reflect changes in business requirements.
        - May include metadata like descriptions, effective dates, or status indicators for enhanced context.
        - Facilitates localization and internationalization to support multiple languages and regions.
        - Enables validation logic by restricting inputs to predefined acceptable values.
        - Supports versioning to track changes and maintain historical data integrity.

        ## IMPLEMENTATION GUIDANCE:
        - Organize lookup data as dictionaries, arrays, or database tables for efficient access and management.
        - Implement caching strategies to optimize performance and reduce redundant data retrieval.
        - Enforce uniqueness and relevance of lookup entries within their specific contexts.
        - Provide robust mechanisms for updating, versioning, and extending lookup data without disrupting system stability.
        - Incorporate localization and internationalization support for user-facing lookup values.
        - Secure sensitive lookup data with appropriate access controls and auditing.
        - Design APIs or interfaces for easy retrieval and management of lookup data.
        - Ensure synchronization of lookup data across distributed systems or microservices.

        ## EXAMPLES:
        - Country codes and names: {"US": "United States", "CA": "Canada", "MX": "Mexico"}
        - Status codes representing entity states: {"1": "Active", "2": "Inactive", "3": "Pending"}
        - Product categories for e-commerce platforms: {"ELEC": "Electronics", "FASH": "Fashion", "HOME": "Home & Garden"}
        - Payment methods: {"CC": "Credit Card", "PP": "PayPal", "BT":
    query:
      type: array
      items:
        type: string
      description: |
        Array of SQL query strings to execute. REQUIRED when queryType is ["per_record"], ["per_page"], or ["first_page"].

        Each element is a complete SQL statement as a plain string. Typically contains a single query.

        Use Handlebars to inject values from incoming records. RDBMS queries REQUIRE the `record.` prefix and triple braces `{{{ }}}`.

        ## FORMAT — ARRAY OF STRINGS
        This field is an ARRAY OF STRINGS, not a single string and not an array of objects.
        - CORRECT: ["INSERT INTO users (name, email) VALUES ('{{{record.name}}}', '{{{record.email}}}')"]
        - WRONG: "INSERT INTO users ..."  (not an array)
        - WRONG: [{"query": "INSERT INTO users ..."}]  (objects are invalid — causes Cast error)
        - WRONG: ["INSERT INTO users (name) VALUES ('{{name}}')"]  (missing record. prefix — will produce empty values)

        ## CRITICAL: RDBMS HANDLEBARS SYNTAX
        - MUST use `record.` prefix: `{{{record.fieldName}}}`, NOT `{{{fieldName}}}`
        - MUST use triple braces `{{{ }}}` for value references — in RDBMS context, `{{record.field}}` outputs `'value'` (wrapped in single quotes), while `{{{record.field}}}` outputs `value` (raw). Triple braces give you control over quoting in your SQL.
        - Block helpers (`{{#each}}`, `{{#if}}`, `{{/each}}`) use double braces as normal.
        - Nested fields: `{{{record.properties.email}}}`

        ## EXAMPLES
        - INSERT: ["INSERT INTO customers (name, email) VALUES ('{{{record.name}}}', '{{{record.email}}}')"]
        - UPDATE: ["UPDATE inventory SET qty = {{{record.quantity}}} WHERE sku = '{{{record.sku}}}'"]
        - UPSERT (MySQL): ["INSERT INTO users (id, name) VALUES ({{{record.id}}}, '{{{record.name}}}') ON DUPLICATE KEY UPDATE name = '{{{record.name}}}'"]
        - MERGE (Snowflake): ["MERGE INTO target USING (SELECT '{{{record.email}}}' AS email) AS src ON target.email = src.email WHEN MATCHED THEN UPDATE SET name = '{{{record.name}}}' WHEN NOT MATCHED THEN INSERT (name, email) VALUES ('{{{record.name}}}', '{{{record.email}}}')"]

        ## STRING VS NUMERIC VALUES IN HANDLEBARS
        - Strings: wrap in single quotes — '{{{record.name}}}'
        - Numbers: no quotes — {{{record.quantity}}}
    queryType:
      type: array
      items:
        type: string
        enum:
        - INSERT
        - UPDATE
        - bulk_insert
        - per_record
        - per_page
        - first_page
        - bulk_load
      nullable: true
      description: |-
        Specifies the execution strategy for the SQL operation.
        
        **CRITICAL: This field DETERMINES whether `query` or `bulkInsert` is required.**

        ## PREFERENCE ORDER (use the highest-performance option the operation supports):

        1. **`["bulk_load"]`** — fastest. Stages data as a file then loads via COPY/bulk mechanism. Supports upsert via `primaryKeys`, and custom merge/ignore logic via `overrideMergeQuery`. **Currently Snowflake and NSAW; expanding to SQL Server, BigQuery, Redshift, and others.**
        2. **`["bulk_insert"]`** — batch INSERT via multi-row VALUES. No upsert/ignore logic. All RDBMS types.
        3. **`["per_page"]`** — one SQL statement per page of records. All RDBMS types.
        4. **`["per_record"]`** — one SQL statement per record. Full control over individual record SQL. All RDBMS types.

        Always prefer the highest option that satisfies the operation. `bulk_load` handles INSERT, UPSERT, and custom merge logic. `bulk_insert` is best for pure INSERTs when `bulk_load` isn't available. `per_page` handles custom SQL at batch level. `per_record` gives full control over individual record SQL.

        ## DECISION TREE (Follow in order):

        **STEP 1: Does the database support bulk_load?**
        - If Snowflake, NSAW, or another database with bulk_load support:
          → **USE `["bulk_load"]`** with:
            - `bulkLoad.tableName` (required)
            - `bulkLoad.primaryKeys` for upsert/merge (auto-generates MERGE)
            - `bulkLoad.overrideMergeQuery: true` for custom SQL (ignore-existing, conditional updates, multi-table ops). Override SQL references `{{import.rdbms.bulkLoad.preMergeTemporaryTable}}` for the staging table.
            - No `primaryKeys` for pure INSERT (auto-generates INSERT)

        **STEP 2: Database does NOT support bulk_load**
        - **Pure INSERT**: → **USE `["bulk_insert"]`** (requires `bulkInsert` object)
        - **UPDATE / UPSERT / custom matching logic**: → **USE `["per_page"]`** (requires `query` field). Only use `["per_record"]` if the logic truly cannot be expressed as a batch operation.
        
        ## CRITICAL RELATIONSHIP TO OTHER FIELDS:
        
        | queryType        | REQUIRES         | DO NOT SET       |
        |------------------|------------------|------------------|
        | `["per_record"]` | `query` field    | `bulkInsert`     |
        | `["bulk_insert"]`| `bulkInsert` obj | `query`          |
        
        ## DO NOT USE:
        - `["INSERT"]` or `["UPDATE"]` as standalone values
        - Multiple types combined
        
        ## EXAMPLES:
        
        ### INSERT with ignoreExisting (MUST use per_record)
        Prompt: "Import customers, ignore existing based on email"
        ```json
        "queryType": ["per_record"],
        "query": ["INSERT INTO customers (name, email) VALUES ('{{{record.name}}}', '{{{record.email}}}')"]
        ```

        ### Pure INSERT (no duplicate checking)
        Prompt: "Insert all records into users table"
        ```json
        "queryType": ["bulk_insert"],
        "bulkInsert": { ... }
        ```

        ### UPDATE Operation
        Prompt: "Update inventory counts"
        ```json
        "queryType": ["per_record"],
        "query": ["UPDATE inventory SET qty = {{{record.qty}}} WHERE sku = '{{{record.sku}}}'"]
        ```

        ### Run Once Per Page
        Prompt: "Execute this stored procedure for each page of results"
        ```json
        "queryType": ["per_page"]
        ```
        **per_page uses a different Handlebars context than per_record.** The context is the entire batch (`batch_of_records`), not a single `record.` object. Loop through with `{{#each batch_of_records}}...{{{record.fieldName}}}...{{/each}}`.
        
        ### Run Once at Start
        Prompt: "Run this cleanup script before processing"
        ```json
        "queryType": ["first_page"]
        ```
    bulkInsert:
      type: object
      description: |-
        **CRITICAL: This object is ONLY used when `queryType` is `["bulk_insert"]`.**
        
        ✅ **SET THIS** when:
        - `queryType` is `["bulk_insert"]`
        - Pure INSERT operation with NO ignoreExisting/duplicate checking
        
        ❌ **DO NOT SET THIS** when:
        - `queryType` is `["per_record"]` (use `query` field instead)
        - Operation involves UPDATE, UPSERT, or ignoreExisting logic
        
        If the prompt mentions "ignore existing", "skip duplicates", or "match on field",
        use `queryType: ["per_record"]` with the `query` field instead of this object.
      properties:
        tableName:
          type: string
          description: |-
            The name of the database table into which the bulk insert operation will be executed. This value must correspond to a valid, existing table within the target relational database management system (RDBMS). It serves as the primary destination for inserting multiple rows of data efficiently in a single operation. The table name can include schema or namespace qualifiers if supported by the database (e.g., "schemaName.tableName"), allowing precise targeting within complex database structures. Proper validation and sanitization of this value are essential to ensure the operation's success and to prevent SQL injection or other security vulnerabilities.

            ## FIELD BEHAVIOR:
            - Specifies the exact destination table for the bulk insert operation.
            - Must correspond to an existing table in the database schema.
            - Case sensitivity and naming conventions depend on the underlying RDBMS.
            - Supports schema-qualified names where applicable.
            - Used directly in the SQL `INSERT INTO` statement.
            - Influences how data is mapped and inserted during the bulk operation.

            ## IMPLEMENTATION GUIDANCE:
            - Verify the existence and accessibility of the table in the target database before execution.
            - Ensure compliance with the RDBMS naming rules, including reserved keywords, allowed characters, and maximum length.
            - Support and correctly handle schema-qualified table names, respecting database-specific syntax.
            - Sanitize and validate input rigorously to prevent SQL injection and other security risks.
            - Apply appropriate quoting or escaping mechanisms based on the RDBMS (e.g., backticks for MySQL, double quotes for PostgreSQL).
            - Consider the impact of case sensitivity, especially when dealing with quoted identifiers.

            ## EXAMPLES:
            - "users"
            - "public.orders"
            - "inventory.products"
            - "sales_data_2024"
            - "dbo.CustomerRecords"

            ## IMPORTANT NOTES:
            - The target table must exist and have the appropriate schema and permissions to accept bulk inserts.
            - Incorrect, misspelled, or non-existent table names will cause the operation to fail.
            - Case sensitivity varies by database; for example, PostgreSQL treats quoted identifiers as case-sensitive.
            - Avoid using unvalidated dynamic input to mitigate security vulnerabilities.
            - Schema qualifiers should be used consistently to avoid ambiguity in multi-schema environments.

            ## DEPENDENCY CHAIN:
            - Relies on the database connection and authentication configuration.
            - Interacts with other bulkInsert parameters such as column mappings and data payload.
            - May be influenced by transaction management, locking mechanisms, and database constraints during the insert.
            - Dependent on the database's metadata for validation and existence checks.

            ## TECHN
        batchSize:
          type: string
          description: |-
            The number of records to be inserted into the database in a single batch during a bulk insert operation. This parameter is crucial for optimizing the performance and efficiency of bulk data loading by controlling how many records are grouped together before being sent to the database. Proper tuning of batchSize balances memory consumption, transaction overhead, and throughput, enabling the system to handle large volumes of data efficiently without overwhelming resources or causing timeouts. Adjusting batchSize directly impacts transaction size, network utilization, error handling granularity, and recovery strategies, making it essential to tailor this value based on the specific database capabilities, system resources, and workload characteristics.

            ## FIELD BEHAVIOR:
            - Specifies the exact count of records processed and committed in a single batch during bulk insert operations.
            - Determines the frequency and size of database transactions, influencing overall throughput, latency, and system responsiveness.
            - Larger batch sizes can improve throughput but may increase memory usage, transaction duration, and risk of timeouts or locks.
            - Smaller batch sizes reduce memory footprint and transaction time but may increase the total number of transactions and associated overhead.
            - Defines the scope of error handling, as failures typically affect only the current batch, allowing for partial retries or rollbacks.
            - Controls the granularity of commit points, impacting rollback, recovery, and consistency strategies in case of failures.

            ## IMPLEMENTATION GUIDANCE:
            - Choose a batch size that respects the database’s transaction limits, available system memory, and network conditions.
            - Conduct benchmarking and load testing with different batch sizes to identify the optimal balance for your environment.
            - Monitor system performance continuously and adjust batchSize dynamically if supported, to adapt to varying workloads.
            - Implement comprehensive error handling to manage partial batch failures, including retry logic or compensating transactions.
            - Verify compatibility with database drivers, ORM frameworks, or middleware, which may impose constraints or optimizations on batch sizes.
            - Consider the size, complexity, and serialization overhead of individual records, as larger or more complex records may necessitate smaller batches.
            - Factor in network latency and bandwidth to optimize data transfer efficiency and reduce potential bottlenecks.

            ## EXAMPLES:
            - 1000: Suitable for moderate bulk insert operations, balancing speed and resource consumption effectively.
            - 50000: Ideal for high-throughput environments with ample memory and finely tuned database configurations.
            - 100: Appropriate for systems with limited memory or where minimizing transaction size and duration is critical.
            - 5000: A common default batch size providing a good compromise between performance and resource usage.

            ## IMPORTANT
