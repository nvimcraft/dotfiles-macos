      description: |-
        Specifies whether bulk loading is enabled for relational database management system (RDBMS) operations, allowing for the efficient insertion of large volumes of data through a single, optimized operation. Enabling bulkLoad significantly improves performance during data import, migration, or batch processing by minimizing the overhead associated with individual row inserts and leveraging database-specific bulk insert mechanisms. This feature is particularly beneficial for initial data loads, large-scale migrations, or periodic batch updates where speed, resource efficiency, and reduced transaction time are critical. Bulk loading may temporarily alter database behavior—such as disabling indexes, constraints, or triggers—to maximize throughput, and often requires elevated permissions and careful management of transactional integrity to ensure data consistency. Proper use of bulkLoad can lead to substantial reductions in processing time and system resource consumption during large data operations.

        ## FIELD BEHAVIOR:
        - When set to true, the system uses optimized bulk loading techniques to insert data in large batches, greatly enhancing throughput and efficiency.
        - When false or omitted, data insertion defaults to standard row-by-row operations, which may be slower and consume more resources.
        - Typically enabled during scenarios involving initial data population, large batch imports, or data migration processes.
        - May temporarily disable or defer enforcement of indexes, constraints, and triggers to improve performance during the bulk load operation.
        - Can affect database locking and concurrency, potentially locking tables or partitions for the duration of the bulk load.
        - Bulk loading operations may bypass certain transactional controls, affecting rollback and error recovery behavior.

        ## IMPLEMENTATION GUIDANCE:
        - Verify that the target RDBMS supports bulk loading and understand its specific syntax, capabilities, and limitations.
        - Assess transaction management implications, as bulk loading may alter or bypass triggers, constraints, and rollback mechanisms.
        - Implement robust error handling and post-load validation to ensure data integrity and consistency after bulk operations.
        - Monitor system resources such as CPU, memory, and I/O throughput during bulk load to avoid performance bottlenecks or outages.
        - Plan for potential impacts on database availability, locking behavior, and concurrent access during bulk load execution.
        - Ensure data is properly staged and preprocessed to meet the format and requirements of the bulk loading mechanism.
        - Coordinate bulk loading with maintenance windows or low-traffic periods to minimize disruption.

        ## EXAMPLES:
        - `bulkLoad: true` — Enables bulk loading to accelerate insertion of large datasets efficiently.
        - `bulkLoad: false` — Disables bulk loading, performing inserts using standard row-by-row methods.
        - `bulkLoad` omitted — Defaults
    updateLookupName:
      type: string
      description: |-
        Specifies the exact name of the lookup table or entity within the relational database management system (RDBMS) that is targeted for update operations. This property serves as a precise identifier to determine which lookup data set should be modified, ensuring accurate and efficient targeting within the database schema. It typically corresponds to a physical table name or a logical entity name defined in the database and must strictly align with the existing schema to enable successful updates without errors or unintended side effects. Proper use of this property is critical for maintaining data integrity during update operations on lookup data, as it directly influences which records are affected. Accurate specification helps prevent accidental data corruption and supports clear, maintainable database interactions.

        ## FIELD BEHAVIOR:
        - Defines the specific lookup table or entity to be updated during an operation.
        - Acts as a key identifier for the update process to locate the correct data set.
        - Must be provided when performing update operations on lookup data.
        - Influences the scope and effect of the update by specifying the target entity.
        - Changes to this value directly affect which data is modified in the database.
        - Invalid or missing values will cause update operations to fail or target unintended data.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure the value exactly matches the existing lookup table or entity name in the database schema.
        - Validate against the RDBMS naming conventions, including allowed characters, length restrictions, and case sensitivity.
        - Maintain consistent naming conventions across the application to prevent ambiguity and errors.
        - Account for case sensitivity based on the underlying database system’s configuration and collation settings.
        - Avoid using reserved keywords, special characters, or whitespace that may cause conflicts or syntax errors.
        - Implement validation checks to catch misspellings or invalid names before executing update operations.
        - Incorporate error handling to manage cases where the specified lookup name does not exist or is inaccessible.

        ## EXAMPLES:
        - "country_codes"
        - "user_roles"
        - "product_categories"
        - "status_lookup"
        - "department_list"

        ## IMPORTANT NOTES:
        - Providing an incorrect or misspelled name will result in failed update operations or runtime errors.
        - This field must not be left empty when an update operation is intended.
        - It is only relevant and required when performing update operations on lookup tables or entities.
        - Changes to this value should be carefully managed to avoid unintended data modifications or corruption.
        - Ensure appropriate permissions exist for updating the specified lookup entity to prevent authorization failures.
        - Consistent use of this property across environments (development, staging, production) is essential
    updateExtract:
      type: string
      description: |-
        Specifies the comprehensive configuration and parameters for updating an existing data extract within a relational database management system (RDBMS). This property defines how the extract's data is modified, supporting various update strategies such as incremental updates, full refreshes, conditional changes, or merges. It ensures that the extract remains accurate, consistent, and aligned with business rules and data integrity requirements by controlling the scope, method, and transactional behavior of update operations. Additionally, it allows for fine-grained control through filters, timestamps, and criteria to selectively update portions of the extract, while managing concurrency and maintaining data consistency throughout the process.

        ## FIELD BEHAVIOR:
        - Determines the update strategy applied to an existing data extract, including incremental, full refresh, conditional, or merge operations.
        - Controls how new data interacts with existing extract data—whether by overwriting, appending, or merging.
        - Supports selective updates using filters, timestamps, or conditional criteria to target specific subsets of data.
        - Manages transactional integrity to ensure updates are atomic, consistent, isolated, and durable (ACID-compliant).
        - Coordinates update execution to prevent conflicts, data corruption, or partial updates.
        - Enables configuration of error handling, logging, and rollback mechanisms during update processes.
        - Handles concurrency control to avoid race conditions and ensure data consistency in multi-user environments.
        - Allows scheduling and triggering of update operations based on time, events, or external signals.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure update configurations comply with organizational data governance, security, and integrity policies.
        - Validate all input parameters and update conditions to avoid inconsistent or partial data modifications.
        - Implement robust transactional support to allow rollback on failure and maintain data consistency.
        - Incorporate detailed logging and error reporting to facilitate monitoring, auditing, and troubleshooting.
        - Optimize update methods based on data volume, change frequency, and performance requirements, balancing between incremental and full refresh approaches.
        - Tailor update logic to leverage specific capabilities and constraints of the target RDBMS, including locking and concurrency controls.
        - Coordinate update timing and execution with downstream systems and data consumers to minimize disruption.
        - Design update processes to be idempotent where possible to support safe retries and recovery.
        - Consider the impact of update latency on data freshness and downstream analytics.

