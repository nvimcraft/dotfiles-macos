    ignoreExtract:
      type: string
      description: |-
        Specifies whether the extraction process from the relational database management system (RDBMS) should be entirely skipped. When set to true, the system bypasses the data extraction step, which is particularly useful in scenarios where data extraction is managed externally, has already been completed, or is unnecessary for the current operation. This flag directly controls whether the extraction engine initiates the retrieval of data from the source database, thereby influencing all subsequent stages that depend on the extracted data, such as transformation, validation, and loading. Proper use of this flag ensures flexibility in workflows by allowing integration with external data pipelines or pre-extracted datasets without redundant extraction efforts.

        ## FIELD BEHAVIOR:
        - Determines if the data extraction phase from the RDBMS is executed or omitted.
        - When true, no data is pulled from the source database, effectively skipping extraction.
        - When false or omitted, the extraction process runs normally, retrieving data as configured.
        - Influences downstream processes such as data transformation, validation, and loading that depend on extracted data.
        - Must be explicitly set to true to skip extraction; otherwise, extraction proceeds by default.
        - Impacts the overall data pipeline flow by potentially altering the availability of fresh data.

        ## IMPLEMENTATION GUIDANCE:
        - Default value should be false to ensure extraction occurs unless intentionally overridden.
        - Validate input strictly as a boolean to prevent misconfiguration.
        - Ensure that skipping extraction does not cause failures or data inconsistencies in subsequent pipeline stages.
        - Use this flag in workflows where extraction is handled outside the current system or when working with pre-extracted datasets.
        - Incorporate checks or safeguards to confirm that necessary data is available from alternative sources when extraction is skipped.
        - Log or notify when extraction is skipped to maintain transparency in data processing workflows.
        - Coordinate with other system components to handle scenarios where extraction is bypassed, ensuring smooth pipeline execution.

        ## EXAMPLES:
        - `ignoreExtract: true` — Extraction step is completely bypassed.
        - `ignoreExtract: false` — Extraction step is performed as usual.
        - Field omitted — Defaults to false, so extraction occurs normally.
        - Used in a pipeline where data is pre-loaded from a file or external system, setting `ignoreExtract: true` to avoid redundant extraction.

        ## IMPORTANT NOTES:
        - Setting this flag to true assumes that the system has access to the required data through other means; otherwise, downstream processes may fail or produce incomplete results.
        - Incorrect use can lead to missing data, causing errors or inconsistencies in the data pipeline.
