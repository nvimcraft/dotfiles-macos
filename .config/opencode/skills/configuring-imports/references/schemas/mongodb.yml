    ignoreExtract:
      type: string
      description: |-
        Enter the path to the field in the source record that should be used to identify existing records. If a value is found for this field, then the source record will be considered an existing record.

        The dynamic field list makes it easy for you to select the field. If a field contains special characters (which may be the case for certain APIs), then the field is enclosed with square brackets [ ], for example, [field-name].

        [*] indicates that the specified field is an array, for example, items[*].id. In this case, you should replace * with a number corresponding to the array item. The value for only this array item (not, the entire array) is checked.
        **CRITICAL:** JSON path to the field in the incoming/source record that should be used to determine if the record already exists in the target system.
        
        **This field is ONLY used when `ignoreExisting` is set to true.** Note: `ignoreExisting` is a separate property that is NOT part of this mongodb configuration.
        
        When `ignoreExisting: true` is set (at the import level), this field specifies which field from the incoming data should be checked for a value. If that field has a value, the record is considered to already exist and will be skipped.
        
        ## WHEN TO SET THIS FIELD:
        
        **ALWAYS set this field** when:
        1. The `ignoreExisting` property will be set to `true` (for "ignore existing" scenarios)
        2. The user's prompt mentions checking a specific field to identify existing records
        3. The prompt includes phrases like:
           - "indicated by the [field] field"
           - "matching the [field] field"
           - "based on [field]"
           - "using the [field] field"
           - "if [field] is populated"
           - "where [field] exists"
        
        ## HOW TO DETERMINE THE VALUE:
        
        1. **Look for the identifier field in the prompt:**
           - "ignoring existing customers indicated by the **id field**" → `ignoreExtract: "id"`
           - "skip existing vendors based on the **email field**" → `ignoreExtract: "email"`
           - "ignore records where **customerId** is populated" → `ignoreExtract: "customerId"`
        
        2. **Use the field from the incoming/source data** (NOT the target system field):
           - This is the field path in the data coming INTO the import
           - Should match a field that will be present in the source records
        
        3. **Apply special character handling:**
           - If a field contains special characters (hyphens, spaces, etc.), enclose with square brackets: `[field-name]`, `[customer id]`
           - For array notation, use `[*]` to indicate array items: `items[*].id` (replace `*` with index if needed)
        
        ## FIELD PATH SYNTAX:
        
        - **Simple field:** `id`, `email`, `customerId`
        - **Nested field:** `customer.id`, `billing.email`
        - **Field with special chars:** `[customer-id]`, `[external_id]`, `[Customer Name]`
        - **Array field:** `items[*].id` (or `items[0].id` for specific index)
        - **Nested in array:** `addresses[*].postalCode`
        
        ## EXAMPLES:
        
        These examples show ONLY the mongodb configuration (not the full import structure):
        
        ### Example 1: Simple field
        Prompt: "Create customers while ignoring existing customers indicated by the id field"
        ```json
        {
          "method": "insertMany",
          "collection": "customers",
          "ignoreExtract": "id"
        }
        ```
        (Note: `ignoreExisting: true` should also be set, but at a different level - not shown here)
        
        ### Example 2: Field with special characters
        Prompt: "Import vendors, skip existing ones based on the vendor-code field"
        ```json
        {
          "method": "insertMany",
          "collection": "vendors",
          "ignoreExtract": "[vendor-code]"
        }
        ```
        
        ### Example 3: Nested field
        Prompt: "Add accounts, ignore existing where customer.email matches"
        ```json
        {
          "method": "insertMany",
          "collection": "accounts",
          "ignoreExtract": "customer.email"
        }
        ```
        
        ### Example 4: No ignoreExisting scenario
        Prompt: "Create or update all customer records"
        ```json
        {
          "method": "updateOne",
          "collection": "customers"
        }
        ```
        (ignoreExtract should NOT be set when ignoreExisting is not true)
        
        ## IMPORTANT NOTES:
        
        - **DO NOT SET** this field if `ignoreExisting` is not true
        - **`ignoreExisting` is NOT part of this mongodb schema** - it belongs at a different level
        - This specifies the SOURCE field, not the target MongoDB field
        - The field path is case-sensitive
        - Must be a valid field that exists in the incoming data
        - Works in conjunction with `ignoreExisting` - both must be set for this feature to work
        - If the specified field has a value in the incoming record, that record is considered existing and will be skipped
        
        ## COMMON PATTERNS:
        
        - "ignore existing [records] indicated by the **[field]**" → Set `ignoreExtract: "[field]"`
        - "skip existing [records] based on **[field]**" → Set `ignoreExtract: "[field]"`
        - "if **[field]** is populated" → Set `ignoreExtract: "[field]"`
        - No mention of specific field for identification → May need to use default like "id" or "_id"
    ignoreLookupFilter:
      type: string
      description: |-
        If you are adding documents to your MongoDB instance and you have the Ignore Existing flag set to true please enter a filter object here to find existing documents in this collection. The value of this field must be a valid JSON string describing a MongoDB filter object in the correct format and with the correct operators. Refer to the MongoDB documentation for the list of valid query operators and the correct filter object syntax.
        **CRITICAL:** A JSON-stringified MongoDB query filter used to search for existing documents in the target collection.
        
        It defines the criteria to match incoming records against existing MongoDB documents. If the query returns a result, the record is considered "existing" and the operation (usually insert) is skipped.
        
        ## CRITICAL DISTINCTION vs `ignoreExtract`:
        - Use **`ignoreExtract`** when you just want to check if a field exists on the **INCOMING** record (no DB query).
        - Use **`ignoreLookupFilter`** when you need to query the **MONGODB DATABASE** to see if a record exists (e.g., "check if email exists in DB").
        
        ## WHEN TO SET THIS FIELD:
        Set this field when:
        1. Top-level `ignoreExisting` is `true`.
        2. The prompt implies checking the database for duplicates (e.g., "skip if email already exists", "prevent duplicate SKUs", "match on email").
        
        ## FORMAT REQUIREMENTS:
        - Must be a valid **JSON string** representing a MongoDB query.
        - Use Handlebars `{{FieldName}}` to reference values from the incoming record.
        - Format: `"{ \"mongoField\": \"{{incomingField}}\" }"`
        
        ## EXAMPLES:
        
        ### Example 1: Match on a single field
        Prompt: "Insert users, skip if email already exists in the database"
        ```json
        {
          "method": "insertMany",
          "collection": "users",
          "ignoreLookupFilter": "{\"email\":\"{{email}}\"}"
        }
        ```
        
        ### Example 2: Match on multiple fields
        Prompt: "Add products, ignore if SKU and VerifyID match existing products"
        ```json
        {
          "method": "insertMany",
          "collection": "products",
          "ignoreLookupFilter": "{\"sku\":\"{{sku}}\", \"verify_id\":\"{{verify_id}}\"}"
        }
        ```
        
        ### Example 3: Using operators
        Prompt: "Import orders, ignore if order_id matches"
        ```json
        {
          "method": "insertMany",
          "collection": "orders",
          "ignoreLookupFilter": "{\"order_id\": { \"$eq\": \"{{id}}\" } }"
        }
        ```
        
        ## IMPORTANT NOTES:
        - The value MUST be a string (stringify the JSON).
        - Mongo field names (keys) must match the **collection schema**.
        - Handlebars variables (values) must match the **incoming data**.