        - `{ "status": "active" }` — selects documents where the `status` field exactly matches "active".
        - `{ "age": { "$gte":
    document:
      type: string
      description: |-
        The main content or data structure representing a single record in a MongoDB database, encapsulated as a JSON-like object known as a document. This document consists of key-value pairs where keys are field names and values can be of various data types, including nested documents, arrays, strings, numbers, booleans, dates, and binary data, allowing for flexible and hierarchical data representation. It serves as the fundamental unit of data storage and retrieval within MongoDB collections and typically includes a unique identifier field (_id) that ensures each document can be distinctly accessed. Documents can contain metadata, support complex nested structures, and vary in schema within the same collection, reflecting MongoDB's schema-less design. This flexibility enables dynamic and evolving data models suited for diverse application needs, supporting efficient querying, indexing, and atomic operations at the document level.

        ## FIELD BEHAVIOR:
        - Represents an individual MongoDB document stored within a collection.
        - Contains key-value pairs with field names as keys and diverse data types as values, including nested documents and arrays.
        - Acts as the primary unit for data storage, retrieval, and manipulation in MongoDB.
        - Includes a mandatory unique identifier field (_id) unless auto-generated by MongoDB.
        - Supports flexible schema, allowing documents within the same collection to have different structures.
        - Can include metadata fields and support indexing for optimized queries.
        - Allows for embedding related data directly within the document to reduce the need for joins.
        - Supports atomic operations at the document level, ensuring consistency during updates.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure compliance with MongoDB BSON format constraints for data types and structure.
        - Validate field names to exclude reserved characters such as '.' and '$' unless explicitly permitted.
        - Support serialization and deserialization processes between application-level objects and MongoDB documents.
        - Enable handling of nested documents and arrays to represent complex data models effectively.
        - Consider indexing frequently queried fields within the document to enhance performance.
        - Monitor document size to stay within MongoDB’s 16MB limit to avoid performance degradation.
        - Use appropriate data types to optimize storage and query efficiency.
        - Implement validation rules or schema enforcement at the application or database level if needed to maintain data integrity.

        ## EXAMPLES:
        - { "_id": ObjectId("507f1f77bcf86cd799439011"), "name": "Alice", "age": 30, "address": { "street": "123 Main St", "city": "Metropolis" } }
        - { "productId": "
    update:
      type: string
      description: |-
        Update operation details specifying the precise modifications to be applied to one or more documents within a MongoDB collection. This field defines the exact changes using MongoDB's rich set of update operators, enabling atomic and efficient modifications to fields, arrays, or embedded documents without replacing entire documents unless explicitly intended. It supports a comprehensive range of update operations such as setting new values, incrementing numeric fields, removing fields, appending or removing elements in arrays, renaming fields, and more, providing fine-grained control over document mutations. Additionally, it accommodates advanced update mechanisms including pipeline-style updates introduced in MongoDB 4.2+, allowing for complex transformations and conditional updates within a single operation. The update specification can also leverage array filters and positional operators to target specific elements within arrays, enhancing the precision and flexibility of updates.

        ## FIELD BEHAVIOR:
        - Specifies the criteria and detailed modifications to apply to matching documents in a collection.
        - Supports a wide array of MongoDB update operators like `$set`, `$unset`, `$inc`, `$push`, `$pull`, `$addToSet`, `$rename`, `$mul`, `$min`, `$max`, and others.
        - Can target single or multiple documents depending on the operation context and options such as `multi` or `upsert`.
        - Ensures atomicity of update operations to maintain data integrity and consistency across concurrent operations.
        - Allows both partial updates using operators and full document replacements when the update object is a complete document without operators.
        - Supports pipeline-style updates for complex, multi-stage transformations and conditional logic within updates.
        - Enables the use of array filters and positional operators to selectively update elements within arrays based on specified conditions.
        - Handles upsert behavior to insert new documents if no existing documents match the update criteria, when enabled.

        ## IMPLEMENTATION GUIDANCE:
        - Validate the update object rigorously to ensure compliance with MongoDB update syntax and semantics, preventing runtime errors.
        - Favor using update operators for partial updates to optimize performance and minimize unintended data overwrites.
        - Implement graceful handling for cases where no documents match the update criteria, optionally supporting upsert behavior to insert new documents if none exist.
        - Explicitly control whether updates affect single or multiple documents to avoid accidental mass modifications.
        - Incorporate robust error handling for invalid update operations, schema conflicts, or violations of database constraints.
        - Consider the impact of update operations on indexes, triggers, and other database mechanisms to maintain overall system performance and data integrity.
        - Support advanced update features such as array filters, positional operators
    upsert:
      type: boolean
      description: |-
        Upsert is a boolean flag that controls whether a MongoDB update operation should insert a new document if no existing document matches the specified query criteria, or strictly update existing documents only. When set to true, the operation performs an atomic "update or insert" action: it updates the matching document if found, or inserts a new document constructed from the update criteria if none exists. This ensures that after the operation, a document matching the criteria will exist in the collection. When set to false, the operation only updates documents that already exist and skips the operation entirely if no match is found, preventing any new documents from being created. This flag is essential for scenarios where maintaining data integrity and avoiding unintended document creation is critical.

        ## FIELD BEHAVIOR:
        - Determines whether the update operation can create a new document when no existing document matches the query.
        - If true, performs an atomic operation that either updates an existing document or inserts a new one.
        - If false, restricts the operation to updating existing documents only, with no insertion.
        - Influences the database state by enabling conditional document creation during update operations.
        - Affects the outcome of update queries by potentially expanding the dataset with new documents.

        ## IMPLEMENTATION GUIDANCE:
        - Use upsert=true when you need to guarantee the existence of a document after the operation, regardless of prior presence.
        - Use upsert=false to restrict changes strictly to existing documents, avoiding unintended document creation.
        - Ensure that when upsert is true, the update document includes all required fields to create a valid new document.
        - Validate that the query filter and update document are logically consistent to prevent unexpected or malformed insertions.
        - Consider the impact on database size, indexing, and performance when enabling upsert, as it may increase document count.
        - Test the behavior in your specific MongoDB driver and version to confirm upsert semantics and compatibility.
        - Be mindful of potential race conditions in concurrent environments that could lead to duplicate documents if not handled properly.

        ## EXAMPLES:
        - `upsert: true` — Update the matching document if found; otherwise, insert a new document based on the update criteria.
        - `upsert: false` — Update only if a matching document exists; skip the operation if no match is found.
        - Using upsert to create a user profile document if it does not exist during an update operation.
        - Employing upsert in configuration management to ensure default settings documents are present and updated as needed.

