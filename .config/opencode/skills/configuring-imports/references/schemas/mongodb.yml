Mongodb:
  type: object
  description: |-
    Configuration for MongoDB imports. This schema defines ONLY the MongoDB-specific configuration properties.
    
    **IMPORTANT:** Properties like `ignoreExisting`, `ignoreMissing`, `name`, `description` are NOT part of this schema - they belong at a different level. When generating this configuration, return ONLY the properties defined here (method, collection, ignoreExtract, etc.).
  properties:
    method:
      type: string
      enum:
      - insertMany
      - updateOne
      description: |-
        The HTTP method to be used for the MongoDB API request, specifying the type of operation to perform on the database resource. This property dictates how the server interprets and processes the request, directly influencing the action taken on MongoDB collections or documents. Common HTTP methods include GET for retrieving data, POST for creating new entries, PUT or PATCH for updating existing documents, and DELETE for removing records. Each method determines the structure of the request payload, the expected response format, and the side effects on the database. Proper selection of the method ensures alignment with RESTful principles, maintains idempotency where applicable, and supports secure and predictable interactions with the MongoDB service.

        ## FIELD BEHAVIOR:
        - Defines the intended CRUD operation (Create, Read, Update, Delete) on MongoDB resources.
        - Controls server-side processing logic, affecting data retrieval, insertion, modification, or deletion.
        - Influences the presence, format, and content of request bodies and the nature of responses returned.
        - Determines idempotency and safety characteristics of the API call, impacting retry and error handling strategies.
        - Affects authorization and authentication requirements based on the sensitivity of the operation.
        - Impacts caching behavior and network efficiency depending on the method used.

        ## IMPLEMENTATION GUIDANCE:
        - Use standard HTTP methods consistent with RESTful API design: GET for reading data, POST for creating new documents, PUT or PATCH for updating existing documents, and DELETE for removing documents.
        - Validate the method against a predefined set of allowed HTTP methods to ensure API consistency and prevent unsupported operations.
        - Ensure the selected method accurately reflects the intended database operation to avoid unintended data modifications or errors.
        - Consider the idempotency of each method when designing client-side logic, especially for update and delete operations.
        - Include appropriate headers, query parameters, and request body content as required by the specific method and MongoDB operation.
        - Implement robust error handling and validation to manage unsupported or incorrect method usage gracefully.
        - Document method-specific requirements and constraints clearly for API consumers.

        ## EXAMPLES:
        - GET: Retrieve one or more documents from a MongoDB collection without modifying data.
        - POST: Insert a new document into a collection, creating a new resource.
        - PUT: Replace an entire existing document with a new version, ensuring full update.
        - PATCH: Apply partial updates to specific fields within an existing document.
        - DELETE: Remove a document or multiple documents from a collection permanently.

        ## IMPORTANT NOTES:
        - The HTTP method must be compatible with the MongoDB operation
    collection:
      type: string
      description: |-
        Specifies the exact name of the MongoDB collection where data operations—including insertion, querying, updating, or deletion—will be executed. This property defines the precise target collection within the database, establishing the scope and context of the data affected by the API call. The collection name must strictly adhere to MongoDB's naming conventions to ensure compatibility, prevent conflicts with system-reserved collections, and maintain database integrity. Proper naming facilitates efficient data organization, indexing, query performance, and overall database scalability.

        ## FIELD BEHAVIOR:
        - Identifies the specific MongoDB collection for all CRUD (Create, Read, Update, Delete) operations.
        - Directly determines which subset of data is accessed, modified, or deleted during the API request.
        - Must be a valid, non-empty UTF-8 string that complies with MongoDB collection naming rules.
        - Case-sensitive, meaning collections named "Users" and "users" are distinct and separate.
        - Influences the application’s data flow and operational context by specifying the data container.
        - Changes to this property dynamically alter the target dataset for the API operation.

        ## IMPLEMENTATION GUIDANCE:
        - Validate that the collection name is a non-empty UTF-8 string without null characters, spaces, or invalid symbols such as '$' or '.' except where allowed.
        - Ensure the name does not start with the reserved prefix "system." to avoid conflicts with MongoDB internal collections.
        - Adopt consistent, descriptive, and meaningful naming conventions to enhance database organization, maintainability, and clarity.
        - Verify the existence of the collection before performing operations; implement robust error handling for cases where the collection does not exist.
        - Consider how the collection name impacts indexing strategies, query optimization, sharding, and overall database performance.
        - Maintain consistency in collection naming across the application to prevent unexpected behavior or data access issues.
        - Avoid overly long or complex names to reduce potential errors and improve readability.

        ## EXAMPLES:
        - "users"
        - "orders"
        - "inventory_items"
        - "logs_2024"
        - "customer_feedback"
        - "session_data"
        - "product_catalog"

        ## IMPORTANT NOTES:
        - Collection names are case-sensitive and must be used consistently throughout the application to avoid data inconsistencies.
        - Avoid reserved names and prefixes such as "system." to prevent interference with MongoDB’s internal collections and operations.
        - The choice of collection name can significantly affect database performance, indexing efficiency, and scalability.
        - Renaming a collection requires updating all references in the application and may necessitate data
    filter:
      type: string
      description: |-
        A MongoDB query filter object used to specify detailed criteria for selecting documents within a collection. This filter defines the exact conditions that documents must satisfy to be included in the query results, leveraging MongoDB's comprehensive and expressive query syntax. It supports a wide range of operators and expressions to enable precise and flexible querying of documents based on field values, existence, data types, ranges, nested properties, array contents, and more. The filter allows for complex logical combinations and can target deeply nested fields using dot notation, making it a powerful tool for fine-grained data retrieval.

        ## FIELD BEHAVIOR:
        - Determines which documents in the MongoDB collection are matched and returned by the query.
        - Supports complex query expressions including comparison operators (`$eq`, `$gt`, `$lt`, `$gte`, `$lte`, `$ne`), logical operators (`$and`, `$or`, `$not`, `$nor`), element operators (`$exists`, `$type`), array operators (`$in`, `$nin`, `$all`, `$elemMatch`), and evaluation operators (`$regex`, `$expr`).
        - Enables filtering based on simple fields, nested document properties using dot notation, and array contents.
        - Supports querying for null values, missing fields, and specific data types.
        - Allows combining multiple conditions using logical operators to form complex queries.
        - If omitted or provided as an empty object, the query defaults to returning all documents in the collection without filtering.
        - Can be used to optimize data retrieval by narrowing down the result set to only relevant documents.

        ## IMPLEMENTATION GUIDANCE:
        - Construct the filter using valid MongoDB query operators and syntax to ensure correct behavior.
        - Validate and sanitize all input used to build the filter to prevent injection attacks or malformed queries.
        - Utilize dot notation to query nested fields within embedded documents or arrays.
        - Optimize query performance by aligning filters with indexed fields in the MongoDB collection.
        - Handle edge cases such as null values, missing fields, and data type variations appropriately within the filter.
        - Test filters thoroughly to ensure they return expected results and handle all relevant data scenarios.
        - Consider the impact of filter complexity on query execution time and resource usage.
        - Use projection and indexing strategies in conjunction with filters to improve query efficiency.
        - Be mindful of MongoDB version compatibility when using advanced operators or expressions.

