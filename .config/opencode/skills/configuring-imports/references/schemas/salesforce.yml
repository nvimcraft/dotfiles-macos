        tagCsv:
          type: string
          description: |-
            A comma-separated string representing the tags associated with the content version in Salesforce. This field enables the assignment of multiple descriptive tags within a single string, facilitating efficient categorization, organization, and enhanced searchability of the content. Tags serve as metadata labels that help users filter, locate, and manage content versions effectively across the platform by grouping related items and supporting advanced search and filtering capabilities. Proper use of this field improves content discoverability, streamlines content management workflows, and supports dynamic content classification.

            ## FIELD BEHAVIOR:
            - Accepts multiple tags separated by commas, typically without spaces, though trimming whitespace is recommended.
            - Tags are used to categorize, organize, and improve the discoverability of content versions.
            - Tags can be added, updated, or removed by modifying the entire string value.
            - Duplicate tags within the string should be avoided to maintain clarity and effectiveness.
            - Tags are generally treated as case-insensitive for search purposes but stored exactly as entered.
            - Changes to this field immediately affect how content versions are indexed and retrieved in search operations.

            ## IMPLEMENTATION GUIDANCE:
            - Ensure individual tags do not contain commas to prevent parsing errors.
            - Validate the tagCsv string for invalid characters, excessive length, and proper formatting.
            - When updating tags, replace the entire string to accurately reflect the current tag set.
            - Trim leading and trailing whitespace from each tag before processing or storage.
            - Utilize this field to enhance search filters, categorization, and content management workflows.
            - Implement application-level checks to prevent duplicate or meaningless tags.
            - Consider standardizing tag formats (e.g., lowercase) to maintain consistency across records.

            ## EXAMPLES:
            - "marketing,Q2,presentation"
            - "urgent,clientA,confidential"
            - "releaseNotes,v1.2,approved"
            - "finance,yearEnd,reviewed"

            ## IMPORTANT NOTES:
            - The maximum length of the tagCsv string is subject to Salesforce field size limitations.
            - Tags should be meaningful, consistent, and standardized to maximize their utility.
            - Modifications to tags can impact content visibility and access if used in filtering or permission logic.
            - This field does not enforce uniqueness of tags; application-level logic should handle duplicate prevention.
            - Tags are stored as-is; any normalization or case conversion must be handled externally.
            - Improper formatting or invalid characters may cause errors or unexpected behavior in search and filtering.

            ## DEPENDENCY CHAIN:
            - Closely related to contentVersion metadata and search/filtering functionality.
            - May integrate with Salesforce
        contentLocation:
          type: string
          description: |-
            contentLocation specifies the precise storage location of the content file associated with the Salesforce ContentVersion record. It identifies where the actual file data resides—whether within Salesforce's internal storage infrastructure, an external content management system, or a linked external repository—and governs how the content is accessed, retrieved, and managed throughout its lifecycle. This field plays a crucial role in content delivery, access permissions, and integration workflows by clearly indicating the source location of the file data. Properly setting and interpreting contentLocation ensures that content is handled correctly according to its storage context, enabling seamless access when stored internally or facilitating robust integration and synchronization with third-party external systems.

            ## FIELD BEHAVIOR:
            - Determines the origin and storage context of the content file linked to the ContentVersion record.
            - Influences the mechanisms and protocols used for accessing, retrieving, and managing the content.
            - Typically assigned automatically by Salesforce based on the upload method or integration configuration.
            - Common values include 'S' for Salesforce internal storage, 'E' for external storage systems, and 'L' for linked external locations.
            - Often read-only to preserve data integrity and prevent unauthorized or unintended modifications.
            - Alterations to this field can impact content visibility, sharing settings, and delivery workflows.

            ## IMPLEMENTATION GUIDANCE:
            - Utilize this field to programmatically distinguish between internally stored content and externally managed files.
            - When integrating with external repositories, ensure contentLocation accurately reflects the external storage to enable correct content handling and retrieval.
            - Avoid manual updates unless supported by Salesforce documentation and accompanied by a comprehensive understanding of the consequences.
            - Validate the contentLocation value prior to processing or delivering content to guarantee proper routing and access control.
            - Confirm that external storage systems are correctly configured, authenticated, and authorized to maintain uninterrupted access.
            - Monitor this field closely during content migration or integration activities to prevent data inconsistencies or access disruptions.

            ## EXAMPLES:
            - 'S' — Content physically stored within Salesforce’s internal storage infrastructure.
            - 'E' — Content residing in an external system integrated with Salesforce, such as a third-party content repository.
            - 'L' — Content located in a linked external location, representing specialized or less common storage configurations.

            ## IMPORTANT NOTES:
            - Manual modifications to contentLocation can lead to broken links, access failures, or data inconsistencies.
            - Salesforce generally manages this field automatically to uphold consistency and reliability.
            - The contentLocation value directly influences content delivery methods and access control policies.
            - External content locations require proper configuration, authentication, and permissions to function correctly
      description: |-
        The contentVersion property serves as the unique identifier for a specific iteration of a content item within the Salesforce platform's content management system. It enables precise tracking, retrieval, and management of individual versions or revisions of documents, files, or digital assets. Each contentVersion corresponds to a distinct, immutable state of the content at a given point in time, facilitating robust version control, content integrity, and auditability. When a content item is created or modified, Salesforce automatically generates a new contentVersion to capture those changes, allowing users and systems to access, compare, or revert to previous versions as necessary. This property is fundamental for workflows involving content updates, approvals, compliance tracking, and historical content analysis.

        ## FIELD BEHAVIOR:
        - Uniquely identifies a single, immutable version of a content item within Salesforce.
        - Differentiates between multiple revisions or updates of the same content asset.
        - Automatically created or incremented by Salesforce upon content creation or modification.
        - Used in API operations to retrieve, reference, update metadata, or manage specific content versions.
        - Remains constant once assigned; any content changes result in a new contentVersion record.
        - Supports audit trails by preserving historical versions of content.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure synchronization of contentVersion values with Salesforce to maintain consistency across integrated systems.
        - Utilize this property for version-specific operations such as downloading content, updating metadata, or deleting particular versions.
        - Validate contentVersion identifiers against Salesforce API standards to avoid errors or mismatches.
        - Implement comprehensive error handling for scenarios where contentVersion records are missing, deprecated, or inaccessible due to permission restrictions.
        - Consider access control differences at the version level, as visibility and permissions may vary between versions.
        - Leverage contentVersion in workflows requiring version comparison, rollback, or approval processes.

        ## EXAMPLES:
        - "0681t000000XyzA" (initial version of a document)
        - "0681t000000XyzB" (a subsequent, updated version reflecting content changes)
        - "0681t000000XyzC" (a further revised version incorporating additional edits)

        ## IMPORTANT NOTES:
        - contentVersion is distinct from contentDocumentId; contentVersion identifies a specific version, whereas contentDocumentId refers to the overall document entity.
        - Proper versioning is critical for maintaining content integrity, supporting audit trails, and ensuring regulatory compliance.
        - Access permissions and visibility can differ between content versions, potentially affecting user access and operations.
