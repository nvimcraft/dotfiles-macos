Salesforce:
  type: object
  description: |-
    Configuration for Salesforce imports containing operation type, API selection, and object-specific settings.
    
    **IMPORTANT:** This schema defines ONLY the Salesforce-specific configuration properties. Properties like `ignoreExisting`, `ignoreMissing`, `name`, `description` are NOT part of this schema - they belong at a different level.
    
    When asked to generate this configuration, return an object with these properties:
    - `operation` (REQUIRED): The Salesforce operation type (insert, update, upsert, etc.)
    - `api` (REQUIRED): The Salesforce API to use (default: "soap")
    - `sObjectType`: The Salesforce object type (e.g., "Account", "Contact", "Vendor__c")
    - `idLookup`: Configuration for looking up existing records
    - `upsert`: Configuration for upsert operations (when operation is "upsert")
    - And other operation-specific properties as needed
  properties:
    lookups:
      type: string
      nullable: true
      description: |-
        A collection of lookup tables or reference data sets that provide standardized, predefined values or options within the application context. These lookup tables enable consistent data entry, validation, and interpretation by defining controlled vocabularies or permissible values for various fields or parameters across the system. They serve as authoritative sources for reference data, ensuring uniformity and reducing errors in data handling and user interactions. Lookup tables typically encompass static or infrequently changing data that supports consistent business logic and user interface behavior across multiple modules or components. By centralizing these reference datasets, the system promotes reusability, simplifies maintenance, and enhances data integrity throughout the application lifecycle.

        ## FIELD BEHAVIOR:
        - Contains multiple named lookup tables, each representing a distinct category or domain of reference data.
        - Used to populate user interface elements such as dropdown menus, autocomplete fields, and selection lists.
        - Supports validation logic by restricting input to predefined permissible values.
        - Typically consists of static or infrequently changing data that underpins consistent data interpretation.
        - May be referenced by multiple components or modules within the application to maintain data consistency.
        - Enables dynamic adaptation of UI and business rules by centralizing reference data management.
        - Facilitates localization by supporting language-specific labels or descriptions where applicable.
        - Often versioned or managed to track changes and ensure backward compatibility.

        ## IMPLEMENTATION GUIDANCE:
        - Structure as a dictionary or map where keys correspond to lookup table names and values are arrays or lists of unique, well-defined entries.
        - Ensure each lookup entry is unique within its table and includes necessary metadata such as codes, descriptions, or display labels.
        - Design for easy updates or extensions to lookup tables without compromising existing data integrity or system stability.
        - Implement caching strategies to optimize performance, especially for client-side consumption.
        - Consider supporting localization and internationalization by including language-specific labels or descriptions where applicable.
        - Incorporate versioning or change management mechanisms to handle updates without disrupting dependent systems.
        - Validate data integrity rigorously during ingestion or updates to prevent duplicates, inconsistencies, or invalid entries.
        - Separate lookup data from business logic to maintain clarity and ease of maintenance.
        - Provide clear documentation for each lookup table to facilitate understanding and correct usage by developers and users.
        - Ensure lookup data is accessible through standardized APIs or interfaces to promote interoperability.

        ## EXAMPLES:
        - A "countries" lookup containing standardized country codes (e.g., ISO 3166-1 alpha-2) and their corresponding country names.
        - A "statusCodes" lookup defining permissible status values such as "
    operation:
      type: string
      enum:
        - insert
        - update
        - upsert
        - upsertpicklistvalues
        - delete
        - addupdate
      x-lowercase: true
      description: |-
        Specifies the type of Salesforce operation to perform on records. This determines how data is created, modified, or removed in Salesforce.

        ## FIELD BEHAVIOR:
        - Defines the specific Salesforce action to execute (insert, update, upsert, etc.)
        - Dictates required fields and validation rules for the operation
        - Determines API endpoint and request structure
        - Automatically converted to lowercase before processing
        - Influences response format and error handling

        ## OPERATION TYPES:

        ### **insert**
        - **Purpose:** Create new records in Salesforce
        - **Behavior:** Creates new records
        - **Use when:** Creating brand new records
        - **With ignoreExisting: true:** Checks for existing records and skips them (requires idLookup.whereClause)
        - **Without ignoreExisting:** Creates all records without checking for duplicates
        - **Example:** "Insert new leads from marketing campaign"
        - **Example with ignoreExisting:** "Create vendors while ignoring existing vendors" → operation: "insert" + ignoreExisting: true

        ### **update**
        - **Purpose:** Modify existing records in Salesforce
        - **Behavior:** Requires record ID; fails if record doesn't exist
        - **Use when:** Updating known existing records
        - **Example:** "Update customer status based on order completion"

        ### **upsert**
        - **Purpose:** Create or update records based on external ID
        - **Behavior:** Updates if external ID matches, creates if not found
        - **Use when:** Syncing data from external systems with external ID field
        - **Example:** "Upsert customers by External_ID__c field"
        - **REQUIRES:**
          - `idLookup.extract` field (maps incoming field to External ID)
          - `upsert.externalIdField` field (specifies Salesforce External ID field)
          - Both fields MUST be set for upsert to work

        ### **upsertpicklistvalues**
        - **Purpose:** Create or update picklist values dynamically
        - **Behavior:** Manages picklist value creation/updates
        - **Use when:** Maintaining picklist values from external data
        - **Example:** "Sync product categories to Salesforce picklist"

        ### **delete**
        - **Purpose:** Remove records from Salesforce
        - **Behavior:** Requires record ID; records moved to recycle bin
        - **Use when:** Removing obsolete or invalid records
        - **Example:** "Delete expired opportunities"

        ### **addupdate**
        - **Purpose:** Create new or update existing records (Celigo-specific)
        - **Behavior:** Similar to upsert but uses different matching logic
        - **Use when:** Upserting without requiring external ID field
        - **Example:** "Sync contacts, create new or update existing by email"

        ## IMPLEMENTATION GUIDANCE:
        - Choose operation based on whether records are new, existing, or unknown
        - For **insert**: Ensure records are truly new to avoid errors
        - For **insert with ignoreExisting: true**: MUST set `idLookup.whereClause` to check for existing records
        - For **update/delete**: MUST set `idLookup.whereClause` to identify records
        - For **upsert**: MUST also include the `upsert` object with `externalIdField` property
        - For **upsert**: MUST also set `idLookup.extract` to map incoming field
        - For **addupdate**: MUST set `idLookup.whereClause` to define matching criteria
        - Use **upsertpicklistvalues** only for picklist management scenarios
        
        ## COMMON PATTERNS:
        - **"Create X while ignoring existing X"** → operation: "insert" + api: "soap" + idLookup.whereClause
        - **"Create or update X"** → operation: "upsert" + api: "soap" + upsert.externalIdField + idLookup.extract
        - **"Update X"** → operation: "update" + api: "soap" + idLookup.whereClause
        - **"Sync X"** → operation: "addupdate" + api: "soap" + idLookup.whereClause
        - **ALWAYS include** api field (default to "soap" if not specified in prompt)

        ## EXAMPLES:

        ### Insert new records:
        ```json
        {
          "operation": "insert",
          "api": "soap",
          "sObjectType": "Lead"
        }
        ```
        Prompt: "Create new leads in Salesforce"

        ### Insert with ignore existing:
        ```json
        {
          "operation": "insert",
          "api": "soap",
          "sObjectType": "Vendor__c",
          "idLookup": {
            "whereClause": "Name = '{{VendorName}}'"
          }
        }
        ```
        Prompt: "Create vendor records while ignoring existing vendors"
        
        **NOTE:** For "ignore existing" prompts, also remember that `ignoreExisting: true` belongs at a different level (not part of this salesforce configuration).

        ### Update existing records:
        ```json
        {
          "operation": "update",
          "api": "soap",
          "sObjectType": "Account",
          "idLookup": {
            "whereClause": "Id = '{{AccountId}}'"
          }
        }
        ```
        Prompt: "Update existing accounts in Salesforce"

        ### Upsert by external ID:
        ```json
        {
          "operation": "upsert",
          "api": "soap",
          "sObjectType": "Contact",
          "idLookup": {
            "extract": "ExternalId"
          },
          "upsert": {
            "externalIdField": "External_ID__c"
          }
        }
        ```
        Prompt: "Create or update contacts by External_ID__c"

        ### Addupdate (create or update):
        ```json
        {
          "operation": "addupdate",
          "api": "soap",
          "sObjectType": "Customer__c",
          "idLookup": {
            "whereClause": "Name = '{{CustomerName}}'"
          }
        }
        ```
        Prompt: "Sync customers, create new or update existing"

        ## IMPORTANT NOTES:
        - Operation value is case-insensitive (automatically converted to lowercase)
        - Invalid operation values will cause API validation errors
        - Each operation has different requirements for record identification
        - **CRITICAL for upsert**: MUST include the `upsert` object with `externalIdField` property
        - **CRITICAL for upsert**: MUST set `idLookup.extract` to map incoming field to External ID
        - **upsert** requires external ID field to be configured in Salesforce
        - **addupdate** is Celigo-specific and may not work with all Salesforce APIs
        - Operations must align with user's Salesforce permissions
        - Some operations support bulk processing more efficiently than others
    api:
      type: string
      enum:
        - soap
        - rest
        - metadata
        - compositerecord
      x-lowercase: true
      description: |-
        **REQUIRED FIELD:** Specifies which Salesforce API to use for the import operation. Different APIs have different capabilities, performance characteristics, and use cases.
        
        **CRITICAL:** This field MUST ALWAYS be set. If no specific API is mentioned in the prompt, **DEFAULT to "soap"**.

        ## FIELD BEHAVIOR:
        - **REQUIRED** for all Salesforce imports
        - Determines the protocol and endpoint used for Salesforce communication
        - Influences request format, batch sizes, and response handling
        - Automatically converted to lowercase before processing
        - Affects available features and operation types
        - Impacts performance and error handling behavior

        ## API TYPES:

        ### **soap** (Default - Most Common)
        - **Purpose:** SOAP API with additional features like AllOrNone transaction control
        - **Best for:** Transactional imports requiring rollback capabilities
        - **Features:** AllOrNone header, enhanced transaction control, XML-based
        - **Limits:** Similar to REST but with more overhead
        - **Use when:** Need transaction rollback, legacy integrations
        - **Example:** "Import invoices with all-or-none transaction guarantee"

                ### **rest**
        - **Purpose:** Standard REST API for single-record and small-batch operations
        - **Best for:** Real-time imports, small datasets (< 200 records/call)
        - **Features:** Full CRUD operations, flexible querying, rich error messages
        - **Limits:** 2,000 records per API call
        - **Use when:** Standard import operations, real-time data sync
        - **Example:** "Import leads from web form submissions"

        ### **metadata**
        - **Purpose:** Metadata API for importing configuration and setup data
        - **Best for:** Deploying Salesforce configuration, not data records
        - **Features:** Deploy custom objects, fields, workflows, etc.
        - **Use when:** Deploying Salesforce configuration between orgs
        - **Example:** "Deploy custom object definitions from sandbox to production"
        - **Note:** NOT for data records - only for metadata

        ### **compositerecord**
        - **Purpose:** Composite Graph API for related record trees
        - **Best for:** Creating multiple related records in one request
        - **Features:** Create parent-child relationships atomically
        - **Use when:** Importing hierarchical data (e.g., Account + Contacts + Opportunities)
        - **Example:** "Import accounts with their related contacts in one operation"

        ## IMPLEMENTATION GUIDANCE:
        - **MUST ALWAYS SET THIS FIELD** - Never leave it undefined
        - **Default to "rest"** for most import operations (90% of use cases)
        - If prompt doesn't specify API type, use **"soap"**
        - Use **"soap"** only when AllOrNone transaction control is explicitly required
        - Use **"metadata"** only for configuration deployment, never for data
        - Use **"compositerecord"** for complex parent-child relationship imports
        - Consider API limits and performance characteristics for your data volume
        - Ensure the Salesforce connection supports the chosen API type
        
        ## DEFAULT CHOICE:
        When in doubt or when no API is mentioned in the prompt → **USE "soap"**

        ## EXAMPLES:

        ### REST API (most common):
        ```json
        {
          "operation": "insert",
          "api": "rest",
          "sobject": "Lead"
        }
        ```
        Prompt: "Import leads into Salesforce"

        ### SOAP API with transaction control:
        ```json
        {
          "operation": "insert",
          "api": "soap",
          "sobject": "Invoice__c",
          "soap": {
            "headers": {
              "allOrNone": true
            }
          }
        }
        ```
        Prompt: "Import invoices with all-or-none guarantee"

        ### Composite Record API:
        ```json
        {
          "operation": "insert",
          "api": "compositerecord",
          "sobject": "Account"
        }
        ```
        Prompt: "Import accounts with related contacts and opportunities"

        ## IMPORTANT NOTES:
        - API value is case-insensitive (automatically converted to lowercase)
        - **REST API is the default and most commonly used**
        - SOAP API has slightly more overhead but provides transaction guarantees
        - Metadata API is for configuration only, not data records
        - Composite Record API requires careful relationship mapping
        - Each API has different rate limits and performance characteristics
        - Ensure your Salesforce connection and permissions support the chosen API
    soap:
      type: object
      properties:
        headers:
          type: object
          properties:
            allOrNone:
              type: boolean
              description: |-
                allOrNone specifies whether the Salesforce API operation should be executed atomically, ensuring that either all parts of the operation succeed or none do. When set to true, if any record in a batch operation fails, the entire transaction is rolled back and no changes are committed, preserving data integrity across the dataset. When set to false, the operation allows partial success, meaning some records may be processed and committed even if others fail, which can improve performance but requires careful error handling to manage partial failures. This property is primarily applicable to data manipulation operations such as create, update, delete, and upsert, and is critical for maintaining consistent and reliable data states in multi-record transactions.

                ## FIELD BEHAVIOR:
                - When true, enforces atomicity: all records in the batch must succeed or the entire operation is rolled back with no changes applied.
                - When false, permits partial success: successfully processed records are committed even if some records fail.
                - Applies mainly to batch DML operations including create, update, delete, and upsert.
                - Helps maintain data consistency by preventing partial updates when strict transactional integrity is required.
                - Influences how errors are reported and handled in the API response.
                - Affects transaction commit behavior and rollback mechanisms within the Salesforce platform.

                ## IMPLEMENTATION GUIDANCE:
                - Set to true to guarantee strict data consistency and avoid partial data changes that could lead to inconsistent states.
                - Set to false to allow higher throughput and partial processing when some failures are acceptable or expected.
                - Default value is false if the property is omitted, allowing partial success by default.
                - When false, implement robust error handling to process partial success responses and handle individual record errors appropriately.
                - Verify that the target Salesforce API operation supports the allOrNone header before use.
                - Consider the impact on transaction duration and system resources when enabling atomic operations.
                - Use in scenarios where data integrity is paramount, such as financial or compliance-related data updates.

                ## EXAMPLES:
                - allOrNone = true: Attempting to update 10 records where one record fails validation results in no records being updated, preserving atomicity.
                - allOrNone = false: Attempting to update 10 records where one record fails validation results in 9 records updated successfully and one failure reported.
                - allOrNone = true: Deleting multiple records in a batch will either delete all specified records or none if any deletion fails.
                - allOrNone = false: Creating multiple records where some violate unique constraints results in successful creation of valid records and
          description: |-
            Headers to be included in the SOAP request sent to Salesforce, primarily used for authentication, session management, and transmitting additional metadata required by the Salesforce API. These headers form part of the SOAP envelope's header section and are essential for establishing and maintaining a valid session, specifying client options, and enabling various Salesforce API features. They can include standard headers such as SessionHeader for session identification, CallOptions for client-specific settings, and LoginScopeHeader for scoping login requests, as well as custom headers tailored to specific integration needs. Proper configuration of these headers ensures secure and successful communication with Salesforce services, enabling precise control over API interactions and session lifecycle.

            ## FIELD BEHAVIOR:
            - Defines the set of SOAP headers included in every request to the Salesforce API.
            - Facilitates passing of authentication credentials like session IDs or OAuth tokens.
            - Supports inclusion of metadata that controls API behavior or scopes requests.
            - Allows addition of custom headers required by specialized Salesforce integrations.
            - Headers persist across multiple API calls within the same session when set.
            - Modifies request context by influencing how Salesforce processes and authorizes API calls.
            - Enables fine-grained control over API call execution, such as setting query options or client identifiers.

            ## IMPLEMENTATION GUIDANCE:
            - Construct headers as key-value pairs conforming to Salesforce’s SOAP header XML schema.
            - Include mandatory authentication headers such as SessionHeader with valid session IDs.
            - Validate all header values to prevent injection attacks or malformed requests.
            - Use headers to specify client information, API versioning, or organizational context as needed.
            - Ensure header names and structures strictly follow Salesforce SOAP API documentation.
            - Secure sensitive header data to prevent unauthorized access or leakage.
            - Update headers appropriately when session tokens expire or when switching contexts.
            - Test header configurations thoroughly to confirm compatibility with Salesforce API versions.
            - Consider using namespaces and proper XML serialization to maintain SOAP compliance.
            - Handle errors gracefully when headers are missing or invalid to improve debugging.

