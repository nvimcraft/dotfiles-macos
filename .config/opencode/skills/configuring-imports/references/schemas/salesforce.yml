        \ tailor API request payloads, field selections, and response parsing logic.  \n- Consider object-level permissions\
        \ and authentication scopes when processing requests involving specific sObjectTypes.  \n## EXAMPLES:  \n- \"Account\"\
        \  \n- \"Contact\"  \n- \"Opportunity\"  \n- \"Lead\"  \n- \"CustomObject__c\"  \n- \"Case\"  \n- \"Campaign\"  \n\
        ## IMPORTANT NOTES:  \n- Custom Salesforce objects must be referenced using their exact API names, including the “__c”\
        \ suffix.  \n-"
    idLookup:
      type: object
      properties:
        extract:
          type: string
          x-cLocked: false
          description: |-
            Please specify which field from your export data should map to External ID. It is very important to pick a field that is both unique, and guaranteed to always have a value when exported (otherwise the Salesforce Upsert operation will fail). If sample data is available then a select list should be displayed here to help you find the right field from your export data. If sample data is not available then you will need to manually type the field id that should map to External ID.

            ## FIELD BEHAVIOR:
            - Specifies which field from the incoming data contains the External ID value
            - **Used for upsert operations ONLY**
            - Maps the incoming data field to the Salesforce External ID field specified in `upsert.externalIdField`
            - Must reference a field that exists in the incoming data payload
            - The field value must be unique and always populated to ensure reliable matching
            - Generates field mapping at runtime to match incoming records with Salesforce records

            ## WHEN TO USE:
            - **upsert operations ONLY** — REQUIRED when operation is "upsert"
            - Works together with `upsert.externalIdField` to enable External ID matching

            ## WHEN NOT TO USE:
            - **update** — use `whereClause` instead
            - **delete** — use `whereClause` instead
            - **addupdate** — use `whereClause` instead
            - **insert with ignoreExisting** — use `whereClause` instead

            ## IMPLEMENTATION GUIDANCE:
            - Choose a field from incoming data that contains unique, non-null values
            - Ensure the field is always populated in the incoming records to prevent operation failures
            - This field's value will be matched against the Salesforce External ID field specified in `upsert.externalIdField`
            - Use the exact field name as it appears in the incoming data (case-sensitive)
            - If sample data is available, validate that the field exists and has appropriate values
            - Test with sample data to ensure matching works correctly before production deployment

            ## EXAMPLE:

            ### Upsert by External ID:
            ```json
            {
              "operation": "upsert",
              "idLookup": {
                "extract": "CustomerNumber"
              },
              "upsert": {
                "externalIdField": "External_ID__c"
              }
            }
            ```
            Maps incoming field "CustomerNumber" → Salesforce field "External_ID__c"

            **How it works:**
            - Incoming record has `{"CustomerNumber": "CUST-12345", "Name": "John"}`
            - System extracts "CUST-12345" from CustomerNumber
            - Searches Salesforce External_ID__c field for "CUST-12345"
            - If found: updates the existing record
            - If not found: creates a new record with External_ID__c = "CUST-12345"

            ## COMMON FIELD NAMES:
            - "ExternalId" — incoming field containing external identifier
            - "CustomerId" — incoming field with unique customer number
            - "AccountNumber" — incoming field with account number
            - "SourceSystemId" — incoming field from source system

            ## IMPORTANT NOTES:
            - **ONLY use for upsert operations**
            - For all other operations (update, delete, addupdate, insert with ignoreExisting), use `whereClause` instead
            - Field must exist in incoming data and be consistently populated
            - Works with `upsert.externalIdField` to enable External ID matching
            - Missing or null values will cause the upsert operation to fail
            - Field name is case-sensitive and must match exactly
            - If both `extract` and `whereClause` are set, `extract` takes precedence for upsert
        whereClause:
          type: string
          x-cLocked: false
          description: |-
            To determine if a record exists in Salesforce, define a SOQL query WHERE clause for the sObject type selected above. For example, if you are importing contact records with a unique email, your WHERE clause should identify contacts with the same email.

            Handlebars statements are allowed, and more complex WHERE clauses can contain AND and OR logic. For example, when the product name alone is not unique, you can define a WHERE clause to find any records where the product name exists AND the product also belongs to a specific product family, resulting in a unique product record that matches both criteria.

            To find string values that contain spaces, wrap them in single quotes, for example:

            Name = 'John Smith'

            ## FIELD BEHAVIOR:
            - Specifies a SOQL conditional expression to match existing records in Salesforce
            - Omit the "WHERE" keyword - only provide the condition expression
            - Supports Handlebars {{fieldName}} syntax to reference incoming data fields
            - Supports SOQL operators: =, !=, >, <, >=, <=, LIKE, IN, NOT IN
            - Supports logical operators: AND, OR, NOT
            - Can use parentheses for grouping complex conditions
            - The clause is evaluated for each incoming record to find matching Salesforce records

            ## WHEN TO USE (REQUIRED FOR):
            - **update** — REQUIRED to identify which records to update
            - **delete** — REQUIRED to identify which records to delete
            - **addupdate** — REQUIRED to identify existing records (update if found, insert if not)
            - **insert with ignoreExisting: true** — REQUIRED to check if records exist (skip if found)

            ## WHEN NOT TO USE:
            - **upsert** — DO NOT use; use `extract` instead
            - **insert without ignoreExisting** — Not needed for simple inserts

            ## IMPLEMENTATION GUIDANCE:
            - Write the clause following SOQL syntax rules, omitting the "WHERE" keyword
            - Use {{fieldName}} syntax to reference values from incoming records
            - Wrap string values containing spaces in single quotes: `Name = '{{FullName}}'`
            - Numeric and boolean values don't need quotes: `Age = {{Age}}`
            - Use indexed fields (Email, External ID) for better performance
            - Keep the clause selective to minimize records returned
            - Validate syntax before deployment to prevent runtime errors

            ## EXAMPLES:

            ### Update by Email:
            ```json
            {
              "operation": "update",
              "idLookup": {
                "whereClause": "Email = '{{Email}}'"
              }
            }
            ```
            Finds records with matching Email for update

            ### Insert with ignore existing by Email:
            ```json
            {
              "operation": "insert",
              "ignoreExisting": true,
              "idLookup": {
                "whereClause": "Email = '{{Email}}'"
              }
            }
            ```
            Checks if a record with matching Email exists; if found, skips creation

            ### Addupdate (create or update) by Email:
            ```json
            {
              "operation": "addupdate",
              "idLookup": {
                "whereClause": "Email = '{{Email}}'"
              }
            }
            ```
            Updates if Email matches, creates new record if not found

            ### Delete by Account Number:
            ```json
            {
              "operation": "delete",
              "idLookup": {
                "whereClause": "AccountNumber = '{{AcctNum}}'"
              }
            }
            ```
            Finds records with matching AccountNumber for deletion

            ### Complex AND logic:
            ```json
            {
              "operation": "update",
              "idLookup": {
                "whereClause": "Name = '{{ProductName}}' AND ProductFamily__c = '{{Family}}'"
              }
            }
            ```
            Matches records where both Name AND ProductFamily match

            ### Complex OR logic:
            ```json
            {
              "operation": "update",
              "idLookup": {
                "whereClause": "Email = '{{Email}}' OR Phone = '{{Phone}}'"
              }
            }
            ```
            Matches records where Email OR Phone matches

            ### String with spaces:
            ```json
            {
              "operation": "update",
              "idLookup": {
                "whereClause": "Name = '{{FullName}}'"
              }
            }
            ```
            Note: Single quotes around {{FullName}} handle names with spaces like "John Smith"

            ## IMPORTANT NOTES:
            - **REQUIRED** for update, delete, addupdate, and insert (with ignoreExisting)
            - DO NOT use for upsert operations - use `extract` instead
            - Use {{fieldName}} to reference incoming data fields
            - String values with spaces must be wrapped in single quotes
            - Numeric and boolean values don't need quotes
            - Poor clause design can impact performance and hit governor limits
            - Always test in sandbox before production deployment
      description: |-
        Configuration for looking up existing Salesforce records. **This object should ONLY contain either `extract` OR `whereClause` - NOT both, and NOT operation or other properties.**

        ## WHAT THIS OBJECT CONTAINS:
        This object should contain ONLY ONE of these properties:
        - `extract` — for upsert operations ONLY
        - `whereClause` — for update, delete, addupdate, and insert (with ignoreExisting)

        **DO NOT include operation, upsert, or any other properties here** - those belong at the parent salesforce level.

        ## FIELD BEHAVIOR:
        - Contains two strategies for finding existing records: `extract` and `whereClause`
        - **`extract`**: Used ONLY for upsert operations
        - **`whereClause`**: Used for update, delete, addupdate, and insert (with ignoreExisting)
        - Generates field mapping or SOQL queries at runtime to match records
        - Critical for preventing duplicate record creation and enabling record updates

        ## WHEN TO USE EACH FIELD:

        ### Use `extract` (upsert ONLY):
        - **upsert** — REQUIRED: Maps incoming field to External ID field

        ### Use `whereClause` (all other operations):
        - **update** — REQUIRED: Identifies records to update via SOQL query
        - **delete** — REQUIRED: Identifies records to delete via SOQL query
        - **addupdate** — REQUIRED: Identifies existing records via SOQL query
        - **insert with ignoreExisting: true** — REQUIRED: Checks if records exist via SOQL query

        ### Leave empty:
        - **insert without ignoreExisting** — No lookup needed for simple inserts

        ## WHAT TO SET (idLookup object content):

        ### For upsert:
        ```json
        {
          "extract": "CustomerNumber"
        }
        ```

        ### For update/delete/addupdate:
        ```json
        {
          "whereClause": "Email = '{{Email}}'"
        }
        ```

        ## PARENT CONTEXT EXAMPLES (for reference):
        These show the complete parent-level structure. **idLookup itself should only contain extract or whereClause.**

        ### Upsert (parent context):
        ```json
        {
          "operation": "upsert",
          "idLookup": {
            "extract": "CustomerNumber"
          },
          "upsert": {
            "externalIdField": "External_ID__c"
          }
        }
        ```

        ### Update (parent context):
        ```json
        {
          "operation": "update",
          "idLookup": {
            "whereClause": "Email = '{{Email}}'"
          }
        }
        ```

        ## IMPLEMENTATION GUIDANCE:
        - Use `extract` ONLY for upsert operations (with `upsert.externalIdField`)
        - Use `whereClause` for update, delete, addupdate, and insert with ignoreExisting
        - Do not set both `extract` and `whereClause` for the same operation
        - **ONLY set extract or whereClause - do not nest operation or other properties**
        - Ensure the lookup strategy matches the operation type
        - Test thoroughly in sandbox before production deployment

        ## IMPORTANT NOTES:
        - **This object ONLY contains `extract` or `whereClause`**
        - **`extract`** is for upsert ONLY - maps to External ID field
        - **`whereClause`** is for all other operations requiring lookups
        - Do NOT nest `operation`, `upsert`, or other properties here - those belong at the parent salesforce level
        - For upsert: `extract` + `upsert.externalIdField` work together (both at salesforce level)
        - For other operations: `whereClause` enables SOQL-based record matching
        - Incorrect configuration can cause duplicates or failed operations
    upsert:
      type: object
      properties:
        externalIdField:
          type: string
          x-cLocked: false
          description: |-
            Specifies the API name of the External ID field in Salesforce that will be used to match records during an upsert operation. This is the TARGET field in Salesforce, while `idLookup.extract` specifies the SOURCE field from incoming data.

            ## FIELD BEHAVIOR:
            - Identifies which Salesforce field serves as the external ID for record matching
            - Must be a field marked as "External ID" in Salesforce object configuration
            - Works together with `idLookup.extract` to enable upsert matching
            - The field must be indexed and unique in Salesforce
            - Supports text, number, and email field types configured as external IDs
            - Required when `operation: "upsert"`

            ## HOW IT WORKS WITH idLookup.extract:
            - **`idLookup.extract`**: Specifies which incoming data field contains the matching value (e.g., "CustomerNumber")
            - **`externalIdField`**: Specifies which Salesforce field to match against (e.g., "External_ID__c")
            - Together they create the match: incoming "CustomerNumber" → Salesforce "External_ID__c"

            ## IMPLEMENTATION GUIDANCE:
            - Use the exact Salesforce API name of the field (case-sensitive)
            - Verify the field is marked as "External ID" in Salesforce object settings
            - Ensure the field is indexed for optimal performance
            - Confirm the integration user has read/write access to this field
            - The field must have unique values to prevent ambiguous matches
            - Test in sandbox before production to verify configuration

            ## EXAMPLES:

            ### Standard External ID field:
            ```
            "AccountNumber"
            ```
            Standard Account field marked as External ID

            ### Custom External ID field:
            ```
            "Custom_External_Id__c"
            ```
            Custom field marked as External ID

            ### Email as External ID:
            ```
            "Email"
            ```
            Email field configured as External ID on Contact

            ### NetSuite ID as External ID:
            ```
            "netsuite_conn__NetSuite_Id__c"
            ```
            NetSuite connector External ID field

            ## HOW IT WORKS (Parent Context):
            At the parent `salesforce` level, the complete configuration looks like:
            ```json
            {
              "operation": "upsert",
              "idLookup": {
                "extract": "CustomerNumber"
              },
              "upsert": {
                "externalIdField": "External_ID__c"
              }
            }
            ```
            Where:
            - `operation: "upsert"` — at salesforce level
            - `idLookup.extract: "CustomerNumber"` — incoming field, at salesforce level
            - `upsert.externalIdField: "External_ID__c"` — **THIS field**, inside upsert object

            ## COMMON EXTERNAL ID FIELDS:
            - "AccountNumber" — standard Account field
            - "Email" — when configured as External ID on Contact
            - "Custom_External_Id__c" — custom field on any object
            - "External_ID__c" — common naming convention
            - "Source_System_Id__c" — for multi-system integrations

            ## IMPORTANT NOTES:
            - Field must be explicitly marked as "External ID" in Salesforce
            - Not all fields can be External IDs (must be text, number, or email type)
            - Missing or null values in this field will cause upsert to fail
            - If multiple records match the External ID, upsert will fail
            - Always use with `idLookup.extract` for upsert operations
      description: |-
