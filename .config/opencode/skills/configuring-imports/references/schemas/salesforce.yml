            - Cannot be null or empty for Content Version records.
            - Critical for preserving document integrity, version tracking, and enabling collaborative document management.
            - Changes to this ID are not permitted post-creation to avoid breaking version linkages.
            - Plays a key role in Salesforce’s document sharing, access control, and audit capabilities.

