        isPrivate:
          type: boolean
          description: |-
            Indicates whether the attachment is designated as private, restricting its visibility exclusively to users who have been explicitly authorized to access it. This setting is critical for maintaining confidentiality and ensuring that sensitive or proprietary information contained within attachments is accessible only to appropriate personnel. When marked as private, the attachment’s visibility is constrained based on the user’s permissions and the sharing settings of the parent record, thereby reinforcing data security within the Salesforce environment. This field directly controls the scope of access to the attachment, dynamically influencing who can view or interact with it, and must be managed carefully to align with organizational privacy policies and compliance requirements.

            ## FIELD BEHAVIOR:
            - When set to true, the attachment is accessible only to users with explicit authorization, effectively hiding it from unauthorized users.
            - When set to false or omitted, the attachment inherits the visibility of its parent record and is accessible to all users who have access to that record.
            - Directly affects the attachment’s visibility scope and access control within Salesforce.
            - Changes to this field immediately impact user access permissions for the attachment.
            - Does not override broader organizational sharing settings but further restricts access.
            - The privacy setting applies in conjunction with existing record-level and object-level security controls.

            ## IMPLEMENTATION GUIDANCE:
            - Use this field to enforce strict data privacy and protect sensitive attachments in compliance with organizational policies and regulatory requirements.
            - Ensure that user roles, profiles, and sharing rules are properly configured to respect this privacy setting.
            - Validate that the value is a boolean (true or false) to prevent data inconsistencies.
            - Evaluate the implications on existing sharing rules and record-level security before modifying this field.
            - Consider implementing audit logging to track changes to this privacy setting for security and compliance purposes.
            - Test changes in a sandbox environment to understand the impact on user access before deploying to production.
            - Communicate changes to relevant stakeholders to avoid confusion or unintended access issues.

            ## EXAMPLES:
            - `true` — The attachment is private and visible only to users explicitly authorized to access it.
            - `false` — The attachment is public within the context of the parent record and visible to all users who have access to that record.

            ## IMPORTANT NOTES:
            - Setting this field to true does not grant access to users who lack permission to view the parent record; it only further restricts access.
