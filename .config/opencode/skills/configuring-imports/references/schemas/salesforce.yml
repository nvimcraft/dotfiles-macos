            - `{ "LoginScopeHeader": { "organizationId": "00Dxx0000001gEREAY" } }` — scopes login to a specific organization.
            - `{ "CustomHeader": { "customField": "customValue" } }` — example of a
        batchSize:
          type: number
          description: |-
            The number of records to be processed in each batch during Salesforce SOAP API operations. This property controls the size of data chunks sent or retrieved in a single API call, optimizing performance and resource utilization by balancing throughput and system resource consumption. Adjusting the batch size directly impacts the number of API calls made, the processing speed, memory usage, and network load, enabling fine-tuning of data operations to suit specific environment constraints and performance goals. Proper configuration of batchSize helps prevent API throttling, reduces the risk of timeouts, and ensures efficient handling of large datasets by segmenting data into manageable portions.

            ## FIELD BEHAVIOR:
            - Determines the count of records included in each batch request to the Salesforce SOAP API.
            - Directly influences the total number of API calls required when handling large datasets.
            - Affects processing throughput, latency, and memory usage during data operations.
            - Can be dynamically adjusted to optimize performance based on system capabilities and network conditions.
            - Impacts error handling and retry mechanisms by controlling batch granularity.
            - Influences network load and the likelihood of encountering API limits or timeouts.

            ## IMPLEMENTATION GUIDANCE:
            - Choose a batch size that adheres to Salesforce API limits and recommended best practices.
            - Balance between larger batch sizes (which reduce API calls but increase memory and processing load) and smaller batch sizes (which increase API calls but reduce resource consumption).
            - Ensure the batchSize value is a positive integer within the allowed range for the specific Salesforce operation.
            - Continuously monitor API response times, error rates, and resource utilization to fine-tune the batch size for optimal performance.
            - Default to Salesforce-recommended batch sizes when uncertain or when starting configuration.
            - Consider network stability and latency when selecting batch size to minimize timeouts and failures.
            - Validate batch size compatibility with other integration components and middleware.
            - Test batch size settings in a staging environment before deploying to production to avoid unexpected failures.

