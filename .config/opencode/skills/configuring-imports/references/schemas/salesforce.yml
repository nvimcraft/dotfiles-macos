          description: |-
            The pathOnClient property specifies the original file path of the content as it exists on the client machine before being uploaded to Salesforce. This path serves as a precise reference to the source location of the file on the user's local system, facilitating identification, auditing, and tracking of the file's origin. It captures either the full absolute path or a relative path depending on the client environment and upload context, accurately reflecting the exact location from which the file was sourced. This information is primarily used for informational, diagnostic, and user interface purposes within Salesforce and does not influence how the file is stored, accessed, or secured in the system.

            ## FIELD BEHAVIOR:
            - Represents the full absolute or relative file path on the client device where the file was stored prior to upload.
            - Automatically populated during file upload processes when the client environment provides this information.
            - Used mainly for reference, auditing, and user interface display to provide context about the file’s origin.
            - May be empty, null, or omitted if the file was not uploaded from a client device or if the path information is unavailable or restricted.
            - Does not influence file storage, retrieval, or access permissions within Salesforce.
            - Retains the original formatting and syntax as provided by the client system at upload time.

