        \ defining the schema context of the API request, determining which fields are relevant, and directing the operation\
        \ to the correct Salesforce data entity. It plays a critical role in data validation, processing logic, and endpoint\
        \ routing within the Salesforce environment, ensuring that operations such as create, update, delete, or query are\
        \ executed against the intended object type with precision. Accurate specification of sObjectType enables dynamic\
        \ adjustment of request payloads and response handling based on the object’s schema and enforces compliance with Salesforce’s\
        \ API naming conventions and permissions model.  \n## FIELD BEHAVIOR:  \n- Identifies the specific Salesforce object\
        \ (sObject) type targeted by the API operation.  \n- Determines the applicable schema, field availability, and validation\
        \ rules based on the selected object.  \n- Must exactly match a valid Salesforce object API name recognized by the\
        \ connected Salesforce instance, including case sensitivity.  \n- Routes the API request to the appropriate Salesforce\
        \ object endpoint for the intended operation.  \n- Influences dynamic field mapping, data transformation, and response\
        \ parsing processes.  \n- Supports both standard and custom Salesforce objects, with custom objects requiring the\
        \ “__c” suffix.  \n## IMPLEMENTATION GUIDANCE:  \n- Validate sObjectType values against the current Salesforce object\
        \ metadata in the target environment to prevent invalid requests.  \n- Enforce exact case-sensitive matching with\
        \ Salesforce API object names (e.g., \"Account\" not \"account\").  \n- Support and recognize both standard objects\
        \ and custom objects, ensuring custom objects include the “__c” suffix.  \n- Implement robust error handling for invalid,\
