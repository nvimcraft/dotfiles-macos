            - Should be dynamically obtained from Salesforce API responses when creating or querying attachments to ensure accuracy.
            - Avoid hardcoding or manually entering IDs to prevent data integrity issues and API errors.
            - Validate the ID format programmatically before use to ensure compatibility with Salesforce API requirements.
            - Prefer using the 18-character ID in integration scenarios to minimize case sensitivity issues.

            ## EXAMPLES:
