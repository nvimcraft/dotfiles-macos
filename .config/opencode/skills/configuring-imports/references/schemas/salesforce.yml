    removeNonSubmittableFields:
      type: boolean
      description: |-
        Indicates whether fields that are not eligible for submission to Salesforce—such as read-only, system-generated, formula, or otherwise restricted fields—should be automatically excluded from the data payload before it is sent. This feature helps prevent submission errors by ensuring that only valid, submittable fields are included in the API request, thereby improving data integrity and reducing the likelihood of operation failures. It operates exclusively on the outgoing submission payload without modifying the original source data, making it a safe and effective way to sanitize data before interaction with Salesforce APIs.

        ## FIELD BEHAVIOR:
        - When enabled (set to true), the system analyzes the outgoing data payload and removes any fields identified as non-submittable based on Salesforce metadata, field-level security, and API constraints.
        - When disabled (set to false) or omitted, all fields present in the payload are submitted as-is, which may lead to errors if restricted, read-only, or system-managed fields are included.
        - Enhances data integrity by proactively filtering out fields that could cause rejection or failure during Salesforce data operations.
        - Applies only to the outgoing submission payload, ensuring the original source data remains unchanged and intact.
        - Dynamically adapts to different Salesforce objects, API versions, and user permissions by referencing up-to-date metadata and security settings.

        ## IMPLEMENTATION GUIDANCE:
        - Enable this flag in integration scenarios where the data schema may include fields that Salesforce does not accept for the target object or API version.
        - Maintain an up-to-date cache or real-time access to Salesforce metadata to accurately reflect field-level permissions, submittability, and API changes.
        - Implement logging or reporting mechanisms to track which fields are removed, aiding in auditing, troubleshooting, and transparency.
        - Use in conjunction with other data validation, transformation, and permission-checking steps to ensure clean, compliant data submissions.
        - Thoroughly test in development and staging environments to understand the impact on data flows, error handling, and downstream processes.
        - Consider user roles and permissions, as submittability may vary depending on the authenticated user's access rights and profile settings.

        ## EXAMPLES:
        - `removeNonSubmittableFields: true` — Automatically removes read-only or system-managed fields such as CreatedDate, LastModifiedById, or formula fields before submission.
        - `removeNonSubmittableFields: false` — Submits all fields, potentially causing errors if restricted or read-only fields are included.
        - Omitting the property defaults to false, meaning no automatic removal of non-submittable
