        ## DECISION:
        **Return true/include this component if `operation: "upsert"` is set. This is REQUIRED for all upsert operations.**

        ## WHAT TO SET:
        **This object should ONLY contain:**
        ```json
        {
          "externalIdField": "External_ID__c"
        }
        ```

        **DO NOT include operation, idLookup, or any other properties here** - those belong at the parent salesforce level.

        ## PARENT CONTEXT (for reference only):
        At the parent `salesforce` level, you will also set:
        - `operation: "upsert"` (at salesforce level)
        - `idLookup.extract` (at salesforce level)
        - `upsert.externalIdField` (THIS object)

        ## IMPLEMENTATION GUIDANCE:
        - Always set `externalIdField` when using upsert
