            - `batchSize: 200` — Processes 200 records per batch, a common default for many Salesforce operations.
            - `batchSize: 500` — Processes 500 records per batch, often the maximum allowed for certain Salesforce SOAP API calls.
            - `batchSize: 50` — Processes smaller batches suitable for environments with limited memory or network bandwidth.
            - `batchSize: 100` — A moderate batch size balancing throughput and resource usage in typical scenarios.

