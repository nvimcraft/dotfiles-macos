NetsuiteDistributed:
  type: object
  description: |
    Configuration for NetSuite Distributed (SuiteApp 2.0) import operations.
    This is the primary sub-schema for NetSuiteDistributedImport adaptorType.
    The API field name is "netsuite_da".

    ## KEY FIELDS
    - operation: REQUIRED — the NetSuite operation (add, update, addupdate, etc.)
    - recordType: REQUIRED — the NetSuite record type (e.g., "customer", "salesOrder")
    - mapping: field mappings from source data to NetSuite fields
    - internalIdLookup: how to find existing records for update/addupdate/delete
    - restletVersion: defaults to "suiteapp2.0", rarely needs to be changed
  properties:
    operation:
      type: string
      enum:
        - add
        - update
        - addupdate
        - attach
        - detach
        - delete
      x-lowercase: true
      description: |
        The NetSuite operation to perform. REQUIRED. This is a plain string value, NOT an object.

        ## VALID VALUES
        - "add" — Create new records only.
        - "update" — Update existing records. Requires internalIdLookup.
        - "addupdate" — Upsert: update if found, create if not. Requires internalIdLookup. Most common.
        - "attach" — Attach a record to another record.
        - "detach" — Detach a record from another record.
        - "delete" — Delete records. Requires internalIdLookup.

        ## GUIDANCE
        - Default to "addupdate" when user says "sync", "upsert", or "create or update".
        - Use "add" when user says "create" or "insert" without mentioning updates.
        - For "update", "addupdate", and "delete", you MUST also set internalIdLookup.

        ## IMPORTANT
        This field is a string, NOT an object. Set it directly: "operation": "addupdate"
        Do NOT send {"type": "addupdate"} — that causes a Cast error.
    recordType:
      type: string
      description: |
        The NetSuite record type to import into. REQUIRED.

        Must match a valid NetSuite record type identifier.

        ## EXAMPLES
        - "customer"
        - "salesOrder"
        - "invoice"
        - "purchaseOrder"
        - "vendorBill"
        - "itemFulfillment"
        - "employee"
        - "inventoryItem"
        - "customrecord_myrecord" (custom record types)
    recordIdentifier:
      type: string
      description: |
        Custom record identifier, used to identify the specific record type when
        importing into custom record types.
    recordTypeId:
      type: string
      description: |
        The internal record type ID. Used for custom record types in NetSuite where
        the numeric ID is needed in addition to the recordType string.
    restletVersion:
      type: string
      enum:
        - suitebundle
        - suiteapp1.0
        - suiteapp2.0
      x-lowercase: true
      description: |
        The version of the NetSuite RESTlet to use. This is a plain STRING, NOT an object.

        Defaults to "suiteapp2.0" when useSS2Restlets is true, "suitebundle" otherwise.
        Almost always "suiteapp2.0" for modern integrations — rarely needs to be explicitly set.

        IMPORTANT: Set as a plain string value, e.g. "suiteapp2.0"
        Do NOT send {"type": "suiteapp2.0"} — that causes a Cast error.
    useSS2Restlets:
      type: boolean
      description: |
        Whether to use SuiteScript 2.0 RESTlets. Defaults to true for modern integrations.
        When true, restletVersion defaults to "suiteapp2.0".
    missingOrCorruptedDAConfig:
      type: boolean
      description: |
        Flag indicating whether the Distributed Adaptor configuration is missing or corrupted.
        Set by the system — do not set manually.
    batchSize:
      type: number
      description: |
        Number of records to process per batch. Controls how many records are sent
        to NetSuite in a single API call. Typical values: 50-200.
    internalIdLookup:
      type: object
      description: |
        Configuration for looking up existing NetSuite records by internal ID.
        REQUIRED when operation is "update", "addupdate", or "delete".

        Defines how to find existing records in NetSuite to match against incoming data.
      properties:
        extract:
          type: string
          description: |
            The path in the source record to extract the lookup value from.
            Example: "internalId" or "externalId"
        searchField:
          type: string
          description: |
            The NetSuite field to search against.
            Example: "externalId", "email", "name", "tranId"
        operator:
          type: string
          description: |
            The comparison operator for the lookup.
            Example: "is", "contains", "startswith"
        expression:
          type: string
          description: |
            A NetSuite search expression for complex lookup conditions.
            Used for multi-field or conditional lookups.
    hooks:
      type: object
      description: |
        Script hooks for custom processing at different stages of the import.
        Each hook references a SuiteScript file and function.
      properties:
        preMap:
          type: object
          description: Runs before field mapping is applied.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
        postMap:
          type: object
          description: Runs after field mapping, before submission to NetSuite.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
        postSubmit:
          type: object
          description: Runs after the record is submitted to NetSuite.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
    mapping:
      type: object
      description: |
        Field mappings that define how source data fields map to NetSuite record fields.
        Contains both body-level fields and sublist (line-item) fields.
      properties:
        fields:
          type: array
          items:
            type: object
            properties:
              extract:
                type: string
                description: |
                  Path in the source record to extract the value from.
                  Use dot notation for nested fields (e.g., "address.city").
              generate:
                type: string
                description: |
                  The NetSuite field ID to write the value to (e.g., "companyname", "email", "subsidiary").
              hardCodedValue:
                type: string
                description: |
                  A static value to always use instead of extracting from source data.
                  Mutually exclusive with extract.
              lookupName:
                type: string
                description: Reference to a lookup defined in netsuite_da.lookups by name.
              dataType:
                type: string
                description: |
                  Data type hint for the field value (e.g., "string", "number", "date", "boolean").
              internalId:
                type: boolean
                description: Whether the value is a NetSuite internal ID reference.
              immutable:
                type: boolean
                description: When true, this field is only set on record creation, not on updates.
              discardIfEmpty:
                type: boolean
                description: When true, skip this field mapping if the extracted value is empty.
              extractDateFormat:
                type: string
                description: |
                  Date format of the extracted value (e.g., "MM/DD/YYYY", "ISO8601").
                  Used to parse date strings from source data.
              extractDateTimezone:
                type: string
                description: Timezone of the extracted date value (e.g., "America/New_York").
              subRecordMapping:
                type: object
                description: Nested mapping for NetSuite subrecord fields (e.g., address, inventory detail).
              conditional:
                type: object
                description: |
                  Conditional logic for when to apply this field mapping.
                properties:
                  lookupName:
                    type: string
                    description: Lookup to evaluate for the condition.
                  when:
                    type: string
                    enum:
                      - record_created
                      - record_updated
                      - extract_not_empty
                      - lookup_not_empty
                      - lookup_empty
                      - ignore_if_set
                    description: |
                      When to apply this mapping:
                      - record_created: only on new records
                      - record_updated: only on existing records
                      - extract_not_empty: only when extracted value is non-empty
                      - lookup_not_empty: only when lookup returns a value
                      - lookup_empty: only when lookup returns no value
                      - ignore_if_set: skip if field already has a value
          description: |
            Body-level field mappings. Each entry maps a source field to a NetSuite body field.
        lists:
          type: array
          items:
            type: object
            properties:
              generate:
                type: string
                description: |
                  The NetSuite sublist ID (e.g., "item" for sales order line items,
                  "addressbook" for address sublists).
              jsonPath:
                type: string
                description: |
                  JSON path in the source data that contains the array of sublist records.
              fields:
                type: array
                items:
                  type: object
                  properties:
                    extract:
                      type: string
                      description: Path in the sublist record to extract the value from.
                    generate:
                      type: string
                      description: NetSuite sublist field ID to write to.
                    hardCodedValue:
                      type: string
                      description: Static value for this sublist field.
                    lookupName:
                      type: string
                      description: Reference to a lookup by name.
                    dataType:
                      type: string
                      description: Data type hint for the field value.
                    internalId:
                      type: boolean
                      description: Whether the value is a NetSuite internal ID reference.
                    isKey:
                      type: boolean
                      description: Whether this field is a key field for matching existing sublist lines.
                    immutable:
                      type: boolean
                      description: Only set on record creation, not updates.
                    discardIfEmpty:
                      type: boolean
                      description: Skip if the extracted value is empty.
                    extractDateFormat:
                      type: string
                      description: Date format of the extracted value.
                    extractDateTimezone:
                      type: string
                      description: Timezone of the extracted date value.
                    subRecordMapping:
                      type: object
                      description: Nested mapping for subrecord fields within the sublist.
                    conditional:
                      type: object
                      properties:
                        lookupName:
                          type: string
                        when:
                          type: string
                          enum:
                            - record_created
                            - record_updated
                            - extract_not_empty
                            - lookup_not_empty
                            - lookup_empty
                            - ignore_if_set
                description: Field mappings for each column in the sublist.
          description: |
            Sublist (line-item) mappings. Each entry maps source data to a NetSuite sublist.
    lookups:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: |
              Unique name for this lookup, referenced by lookupName in field mappings.
          recordType:
            type: string
            description: |
              NetSuite record type to search (e.g., "customer", "item").
          searchField:
            type: string
            description: |
              NetSuite field to search against (e.g., "email", "externalId", "name").
          resultField:
            type: string
            description: |
              Field from the lookup result to return (e.g., "internalId").
          expression:
            type: string
            description: |
              NetSuite search expression for complex lookup conditions.
          operator:
            type: string
            description: |
              Comparison operator (e.g., "is", "contains", "startswith").
          includeInactive:
            type: boolean
            description: Whether to include inactive records in lookup results.
          useDefaultOnMultipleMatches:
            type: boolean
            description: When true, use the default value if multiple records match the lookup.
          allowFailures:
            type: boolean
            description: When true, lookup failures do not stop the import.
          map:
            type: object
            description: Static value mapping for lookup results (key-value pairs).
          default:
            type: string
            description: Default value when lookup returns no results.
      description: |
        Lookup definitions used to resolve reference values from NetSuite.
        Referenced by name from field mappings via the lookupName property.
    rawOverride:
      type: object
      description: |
        Raw override object for advanced use cases. When useRawOverride is true,
        this object is sent directly to the NetSuite API, bypassing normal mapping.
    useRawOverride:
      type: boolean
      description: |
        When true, uses rawOverride instead of the normal mapping configuration.
    isMigrated:
      type: boolean
      description: |
        System flag indicating whether this import was migrated from a legacy format.
    preferences:
      type: object
      properties:
        ignoreReadOnlyFields:
          type: boolean
          description: When true, silently skip read-only fields instead of raising errors.
        warningAsError:
          type: boolean
          description: When true, treat NetSuite warnings as errors that stop the import.
        skipCustomMetadataRequests:
          type: boolean
          description: When true, skip fetching custom field metadata to improve performance.
      description: |
        Import behavior preferences that control how NetSuite handles the import operation.
    retryUpdateAsAdd:
      type: boolean
      description: |
        When true, if an update fails because the record doesn't exist, automatically
        retry as an add operation. Useful for initial syncs where records may not exist yet.
    isFileProvider:
      type: boolean
      description: |
        Whether this import handles files in the NetSuite File Cabinet.
    file:
      type: object
      description: |
        File cabinet configuration for file-based imports into NetSuite.
      properties:
        name:
          type: string
          description: Filename for the file in NetSuite File Cabinet.
        fileType:
          type: string
          description: |
            NetSuite file type (e.g., "PDF", "CSV", "PLAINTEXT", "EXCEL", "XML").
        folder:
          type: string
          description: Folder path or name in the NetSuite File Cabinet.
        folderInternalId:
          type: string
          description: Internal ID of the target folder in NetSuite File Cabinet.
        internalId:
          type: string
          description: Internal ID of an existing file to update.
        backupFolderInternalId:
          type: string
          description: Internal ID of a backup folder for file versioning.
    customFieldMetadata:
      type: object
      description: |
        Metadata about custom fields on the target record type.
        Populated by the system from NetSuite metadata — do not set manually.
