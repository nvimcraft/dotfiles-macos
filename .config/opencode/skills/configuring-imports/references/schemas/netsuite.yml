            \ requirements, and compliance before enabling this behavior.  \n- Coordinate with audit, logging, and monitoring\
            \ mechanisms to accurately capture which fields were updated, skipped, or ignored.  \n- Consider the implications\
            \ for user feedback and error handling in client applications consuming the API.  \n\n## EXAMPLES:  \n- ignoreReadOnlyFields:\
            \ true — Update operations will silently skip read-only fields, avoiding errors and allowing partial updates to\
            \ succeed.  \n- ignoreReadOnlyFields: false — Update operations will attempt to modify all fields, potentially\
