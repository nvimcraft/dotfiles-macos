NetSuite:
  type: object
  description: Configuration for NetSuite exports
  properties:
    lookups:
      type: object
      properties:
        type:
          type: string
          description: |-
            The type property specifies the category or classification of the lookup being referenced. It defines the nature or kind of data that the lookup represents, enabling the system to handle it appropriately based on its type.

            ## FIELD BEHAVIOR:
            - Determines the category or classification of the lookup.
            - Influences how the lookup data is processed and validated.
            - Helps in filtering or grouping lookups by their type.
            - Typically represented as a string or enumerated value indicating the lookup category.

            ## IMPLEMENTATION GUIDANCE:
            - Define a clear set of allowed values or an enumeration for the type to ensure consistency.
            - Validate the type value against the predefined set during data input or API requests.
            - Use the type property to drive conditional logic or UI rendering related to the lookup.
            - Document all possible type values and their meanings for API consumers.

            ## EXAMPLES:
            - "country" — representing a lookup of countries.
            - "currency" — representing a lookup of currency codes.
            - "status" — representing a lookup of status codes or states.
            - "category" — representing a lookup of item categories.

            ## IMPORTANT NOTES:
            - The type value should be consistent across the system to avoid ambiguity.
            - Changing the type of an existing lookup may affect dependent systems or data integrity.
            - The type property is essential for distinguishing between different lookup datasets.

            ## DEPENDENCY CHAIN:
            - May depend on or be referenced by other properties that require lookup data.
            - Used in conjunction with lookup values or keys to provide meaningful data.
            - Can influence validation rules or business logic applied to the lookup.

            ## TECHNICAL DETAILS:
            - Typically implemented as a string or an enumerated type in the API schema.
            - Should be indexed or optimized for quick filtering and retrieval.
            - May be case-sensitive or case-insensitive depending on system design.
            - Should be included in API documentation with all valid values listed.
        searchField:
          type: string
          description: |-
            searchField specifies the particular field or attribute within a dataset or index that the search operation should target. This property determines which field the search query will be applied to, enabling focused and efficient retrieval of relevant information.

            ## FIELD BEHAVIOR:
            - Defines the specific field in the data source to be searched.
            - Limits the search scope to the designated field, improving search precision.
            - Can accept field names as strings, corresponding to indexed or searchable attributes.
            - If omitted or null, the search may default to a predefined field or perform a broad search across multiple fields.

            ## IMPLEMENTATION GUIDANCE:
            - Ensure the field name provided matches exactly with the field names defined in the data schema or index.
            - Validate that the field is searchable and supports the type of queries intended.
            - Consider supporting nested or compound field names if the data structure is hierarchical.
            - Provide clear error handling for invalid or unsupported field names.
            - Allow for case sensitivity or insensitivity based on the underlying search engine capabilities.

            ## EXAMPLES:
            - "title" — to search within the title field of documents.
            - "author.name" — to search within a nested author name field.
            - "description" — to search within the description or summary field.
            - "tags" — to search within a list or array of tags associated with items.

            ## IMPORTANT NOTES:
            - The effectiveness of the search depends on the indexing and search capabilities of the specified field.
            - Using an incorrect or non-existent field name may result in no search results or errors.
            - Some fields may require special handling, such as tokenization or normalization, to support effective searching.
            - The property is case-sensitive if the underlying system treats field names as such.

            ## DEPENDENCY CHAIN:
            - Dependent on the data schema or index configuration defining searchable fields.
            - May interact with other search parameters such as search query, filters, or sorting.
            - Influences the search engine or database query construction.

            ## TECHNICAL DETAILS:
            - Typically represented as a string matching the field identifier in the data source.
            - May support dot notation for nested fields (e.g., "user.address.city").
            - Should be sanitized to prevent injection attacks or malformed queries.
            - Used by the search backend to construct field-specific query clauses.
        expression:
          type: string
          description: |-
            Expression used to define the criteria or logic for the lookup operation. This expression typically consists of a string that can include variables, operators, functions, or references to other data elements, enabling dynamic and flexible lookup conditions.

            ## FIELD BEHAVIOR:
            - Specifies the condition or formula that determines how the lookup is performed.
            - Can include variables, constants, operators, and functions to build complex expressions.
            - Evaluated at runtime to filter or select data based on the defined logic.
            - Supports dynamic referencing of other fields or parameters within the lookup context.

            ## IMPLEMENTATION GUIDANCE:
            - Ensure the expression syntax is consistent with the supported expression language or parser.
            - Validate expressions before execution to prevent runtime errors.
            - Support common operators (e.g., ==, !=, >, <, AND, OR) and functions as per the system capabilities.
            - Allow expressions to reference other properties or variables within the lookup scope.
            - Provide clear error messages if the expression is invalid or cannot be evaluated.

            ## EXAMPLES:
            - `"status == 'active' AND score > 75"`
            - `"userRole == 'admin' OR accessLevel >= 5"`
            - `"contains(tags, 'urgent')"`
            - `"date >= '2024-01-01' AND date <= '2024-12-31'"`

            ## IMPORTANT NOTES:
            - The expression must be a valid string conforming to the expected syntax.
            - Incorrect or malformed expressions may cause lookup failures or unexpected results.
            - Expressions should be designed to optimize performance, avoiding overly complex or resource-intensive logic.
            - The evaluation context (available variables and functions) should be clearly documented for users.

            ## DEPENDENCY CHAIN:
            - Depends on the lookup context providing necessary variables or data references.
            - May depend on the expression evaluation engine or parser integrated into the system.
            - Influences the outcome of the lookup operation and subsequent data processing.

            ## TECHNICAL DETAILS:
            - Typically represented as a string data type.
            - Parsed and evaluated by an expression engine or interpreter at runtime.
            - May support standard expression languages such as SQL-like syntax, JSONPath, or custom domain-specific languages.
            - Should handle escaping and quoting of string literals within the expression.
        resultField:
          type: string
          description: |-
            resultField specifies the name of the field in the lookup result that contains the desired value to be retrieved or used.

            ## FIELD BEHAVIOR:
            - Identifies the specific field within the lookup result data to extract.
            - Determines which piece of information from the lookup response is returned or processed.
            - Must correspond to a valid field name present in the lookup result structure.
            - Used to map or transform lookup data into the expected output format.

            ## IMPLEMENTATION GUIDANCE:
            - Ensure the field name matches exactly with the field in the lookup result, including case sensitivity if applicable.
            - Validate that the specified field exists in all possible lookup responses to avoid runtime errors.
            - Use this property to customize which data from the lookup is utilized downstream.
            - Consider supporting nested field paths if the lookup result is a complex object.

            ## EXAMPLES:
            - "email" — to extract the email address field from the lookup result.
            - "userId" — to retrieve the user identifier from the lookup data.
            - "address.city" — to access a nested city field within an address object in the lookup result.

            ## IMPORTANT NOTES:
            - Incorrect or misspelled field names will result in missing or null values.
            - The field must be present in the lookup response schema; otherwise, the lookup will not yield useful data.
            - This property does not perform any transformation; it only selects the field to be used.

            ## DEPENDENCY CHAIN:
            - Depends on the structure and schema of the lookup result data.
            - Used in conjunction with the lookup operation that fetches the data.
            - May influence downstream processing or mapping logic that consumes the lookup output.

            ## TECHNICAL DETAILS:
            - Typically a string representing the key or path to the desired field in the lookup result object.
            - May support dot notation for nested fields if supported by the implementation.
            - Should be validated against the lookup result schema during configuration or runtime.
        includeInactive:
          type: boolean
          description: |-
            IncludeInactive: Specifies whether to include inactive items in the lookup results.
            ## FIELD BEHAVIOR:
            - When set to true, the lookup results will contain both active and inactive items.
            - When set to false or omitted, only active items will be included in the results.
            - Affects the filtering logic applied during data retrieval for lookups.
            ## IMPLEMENTATION GUIDANCE:
            - Default the value to false if not explicitly provided to avoid unintended inclusion of inactive items.
            - Ensure that the data source supports filtering by active/inactive status.
            - Validate the input to accept only boolean values.
            - Consider performance implications when including inactive items, especially if the dataset is large.
            ## EXAMPLES:
            - includeInactive: true — returns all items regardless of their active status.
            - includeInactive: false — returns only items marked as active.
            ## IMPORTANT NOTES:
            - Including inactive items may expose deprecated or obsolete data; use with caution.
            - The definition of "inactive" depends on the underlying data model and should be clearly documented.
            - This property is typically used in administrative or audit contexts where full data visibility is required.
            ## DEPENDENCY CHAIN:
            - Dependent on the data source’s ability to distinguish active vs. inactive items.
            - May interact with other filtering or pagination parameters in the lookup API.
            ## TECHNICAL DETAILS:
            - Data type: Boolean.
            - Default value: false.
            - Typically implemented as a query parameter or request body field in lookup API calls.
            - Requires backend support to filter data based on active status flags or timestamps.
        _id:
          type: object
          description: |-
            _id: The unique identifier for the lookup entry within the system. This identifier is typically a string or an ObjectId that uniquely distinguishes each lookup record from others in the database or dataset.
            ## FIELD BEHAVIOR:
            - Serves as the primary key for the lookup entry.
            - Must be unique across all lookup entries.
            - Immutable once assigned; should not be changed to maintain data integrity.
            - Used to reference the lookup entry in queries, updates, and deletions.
            ## IMPLEMENTATION GUIDANCE:
            - Use a consistent format for the identifier, such as a UUID or database-generated ObjectId.
            - Ensure uniqueness by leveraging database constraints or application-level checks.
            - Assign the _id at the time of creation of the lookup entry.
            - Avoid exposing internal _id values directly to end-users unless necessary.
            ## EXAMPLES:
            - "507f1f77bcf86cd799439011"
            - "123e4567-e89b-12d3-a456-426614174000"
            - "lookup_001"
            ## IMPORTANT NOTES:
            - The _id field is critical for data integrity and should be handled with care.
            - Changing the _id after creation can lead to broken references and data inconsistencies.
            - In some systems, the _id may be automatically generated by the database.
            ## DEPENDENCY CHAIN:
            - May be referenced by other fields or entities that link to the lookup entry.
            - Dependent on the database or storage system's method of generating unique identifiers.
            ## TECHNICAL DETAILS:
            - Typically stored as a string or a specialized ObjectId type depending on the database.
            - Indexed to optimize query performance.
            - Often immutable and enforced by database schema constraints.
        default:
          type: object
          nullable: true
          description: |-
            A boolean property indicating whether the lookup is the default selection among multiple lookup options.

            ## FIELD BEHAVIOR:
            - Determines if this lookup is automatically selected or used by default in the absence of user input.
            - Only one lookup should be marked as default within a given context to avoid ambiguity.
            - Influences the initial state or value presented to the user or system when multiple lookups are available.

            ## IMPLEMENTATION GUIDANCE:
            - Set to `true` for the lookup that should be the default choice; all others should be `false` or omitted.
            - Validate that only one lookup per group or context has `default` set to `true`.
            - Use this property to pre-populate fields or guide user selections in UI or processing logic.

            ## EXAMPLES:
            - `default: true` — This lookup is the default selection.
            - `default: false` — This lookup is not the default.
            - Omitted `default` property implies the lookup is not the default.

            ## IMPORTANT NOTES:
            - If multiple lookups have `default` set to `true`, the system behavior may be unpredictable.
            - The absence of a `default` lookup means no automatic selection; user input or additional logic is required.
            - This property is typically optional but recommended for clarity in multi-lookup scenarios.

            ## DEPENDENCY CHAIN:
            - Related to the `lookups` array or collection where multiple lookup options exist.
            - May influence UI components or backend logic that rely on default selections.

            ## TECHNICAL DETAILS:
            - Data type: Boolean (`true` or `false`).
            - Default value: Typically `false` if omitted.
            - Should be included at the same level as other lookup properties within the `lookups` object.
      description: |-
        A comprehensive collection of lookup tables or reference data sets designed to support and enhance the main data model or application logic. These lookup tables provide predefined, authoritative sets of values that can be consistently referenced throughout the system to ensure data uniformity, minimize redundancy, and facilitate robust data validation and user interface consistency. They serve as centralized repositories for static or infrequently changing data that underpin dynamic application behavior, such as dropdown options, status codes, categorizations, and mappings. By centralizing this reference data, the system promotes maintainability, reduces errors, and enables seamless integration across different modules and services. Lookup tables may also support complex data structures, localization, versioning, and hierarchical relationships to accommodate diverse application requirements and evolving business rules.

        ## FIELD BEHAVIOR:
        - Contains multiple distinct lookup tables, each identified by a unique name representing a specific domain or category of reference data.
        - Each lookup table comprises structured entries, which may be simple key-value pairs or complex objects with multiple attributes, defining valid options, mappings, or metadata.
        - Lookup tables standardize inputs, support UI components like dropdowns and filters, enforce data integrity, and drive conditional logic across the application.
        - Typically static or updated infrequently, ensuring stability and consistency in dependent processes.
        - Supports localization or internationalization to provide values in multiple languages or regional formats.
        - May represent hierarchical or relational data structures within lookup tables to capture complex relationships.
        - Enables versioning to track changes over time and facilitate rollback, auditing, or backward compatibility.
        - Acts as a single source of truth for reference data, reducing duplication and discrepancies across systems.
        - Can be extended or customized to meet specific domain or organizational needs without impacting core application logic.

        ## IMPLEMENTATION GUIDANCE:
        - Organize as a dictionary or map where each key corresponds to a lookup table name and the associated value contains the set of entries.
        - Implement efficient loading, caching, and retrieval mechanisms to optimize performance and minimize latency.
        - Provide controlled update or refresh capabilities to allow seamless modifications without disrupting ongoing application operations.
        - Enforce strict validation rules on lookup entries to prevent invalid, inconsistent, or duplicate data.
        - Incorporate support for localization and internationalization where applicable, enabling multi-language or region-specific values.
        - Maintain versioning or metadata to track changes and support backward compatibility.
        - Consider access control policies if lookup data includes sensitive or restricted information.
        - Design APIs or interfaces for easy querying, filtering, and retrieval of lookup data by client applications.
        - Ensure synchronization mechanisms are in place
    operation:
      type: string
      enum:
        - add
        - update
        - addupdate
        - attach
        - detach
        - delete
      x-lowercase: true
      description: |-
        Specifies the type of operation to perform on NetSuite records. This is a plain string value, NOT an object.

        ## VALID VALUES:
        - "add" — Create a new record. Use when importing new records only.
        - "update" — Update an existing record. Requires internalIdLookup to find the record.
        - "addupdate" — Upsert: update if found, create if not. Requires internalIdLookup. This is the most common operation.
        - "attach" — Attach a record to another record.
        - "detach" — Detach a record from another record.
        - "delete" — Delete a record. Requires internalIdLookup to find the record.

        ## IMPLEMENTATION GUIDANCE:
        - Value is automatically lowercased by the API.
        - For "addupdate", "update", and "delete", you MUST also set internalIdLookup to specify how to find existing records.
        - For "add" with ignoreExisting, set internalIdLookup to check for duplicates before creating.
        - Default to "addupdate" when the user says "sync", "upsert", or "create or update".
        - Use "add" when the user says "create" or "insert" without mentioning updates.

        ## EXAMPLES:
        - "addupdate" — for syncing records (create or update)
        - "add" — for creating new records only
        - "update" — for updating existing records only
        - "delete" — for removing records

        ## IMPORTANT NOTES:
        - This field is a string, NOT an object. Set it directly: "operation": "addupdate"
        - Do NOT wrap it in an object like {"type": "addupdate"} — that will cause a validation error.
    isFileProvider:
      type: boolean
      description: |-
        isFileProvider indicates whether the NetSuite integration functions as a file provider, enabling comprehensive capabilities to access, manage, and manipulate files within the NetSuite environment. When enabled, this property grants the integration full file-related operations such as browsing directories, uploading new files, downloading existing files, updating file metadata, and deleting files directly through the integration interface. This functionality is essential for workflows that require seamless, automated interaction with NetSuite's file storage system, facilitating efficient document handling, version control, and integration with external file management processes. It also impacts the availability of specific API endpoints and user interface components related to file management, and may influence system performance and API rate limits due to the volume of file operations.

        ## FIELD BEHAVIOR:
        - When set to true, activates full file management features including browsing, uploading, downloading, updating, and deleting files within NetSuite.
        - When false or omitted, disables all file provider functionalities, preventing any file-related operations through the integration.
        - Acts as a toggle controlling the availability of file-centric capabilities and related API endpoints.
        - Changes typically require re-authentication or reinitialization to apply updated file access permissions correctly.
        - May affect integration performance and API rate limits due to potentially high file operation volumes.

        ## IMPLEMENTATION GUIDANCE:
        - Enable only if direct, comprehensive interaction with NetSuite files is required.
        - Ensure the integration has appropriate NetSuite permissions, roles, and OAuth scopes for secure file access and manipulation.
        - Validate strictly as a boolean to prevent misconfiguration.
        - Assess security implications thoroughly, enforcing strict access controls and audit logging when enabled.
        - Monitor API usage and system performance closely, as file operations can increase load and impact rate limits.
        - Coordinate with NetSuite administrators to align file access policies with organizational security and compliance standards.
        - Consider effects on middleware and downstream systems handling file transfers, error handling, and synchronization.

        ## EXAMPLES:
        - `isFileProvider: true` — Enables full file provider capabilities, allowing browsing, uploading, downloading, and managing files within NetSuite.
        - `isFileProvider: false` — Disables all file-related functionalities, restricting the integration to non-file operations only.

        ## IMPORTANT NOTES:
        - Enabling file provider functionality may require additional NetSuite OAuth scopes, roles, or permissions specifically related to file access.
        - File operations can significantly impact API rate limits and quotas; plan and monitor usage accordingly.
        - This property exclusively controls file management capabilities and does not affect other integration functionalities.
    customFieldMetadata:
      type: object
      description: |-
        Metadata information related to custom fields defined within the NetSuite environment, offering a comprehensive and detailed overview of each custom field's attributes, configuration settings, and operational parameters. This includes critical details such as the field type (e.g., checkbox, select, date, text), label, internal ID, source lists or records for select-type fields, default values, validation rules, display properties, and behavioral flags like mandatory, read-only, or hidden status. The metadata acts as an authoritative reference for accurately managing, validating, and utilizing custom fields during integrations, data processing, and API interactions, ensuring that custom field data is interpreted and handled precisely according to its defined structure, constraints, and business logic. It also enables dynamic adaptation to changes in custom field configurations, supporting robust and flexible integration workflows that maintain data integrity and enforce business rules effectively.

        ## FIELD BEHAVIOR:
        - Provides exhaustive metadata for each custom field, including type, label, internal ID, source references, default values, validation criteria, and display properties.
        - Reflects the current and authoritative configuration and constraints of custom fields within the NetSuite account.
        - Enables dynamic validation, processing, and rendering of custom fields during data import, export, and API operations.
        - Supports understanding of field dependencies, mandatory status, read-only or hidden flags, and other behavioral characteristics.
        - Facilitates enforcement of business rules and data integrity through validation and conditional logic based on metadata.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure this property is consistently populated with accurate, up-to-date, and comprehensive metadata for all relevant custom fields in the integration context.
        - Regularly synchronize and refresh metadata with the NetSuite environment to capture any additions, modifications, or deletions of custom fields.
        - Leverage this metadata to validate data payloads before transmission and to correctly interpret and process received data.
        - Use metadata details to implement field-specific logic, such as enforcing mandatory fields, applying validation rules, handling default values, and respecting read-only or hidden statuses.
        - Consider caching metadata where appropriate to optimize performance, while ensuring mechanisms exist to detect and apply updates promptly.

        ## EXAMPLES:
        - Field type: "checkbox", label: "Is Active", id: "custentity_is_active", mandatory: true
        - Field type: "select", label: "Customer Type", id: "custentity_customer_type", sourceList: "customerTypes", readOnly: false
        - Field type: "date", label: "Contract Start Date", id: "custentity_contract_start
    recordType:
      type: string
      description: |-
        recordType specifies the exact type of record within the NetSuite system that the API operation will interact with. This property is critical as it defines the schema, fields, validation rules, workflows, and behaviors applicable to the record being accessed, created, updated, or deleted. By accurately specifying the recordType, the API can correctly interpret the structure of the data payload, enforce appropriate business logic, and route the request to the correct processing module within NetSuite. This ensures precise data manipulation, retrieval, and integration aligned with the intended record context. Proper use of recordType enables seamless interaction with both standard and custom NetSuite records, supporting robust and flexible API operations across diverse business scenarios.

        ## FIELD BEHAVIOR:
        - Defines the specific NetSuite record type for the API request (e.g., customer, salesOrder, invoice).
        - Directly influences validation rules, available fields, permissible operations, and workflows in the request or response.
        - Determines the context, permissions, and business logic applicable to the record.
        - Must be set accurately and consistently to ensure correct processing and avoid errors.
        - Affects how the API interprets, validates, and processes the associated data payload.
        - Supports interaction with both standard and custom record types configured in the NetSuite account.
        - Enables the API to dynamically adapt to different record structures and business processes based on the recordType.

        ## IMPLEMENTATION GUIDANCE:
        - Use the exact NetSuite internal record type identifiers as defined in official NetSuite documentation and account-specific customizations.
        - Validate the recordType value against the list of supported record types before processing the request to prevent errors.
        - Ensure compatibility of the recordType with the specific API endpoint, operation, and NetSuite account configuration.
        - Implement robust error handling for missing, invalid, or unsupported recordType values, providing clear and actionable feedback.
        - Regularly update the recordType list to reflect changes in NetSuite releases, custom record definitions, and account-specific configurations.
        - Consider role-based access and feature enablement that may affect the availability or behavior of certain record types.
        - When dealing with custom records, verify that the recordType matches the custom record’s internal ID and that the API user has appropriate permissions.

        ## EXAMPLES:
        - "customer"
        - "salesOrder"
        - "invoice"
        - "employee"
        - "itemFulfillment"
        - "vendorBill"
        - "purchaseOrder"
        - "customRecordType123" (example of a custom record)

        ## IMPORTANT NOTES:
        - The recordType value is case
    recordTypeId:
      type: string
      description: |-
        recordTypeId is the unique identifier that specifies the exact type or category of a record within the NetSuite system. It defines the structure, fields, validation rules, workflows, and behavior applicable to the record instance, ensuring that API operations target the correct record schema and processing logic. This identifier is essential for routing requests to the appropriate record handlers, enforcing data integrity, and validating the data according to the specific record type's requirements. Once set for a record instance, the recordTypeId is immutable, as changing it would imply a fundamentally different record type and could lead to inconsistencies or errors in processing.

        ## FIELD BEHAVIOR:
        - Specifies the precise category or type of NetSuite record being accessed or manipulated.
        - Determines the applicable schema, fields, validation rules, workflows, and business logic for the record.
        - Directs API requests to the correct processing logic, endpoint, and validation routines based on record type.
        - Immutable for a given record instance; changing it indicates a different record type and is not permitted.
        - Influences permissions, access control, and integration behaviors tied to the record type.
        - Affects how related records and dependencies are handled within the system.

        ## IMPLEMENTATION GUIDANCE:
        - Use the exact internal string ID or numeric identifier as defined by NetSuite for record types.
        - Validate the recordTypeId against the current list of supported, enabled, and custom NetSuite record types before processing.
        - Ensure consistency and compatibility between recordTypeId and related fields or data structures within the payload.
        - Implement robust error handling for invalid, unsupported, deprecated, or mismatched recordTypeId values.
        - Keep the recordTypeId definitions synchronized with updates, customizations, and configurations from the NetSuite account to avoid mismatches.
        - Consider case sensitivity and formatting rules as dictated by the NetSuite API specifications.
        - When integrating with custom record types, verify that custom IDs conform to naming conventions and are properly registered in the NetSuite environment.

        ## EXAMPLES:
        - "customer" — representing a standard customer record type.
        - "salesOrder" — representing a sales order record type.
        - "invoice" — representing an invoice record type.
        - Numeric identifiers such as "123" if the system uses numeric codes for record types.
        - Custom record type IDs defined within a specific NetSuite account, e.g., "customRecordType_456".
        - "employee" — representing an employee record type.
        - "purchaseOrder" — representing a purchase order record type.

        ## IMPORTANT NOTES:
    retryUpdateAsAdd:
      type: boolean
      description: |-
        A boolean flag that controls whether failed update operations in NetSuite integrations should be automatically retried as add operations. When set to true, if an update attempt fails—commonly because the target record does not exist—the system will attempt to add the record instead. This mechanism helps maintain data synchronization by addressing scenarios where records may have been deleted, never created, or are otherwise missing, thereby reducing manual intervention and minimizing data discrepancies. It ensures smoother integration workflows by providing a fallback strategy specifically for update failures, enhancing resilience and data consistency.

        ## FIELD BEHAVIOR:
        - Governs retry logic exclusively for update operations within NetSuite integrations.
        - When true, triggers an automatic retry as an add operation upon update failure.
        - When false or unset, update failures result in immediate error responses without retries.
        - Facilitates handling of missing or deleted records to improve synchronization accuracy.
        - Does not influence initial add operations or other API call types.
        - Activates retry logic only after detecting a failed update attempt.

        ## IMPLEMENTATION GUIDANCE:
        - Enable this flag when there is a possibility that update requests target non-existent records.
        - Evaluate the potential for duplicate record creation if the add operation is not idempotent.
        - Implement comprehensive error handling and logging to monitor retry attempts and outcomes.
        - Conduct thorough testing in staging or development environments before deploying to production.
        - Coordinate with other retry or error recovery configurations to avoid conflicting behaviors.
        - Ensure accurate detection of update failure causes to apply retries appropriately and avoid unintended consequences.

        ## EXAMPLES:
        - `retryUpdateAsAdd: true` — Automatically retries adding the record if an update fails due to a missing record.
        - `retryUpdateAsAdd: false` — Update failures are reported immediately without retrying as add operations.

        ## IMPORTANT NOTES:
        - Enabling this flag may lead to duplicate records if update failures occur for reasons other than missing records.
        - Use with caution in environments requiring strict data integrity, auditability, and compliance.
        - This flag only modifies retry behavior after an update failure; it does not alter the initial add or update request logic.
        - Accurate failure cause analysis is critical to ensure retries are applied correctly and safely.

        ## DEPENDENCY CHAIN:
        - Relies on execution of update operations against NetSuite records.
        - Works in conjunction with error detection and handling mechanisms to identify failure reasons.
        - Commonly used alongside other retry policies or error recovery settings to enhance integration robustness.

        ## TECHNICAL DETAILS:
        - Data type: boolean
        - Default value: false
    batchSize:
      type: number
      description: "Specifies the number of records to process in a single batch operation when interacting with the NetSuite\
        \ API, directly influencing the efficiency, performance, and resource utilization of data processing tasks. This parameter\
        \ controls how many records are sent or retrieved in one API call, balancing throughput with system constraints such\
        \ as memory usage, network latency, and API rate limits. Proper configuration of batchSize is essential to optimize\
        \ processing speed while minimizing the risk of errors, timeouts, or throttling by the NetSuite API. Adjusting batchSize\
        \ allows for fine-tuning of integration workflows to accommodate varying workloads, system capabilities, and API restrictions,\
        \ ensuring reliable and efficient data synchronization.  \n## FIELD BEHAVIOR:  \n- Determines the count of records\
        \ included in each batch request to the NetSuite API.  \n- Directly impacts the number of API calls required to complete\
        \ processing of all records.  \n- Larger batch sizes can improve throughput by reducing the number of calls but may\
        \ increase memory consumption, processing latency, and risk of timeouts per call.  \n- Smaller batch sizes reduce\
        \ memory footprint and improve responsiveness but may increase the total number of API calls and associated overhead.\
        \  \n- Influences error handling complexity, as failures in larger batches may require more extensive retries or partial\
        \ processing logic.  \n- Affects how quickly data is processed and synchronized between systems.  \n## IMPLEMENTATION\
        \ GUIDANCE:  \n- Select a batch size that balances optimal performance with available system resources, network conditions,\
