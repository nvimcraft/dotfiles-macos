        - Used to specify, upload, retrieve, update, or link files associated with NetSuite records, transactions, custom entities, or workflows.
        - Supports a broad spectrum of file types including PDFs, images (JPEG, PNG, GIF), spreadsheets (Excel, CSV), text documents, audio, video, and other media formats.
        - Can represent files stored internally within the NetSuite file Cabinet or externally referenced files via URLs or other means.
        - Enables attachment of files to records to provide enhanced context, documentation, and audit trails.
