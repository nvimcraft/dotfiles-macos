        - Must conform to the FTP server’s
    inProgressFileName:
      type: string
      description: |-
        inProgressFileName is the designated temporary filename assigned to a file during the FTP upload process to clearly indicate that the file transfer is currently underway and not yet complete. This naming convention serves as a safeguard to prevent other systems or processes from prematurely accessing, processing, or locking the file before the upload finishes successfully. Typically, once the upload is finalized, the file is renamed to its intended permanent filename, signaling that it is ready for further use or processing. Utilizing an in-progress filename helps maintain data integrity, avoid conflicts, and streamline workflow automation in environments where files are continuously transferred and monitored. It plays a critical role in managing file state visibility, ensuring that incomplete or partially transferred files are not mistakenly processed, which could lead to data corruption or inconsistent system behavior.

        ## FIELD BEHAVIOR:
        - Acts as a temporary marker for files actively being uploaded via FTP or similar protocols.
        - Prevents other processes, systems, or automated workflows from accessing or processing the file until the upload is fully complete.
        - The file is renamed atomically from the inProgressFileName to the final intended filename upon successful upload completion.
        - Helps manage concurrency, avoid file corruption, partial reads, or race conditions during file transfer.
        - Indicates the current state of the file within the transfer lifecycle, providing clear visibility into upload progress.
        - Supports cleanup mechanisms by identifying orphaned or stale temporary files resulting from interrupted uploads.

        ## IMPLEMENTATION GUIDANCE:
        - Choose a unique, consistent, and easily identifiable naming pattern distinct from final filenames to clearly denote the in-progress status.
        - Commonly use suffixes or prefixes such as ".inprogress", ".tmp", "_uploading", or similar conventions that are recognized across systems.
        - Ensure the FTP server and client support atomic renaming operations to avoid partial file visibility or race conditions.
        - Verify that the chosen temporary filename does not collide with existing files in the target directory to prevent overwriting or confusion.
        - Maintain consistent naming conventions across all related systems, scripts, and automation tools for clarity and maintainability.
        - Implement robust cleanup routines to detect and remove orphaned or stale in-progress files from failed or abandoned uploads.
        - Coordinate synchronization between upload completion and renaming to prevent premature processing or file locking issues.

        ## EXAMPLES:
        - "datafile.csv.inprogress"
        - "upload.tmp"
        - "report_20240615.tmp"
        - "file_upload_inprogress"
        - "transaction_12345.uploading"

