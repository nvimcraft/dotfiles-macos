        - This filename is strictly temporary and should never be
    backupDirectoryPath:
      type: string
      description: "backupDirectoryPath specifies the file system path to the directory where backup files are stored during\
        \ FTP operations. This directory serves as the designated location for saving copies of files before they are overwritten\
        \ or deleted, ensuring that original data can be recovered if necessary. The path can be either absolute or relative,\
        \ depending on the system context, and must conform to the operating system’s file path conventions. It is essential\
        \ that this path is valid, accessible, and writable by the FTP service or application performing the backups to guarantee\
        \ reliable backup creation and data integrity. Proper configuration of this path is critical to prevent data loss\
        \ and to maintain a secure and organized backup environment.  \n## FIELD BEHAVIOR:  \n- Specifies the target directory\
        \ for storing backup copies of files involved in FTP transactions.  \n- Activated only when backup functionality is\
        \ enabled within the FTP process.  \n- Requires the path to be valid, accessible, and writable to ensure successful\
        \ backup creation.  \n- Supports both absolute and relative paths, with relative paths resolved against a defined\
        \ base directory.  \n- If unset or empty, backup operations may be disabled or fallback to a default directory if\
        \ configured.  \n## IMPLEMENTATION GUIDANCE:  \n- Validate the existence of the directory and verify write permissions\
        \ before initiating backups.  \n- Normalize paths to handle trailing slashes, redundant separators, and platform-specific\
        \ path formats.  \n- Provide clear and actionable error messages if the directory is invalid, inaccessible, or lacks\
        \ necessary permissions.  \n- Support environment variables or placeholders for dynamic path resolution where applicable.\
        \  \n- Enforce security best practices by restricting access to the backup directory to authorized users or processes\
        \ only.  \n- Ensure sufficient disk space is available in the backup directory to accommodate backup files without\
        \ interruption.  \n- Implement concurrency controls such as file locking or synchronization if multiple backup operations\
        \ may occur simultaneously.  \n## EXAMPLES:  \n- \"/var/ftp/backups\"  \n- \"C:\\\\ftp\\\\backup\"  \n- \"./backup_files\"\
        \  \n- \"/home/user/ftp_backup\"  \n## IMPORTANT NOTES:  \n- The backup directory must have adequate storage capacity\
        \ to prevent backup failures due to insufficient space.  \n- Permissions must allow the FTP process or service to\
        \ create and modify files within the directory.  \n- Backup files may contain sensitive or confidential data; appropriate\
        \ security measures should be enforced to protect them.  \n- Path formatting should align with the conventions of\
        \ the underlying operating system to avoid errors.  \n- Failure to properly configure this path can result in loss\
        \ of backup data or inability to recover"
