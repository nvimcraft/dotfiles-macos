Output:
  type: object
  description: |
    Configuration for the tool's output processing.

    Defines how the tool's results are mapped, transformed, and enriched
    before being returned. Supports field mappings, lookups for data
    enrichment, and custom script hooks for pre/post-mapping processing.
  properties:
    name:
      type: string
      maxLength: 200
      description: |
        Display name for the output configuration.
      examples: ["Transformed Customer", "Order Response"]
    description:
      type: string
      maxLength: 10240
      description: |
        Description of the output data and its purpose.
      examples: ["Mapped and enriched customer record ready for the destination system"]
    schema:
      type: object
      description: |
        JSON Schema describing the output data structure.

        Used for documentation and validation of the tool's output.
        Must be a valid JSON Schema document.
      additionalProperties: true
      examples:
        - type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            status:
              type: string
    mappings:
      type: array
      description: |
        Field mappings to transform data into the output format.

        Maps data from processing results to the output structure.
        Uses Celigo's standard mapping format with extract/generate field paths.
      items:
        $ref: "../../../common/schemas/mappings.yml#/Mappings"
    lookups:
      type: array
      description: |
        Lookup tables for data enrichment during output processing.

        Static key-value mappings used to translate values (e.g., status codes,
        category names) during output generation.
      items:
        type: object
        properties:
          name:
            type: string
            description: |
              Name of the lookup, used to reference it from mappings.
            examples: ["statusMapping", "regionLookup"]
          map:
            type: object
            description: |
              Key-value mapping object. Keys are the input values and
              values are the corresponding output values.
            additionalProperties: true
            examples:
              - A: Active
                I: Inactive
                P: Pending
          default:
            type: string
            description: |
              Default value returned when the input key is not found in the map.
            examples: ["Unknown"]
          allowFailures:
            type: boolean
            description: |
              Whether to continue processing if the lookup fails to find a match
              and no default is provided.
        required:
          - name
    hooks:
      type: object
      description: |
        Custom script hooks for pre- and post-mapping processing.

        Allows running custom JavaScript functions before and after
        output mappings are applied.
      properties:
        preMap:
          type: object
          description: |
            Script to run before applying output mappings.

            Can modify the data before it is mapped to the output structure.
          properties:
            _scriptId:
              type: string
              x-celigo-refModel: scripts
              description: Reference to the script resource
              examples: ["60a2c4e6f321d800129a1a3c"]
            function:
              type: string
              description: Function name to execute within the script
              examples: ["preProcessOutput", "enrichData"]
        postMap:
          type: object
          description: |
            Script to run after applying output mappings.

            Can modify the final output data after mappings are applied.
          properties:
            _scriptId:
              type: string
              x-celigo-refModel: scripts
              description: Reference to the script resource
              examples: ["60a2c4e6f321d800129a1a3c"]
            function:
              type: string
              description: Function name to execute within the script
              examples: ["postProcessOutput", "validateOutput"]
    mockInput:
      type: object
      description: |
        Mock data for testing the tool's output processing.

        Provides sample data that would arrive from the routing/processing
        stage, used to test mapping and lookup logic. Maximum size: 1MB.
      additionalProperties: true
