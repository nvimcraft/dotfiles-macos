Router:
  type: object
  description: |
    Configuration for conditional routing within a tool.

    Routers evaluate input data and direct it to different processing branches
    based on criteria. This enables complex business logic and conditional
    processing within the tool.

    Unlike flows, tools only support "first_matching_branch" routing strategy.
    Branches can chain to other routers or use the special "outputRouter"
    terminal sink to exit the tool and return results.
  properties:
    id:
      type: string
      description: |
        Unique identifier for this router within the tool.

        Used to reference this router from other routers' branch `nextRouterId`.
      examples: ["router_001", "validation_router"]
    name:
      type: string
      maxLength: 300
      description: |
        Human-readable name for the router.
      examples: ["Customer Type Router", "Validation Router"]
    routeRecordsTo:
      type: string
      enum: ["first_matching_branch"]
      description: |
        Routing strategy. Tools only support "first_matching_branch",
        which routes to the first branch whose criteria match the input.
      examples: ["first_matching_branch"]
    routeRecordsUsing:
      type: string
      enum: ["input_filters", "script"]
      description: |
        Method used to evaluate routing criteria.

        - **input_filters**: Use declarative filter expressions on each branch
        - **script**: Use a custom JavaScript function to determine the branch
      examples: ["input_filters"]
    script:
      type: object
      description: |
        Script configuration when routeRecordsUsing is "script".

        The function should return the name of the branch to route to.
      properties:
        _scriptId:
          type: string
          format: objectId
          x-celigo-refModel: scripts
          description: Reference to the script resource
          examples: ["60a2c4e6f321d800129a1a3c"]
        function:
          type: string
          description: Function name that returns the branch name
          examples: ["routeInput", "determineBranch"]
    branches:
      type: array
      description: |
        List of branches defining different processing paths.

        Each branch has optional filter criteria and a set of processing steps.
        Records are evaluated against branch criteria in order; the first
        matching branch is selected.
      items:
        type: object
        properties:
          name:
            type: string
            maxLength: 300
            description: |
              Name of this branch.
            examples: ["Premium Customers", "Default Processing"]
          description:
            type: string
            maxLength: 10240
            description: |
              Description of when and why this branch is selected.
          inputFilter:
            type: object
            description: |
              Filter criteria to determine if this branch should be selected.

              Uses Celigo's expression-based filter format.
            properties:
              version:
                type: string
                enum: ["1"]
                description: Filter version
              rules:
                type: array
                description: |
                  Filter rules in Celigo expression-based filter format.

                  Array-based DSL where the first element is an operator (e.g., "equals", "and", "or"),
                  followed by operands which can be nested expressions.
                items: {}
                examples:
                  - ["equals", ["get", "customerType"], "premium"]
                  - ["and", ["exists", ["get", "orderId"]], ["greaterThan", ["get", "amount"], 1000]]
          nextRouterId:
            type: string
            description: |
              Identifier of the next router to chain to after this branch completes.

              Use "outputRouter" as a special terminal value to exit the tool
              and return the processing results.
            examples: ["router_002", "outputRouter"]
          pageProcessors:
            type: array
            description: |
              Processing steps to execute in this branch.

              Each processor references an export (lookup) or import resource
              for data retrieval or submission.
            items:
              type: object
              properties:
                type:
                  type: string
                  enum: ["export", "import"]
                  description: |
                    Type of processor.

                    - **export**: Retrieves data from an external system (lookup)
                    - **import**: Sends data to an external system
                _exportId:
                  type: string
                  format: objectId
                  x-celigo-refModel: exports
                  description: Export resource reference (when type is "export")
                  examples: ["60a2c4e6f321d800129a1a3c"]
                _importId:
                  type: string
                  format: objectId
                  x-celigo-refModel: imports
                  description: Import resource reference (when type is "import")
                  examples: ["60a2c4e6f321d800129a1a3c"]
                proceedOnFailure:
                  type: boolean
                  description: |
                    Whether to continue processing subsequent steps if this
                    processor fails.
                responseMapping:
                  type: object
                  description: |
                    Mapping configuration for the processor's response data.
                  properties:
                    fields:
                      type: array
                      description: Simple field-level mappings
                      items:
                        type: object
                        properties:
                          extract:
                            type: string
                            description: Source field path from the response
                          generate:
                            type: string
                            description: Target field path in the record
                    lists:
                      type: array
                      description: List-level mappings for array data
                      items:
                        type: object
                        properties:
                          generate:
                            type: string
                            description: Target list path
                          fields:
                            type: array
                            items:
                              type: object
                              properties:
                                extract:
                                  type: string
                                  description: Source field path
                                generate:
                                  type: string
                                  description: Target field path
                hooks:
                  type: object
                  description: Custom scripts for processing
                  properties:
                    postResponseMap:
                      type: object
                      description: Script to run after response mapping
                      properties:
                        _scriptId:
                          type: string
                          format: objectId
                          x-celigo-refModel: scripts
                          description: Reference to the script resource
                        function:
                          type: string
                          description: Function name to execute
  required:
    - id
    - branches
