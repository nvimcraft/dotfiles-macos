    name:
      type: string
      description: |-
        The name property represents the identifier or title assigned to an entity, object, or resource within the system. It is typically a human-readable string that uniquely distinguishes the item from others in the same context. This property is essential for referencing, searching, and displaying the entity in user interfaces and API responses.

        ## FIELD BEHAVIOR:
        - Must be a non-empty string.
        - Should be unique within its scope to avoid ambiguity.
        - Often used as a primary label in UI components and logs.
        - May have length constraints depending on system requirements.
        - Typically case-sensitive or case-insensitive based on implementation.

        ## IMPLEMENTATION GUIDANCE:
        - Validate the input to ensure it meets length and character requirements.
        - Enforce uniqueness if required by the application context.
        - Sanitize input to prevent injection attacks or invalid characters.
        - Support internationalization by allowing Unicode characters if applicable.
        - Provide clear error messages when validation fails.

        ## EXAMPLES:
        - "John Doe"
        - "Invoice_2024_001"
        - "MainServer"
        - "Project Phoenix"
        - "user@example.com"

        ## IMPORTANT NOTES:
        - Avoid using reserved keywords or special characters that may interfere with system processing.
        - Consider trimming whitespace from the beginning and end of the string.
        - The name should be meaningful and descriptive to improve usability.
        - Changes to the name might affect references or links in other parts of the system.

        ## DEPENDENCY CHAIN:
        - May be referenced by other properties such as IDs, URLs, or display labels.
        - Could be linked to permissions or access control mechanisms.
        - Often used in search and filter operations within the API.

        ## TECHNICAL DETAILS:
        - Data type: string.
        - Encoding: UTF-8 recommended.
        - Maximum length: typically defined by system constraints (e.g., 255 characters).
        - Validation rules: regex patterns may be applied to restrict allowed characters.
        - Storage considerations: indexed for fast lookup if used frequently in queries.
    description:
      type: string
      description: |-
        A detailed textual explanation that describes the purpose, characteristics, or context of the associated entity or item. This field is intended to provide users with clear and comprehensive information to better understand the subject it represents.
        ## FIELD BEHAVIOR:
        - Accepts plain text or formatted text depending on implementation.
        - Should be concise yet informative, avoiding overly technical jargon unless necessary.
        - May support multi-line input to allow detailed explanations.
        - Typically optional but recommended for clarity.
        
        ## IMPLEMENTATION GUIDANCE:
        - Ensure the description is user-friendly and accessible to the target audience.
        - Avoid including sensitive or confidential information.
        - Use consistent terminology aligned with the overall documentation or product language.
        - Consider supporting markdown or rich text formatting if applicable.
        
        ## EXAMPLES:
        - "This API endpoint retrieves user profile information including name, email, and preferences."
        - "A unique identifier assigned to each transaction for tracking purposes."
        - "Specifies the date and time when the event occurred, formatted in ISO 8601."
        
        ## IMPORTANT NOTES:
        - Keep descriptions up to date with any changes in functionality or behavior.
        - Avoid redundancy with other fields; focus on clarifying the entity’s role or usage.
        - Descriptions should not contain executable code or commands.
        
        ## DEPENDENCY CHAIN:
        - Often linked to the entity or property it describes.
        - May influence user understanding and correct usage of the associated field.
        - Can be referenced in user guides, API documentation, or UI tooltips.
        
        ## TECHNICAL DETAILS:
        - Typically stored as a string data type.
        - May have length constraints depending on system limitations.
        - Encoding should support UTF-8 to accommodate international characters.
        - Should be sanitized to prevent injection attacks if rendered in UI contexts.
      maxLength: 10240
    unencrypted:
      type: object
      description: |-
        Indicates whether the data or content is stored or transmitted without encryption, meaning it is in plain text and not protected by any cryptographic methods. This flag helps determine if additional security measures are necessary to safeguard sensitive information.

        ## FIELD BEHAVIOR:
        - Represents a boolean state where `true` means data is unencrypted and `false` means data is encrypted.
        - Used to identify if the data requires encryption before storage or transmission.
        - May influence processing logic related to data security and compliance.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure this field is explicitly set to reflect the actual encryption status of the data.
        - Use this flag to trigger encryption routines or security checks when data is unencrypted.
        - Validate the field to prevent false positives that could lead to security vulnerabilities.

        ## EXAMPLES:
        - `true` indicating a password stored in plain text (not recommended).
        - `false` indicating a file that has been encrypted before upload.
        - `true` for a message sent over an unsecured channel.

        ## IMPORTANT NOTES:
        - Storing or transmitting data with `unencrypted` set to `true` can expose sensitive information to unauthorized access.
        - This field does not perform encryption itself; it only signals the encryption status.
        - Proper handling of unencrypted data is critical for compliance with data protection regulations.

        ## DEPENDENCY CHAIN:
        - Often used in conjunction with fields specifying encryption algorithms or keys.
        - May affect downstream processes such as logging, auditing, or alerting mechanisms.
        - Related to security policies and access control configurations.

        ## TECHNICAL DETAILS:
        - Typically represented as a boolean value.
        - Should be checked before performing operations that assume data confidentiality.
        - May be integrated with security frameworks to enforce encryption standards.
    sampleData:
      type: object
      description: |-
        An array or collection of sample data entries used to demonstrate or test the functionality of the API or application. This data serves as example input or output to help users understand the expected format, structure, and content. It can include various data types depending on the context, such as strings, numbers, objects, or nested arrays.

        ## FIELD BEHAVIOR:
        - Contains example data that mimics real-world usage scenarios.
        - Can be used for testing, validation, or demonstration purposes.
        - May be optional or required depending on the API specification.
        - Should be representative of typical data to ensure meaningful examples.

        ## IMPLEMENTATION GUIDANCE:
        - Populate with realistic and relevant sample entries.
        - Ensure data types and structures align with the API schema.
        - Avoid sensitive or personally identifiable information.
        - Update regularly to reflect any changes in the API data model.

        ## EXAMPLES:
        - A list of user profiles with names, emails, and roles.
        - Sample product entries with IDs, descriptions, and prices.
        - Example sensor readings with timestamps and values.
        - Mock transaction records with amounts and statuses.

        ## IMPORTANT NOTES:
        - Sample data is for illustrative purposes and may not reflect actual production data.
        - Should not be used for live processing or decision-making.
        - Ensure compliance with data privacy and security standards when creating samples.

        ## DEPENDENCY CHAIN:
        - Dependent on the data model definitions within the API.
        - May influence or be influenced by validation rules and schema constraints.
        - Often linked to documentation and testing frameworks.

        ## TECHNICAL DETAILS:
        - Typically formatted as JSON arrays or objects.
        - Can include nested structures to represent complex data.
        - Size and complexity should be balanced to optimize performance and clarity.
        - May be embedded directly in API responses or provided as separate resources.
    distributed:
      type: boolean
      description: |-
        Indicates whether the import is using a distributed adaptor, such as a NetSuite Distributed Import.
        ## FIELD BEHAVIOR:
        - Accepts boolean values: true or false.
        - When true, the import is using a distributed adaptor such as a NetSuite Distributed Import.
        - When false, the import is not using a distributed adaptor.

        ## EXAMPLES:
        - true: When the adaptorType is NetSuiteDistributedImport
        - false: In all other cases
    maxAttempts:
      type: number
      description: "Specifies the maximum number of attempts allowed for a particular operation or action before it is considered\
        \ failed or terminated. This property helps control retry logic and prevents infinite loops or excessive retries in\
        \ processes such as authentication, data submission, or task execution.  \n## FIELD BEHAVIOR:  \n- Defines the upper\
        \ limit on retry attempts for an operation.  \n- Once the maximum attempts are reached, no further retries are made.\
        \  \n- Can be used to trigger fallback mechanisms or error handling after exceeding attempts.  \n## IMPLEMENTATION\
        \ GUIDANCE:  \n- Set to a positive integer value representing the allowed retry count.  \n- Should be configured based\
        \ on the operation's criticality and expected failure rates.  \n- Consider exponential backoff or delay strategies\
        \ in conjunction with maxAttempts.  \n- Validate input to ensure it is a non-negative integer.  \n## EXAMPLES:  \n\
        - 3 (allowing up to three retry attempts)  \n- 5 (permitting five attempts before failure)  \n- 0 (disabling retries\
        \ entirely)  \n## IMPORTANT NOTES:  \n- Setting this value too high may cause unnecessary resource consumption or\
        \ delays.  \n- Setting it too low may result in premature failure without sufficient retry opportunities.  \n- Should\
        \ be used in combination with timeout settings for robust error handling.  \n## DEPENDENCY CHAIN:  \n- Often used\
        \ alongside properties like retryDelay, timeout, or backoffStrategy.  \n- May influence or be influenced by error\
        \ handling or circuit breaker configurations.  \n## TECHNICAL DETAILS:  \n- Typically represented as an integer data\
        \ type.  \n- Enforced by the application logic or middleware managing retries.  \n- May be configurable at runtime\
        \ or deployment time depending on system design."
    ignoreExisting:
      type: boolean
      description: |-
        **CRITICAL FIELD:** Controls whether the import should skip records that already exist in the target system rather than attempting to update them or throwing errors.
        
        When set to true, the import will:
        - Check if each record already exists in the target system (using a lookup configured in the import, or if the record coming into the import has a value populated in the field configured in the ignoreExtract property)
        - Skip processing for records that are found to already exist
        - Continue processing only records that don't exist (new records)
        - This is for CREATE operations where you want to avoid duplicates
        
        When set to false or undefined (default):
        - All records are processed normally in the creation process (if applicable)
        - Existing records may be duplicated or may cause errors depending on the API
        - No special existence checking is performed
        
        ## WHEN TO SET THIS TO TRUE (MUST DETECT THESE PATTERNS):
        
        **ALWAYS set ignoreExisting to true** when the user's prompt includes ANY of these patterns:
        
        ### Primary Patterns (very common):
        - "ignore existing" / "ignoring existing" / "ignore any existing"
        - "skip existing" / "skipping existing" / "skip any existing"
        - "while ignoring existing" / "while skipping existing"
        - "skip duplicates" / "avoid duplicates" / "ignore duplicates"
        
        ### Secondary Patterns:
        - "only create new" / "only add new" / "create new only"
        - "don't update existing" / "avoid updating existing" / "without updating"
        - "create if doesn't exist" / "add if doesn't exist"
        - "insert only" / "create only"
        - "skip if already exists" / "ignore if exists"
        - "don't process existing" / "bypass existing"
        
        ### Context Clues:
        - User says "create" or "insert" AND mentions checking/matching against existing data
        - User wants to add records but NOT modify what's already there
        - User is concerned about duplicate prevention during creation
        
        ## EXAMPLES:
        
        ### Should set ignoreExisting: true
        - "Create customer records in Shopify while ignoring existing customers" → ignoreExisting: true
        - "Create vendor records while ignoring existing vendors" → ignoreExisting: true
        - "Import new products only, skip existing ones" → ignoreExisting: true
        - "Add orders to the system, ignore any that already exist" → ignoreExisting: true
        - "Create accounts but don't update existing ones" → ignoreExisting: true
        - "Insert new contacts, skip duplicates" → ignoreExisting: true
        - "Create records, skipping any that match existing data" → ignoreExisting: true
        
        ### Should NOT set ignoreExisting: true
        - "Update existing customer records" → ignoreExisting: false (update operation)
        - "Create or update records" → ignoreExisting: false (upsert operation)
        - "Sync all records" → ignoreExisting: false (sync/upsert operation)
        
        ## IMPORTANT:
        - This field is typically used with INSERT operations
        - Common pattern: "Create X while ignoring existing X" → MUST set to true
        
        ## WHEN TO LEAVE THIS FALSE/UNDEFINED:
        
        Leave this false or undefined when:
        - The prompt doesn't mention skipping or ignoring existing records
        - The import is only performing updates (no inserts)
        - The prompt says "sync", "update", or "upsert"
        
        ## IMPORTANT NOTES:
        - This flag requires a properly configured lookup to identify existing records, or have an ignoreExtract field configured to identify the field that is used to determine if the record already exists.
        - The lookup typically checks a unique identifier field (id, email, external_id, etc.)
        - When true, existing records are silently skipped (not updated, not errored)
        - Use this for insert-only or create-only operations
        - Do NOT use this if the user wants to update existing records
        
        ## TECHNICAL DETAILS:
        - Works in conjunction with lookup configurations to determine if a record exists or has an ignoreExtract field configured to determine if the record already exists.
        - The lookup queries the target system before attempting to create the record
        - If the lookup returns a match, the record is skipped
        - If the lookup returns no match, the record is processed normally
    ignoreMissing:
      type: boolean
      description: "Indicates whether the system should ignore missing or non-existent resources during processing. When set\
        \ to true, the operation will proceed without error even if some referenced items are not found; when false, the absence\
        \ of required resources will cause the operation to fail or return an error.  \n## FIELD BEHAVIOR:  \n- Controls error\
        \ handling related to missing resources.  \n- Allows operations to continue gracefully when some data is unavailable.\
        \  \n- Affects the robustness and fault tolerance of the process.  \n## IMPLEMENTATION GUIDANCE:  \n- Use true to\
        \ enable lenient processing where missing data is acceptable.  \n- Use false to enforce strict validation and fail\
        \ fast on missing resources.  \n- Ensure that downstream logic can handle partial results if ignoring missing items.\
        \  \n## EXAMPLES:  \n- ignoreMissing: true — skips over missing files during batch processing.  \n- ignoreMissing:\
        \ false — throws an error if a referenced database entry is not found.  \n## IMPORTANT NOTES:  \n- Setting this to\
        \ true may lead to incomplete results if missing data is critical.  \n- Default behavior should be clearly documented\
        \ to avoid unexpected failures.  \n- Consider logging or reporting missing items even when ignoring them.  \n## DEPENDENCY\
        \ CHAIN:  \n- Often used in conjunction with resource identifiers or references.  \n- May impact validation and error\
        \ reporting modules.  \n## TECHNICAL DETAILS:  \n- Typically a boolean flag.  \n- Influences control flow and exception\
        \ handling mechanisms.  \n- Should be clearly defined in API contracts to manage client expectations."
    idLockTemplate:
      type: string
      description: |-
        The unique identifier for the lock template used to define the configuration and behavior of a lock within the system. This ID links the lock instance to a predefined template that specifies its properties, access rules, and operational parameters.

        ## FIELD BEHAVIOR:
        - Uniquely identifies a lock template within the system.
        - Used to associate a lock instance with its configuration template.
        - Typically immutable once assigned to ensure consistent behavior.

        ## IMPLEMENTATION GUIDANCE:
        - Must be a valid identifier corresponding to an existing lock template.
        - Should be validated against the list of available templates before assignment.
        - Ensure uniqueness to prevent conflicts between different lock configurations.

        ## EXAMPLES:
        - "template-12345"
        - "lockTemplateA1B2C3"
        - "LT-987654321"

        ## IMPORTANT NOTES:
        - Changing the template ID after lock creation may lead to inconsistent lock behavior.
        - The template defines critical lock parameters; ensure the correct template is referenced.
        - This field is essential for lock provisioning and management workflows.

        ## DEPENDENCY CHAIN:
        - Depends on the existence of predefined lock templates in the system.
        - Used by lock management and access control modules to apply configurations.

        ## TECHNICAL DETAILS:
        - Typically represented as a string or UUID.
        - Should conform to the system’s identifier format standards.
        - Indexed for efficient lookup and retrieval in the database.
    dataURITemplate:
      type: string
      description: |-
        A template string used to construct data URIs dynamically by embedding variable placeholders that are replaced with actual values at runtime. This template facilitates the generation of standardized data URIs for accessing or referencing resources within the system.

        ## FIELD BEHAVIOR:
        - Accepts a string containing placeholders for variables.
        - Placeholders are replaced with corresponding runtime values to form a complete data URI.
        - Enables dynamic and flexible URI generation based on context or input parameters.
        - Supports standard URI encoding where necessary to ensure valid URI formation.

        ## IMPLEMENTATION GUIDANCE:
        - Define clear syntax for variable placeholders within the template (e.g., using curly braces or another delimiter).
        - Ensure that all required variables are provided at runtime to avoid incomplete URIs.
        - Validate the final constructed URI to confirm it adheres to URI standards.
        - Consider supporting optional variables with default values to increase template flexibility.

        ## EXAMPLES:
        - "data:text/plain;base64,{base64EncodedData}"
        - "data:{mimeType};charset={charset},{data}"
        - "data:image/{imageFormat};base64,{encodedImageData}"

        ## IMPORTANT NOTES:
        - The template must produce a valid data URI after variable substitution.
        - Proper encoding of variable values is critical to prevent malformed URIs.
        - This property is essential for scenarios requiring inline resource embedding or data transmission via URIs.
        - Misconfiguration or missing variables can lead to invalid or unusable URIs.

        ## DEPENDENCY CHAIN:
        - Relies on the availability of runtime variables corresponding to placeholders.
        - May depend on encoding utilities to prepare variable values.
        - Often used in conjunction with data processing or resource generation components.

        ## TECHNICAL DETAILS:
        - Typically a UTF-8 encoded string.
        - Supports standard URI schemes and encoding rules.
        - Variable placeholders should be clearly defined and consistently parsed.
        - May integrate with templating engines or string interpolation mechanisms.
    oneToMany:
      $ref: '../../../common/schemas/one-to-many.yml#/OneToMany'
    pathToMany:
      $ref: '../../../common/schemas/path-to-many.yml#/PathToMany'
    blobKeyPath:
      type: string
      description: |-
        Specifies the file system path to the blob key, which uniquely identifies the binary large object (blob) within the storage system. This path is used to locate and access the blob data efficiently during processing or retrieval operations.
        ## FIELD BEHAVIOR:
        - Represents a string path pointing to the location of the blob key.
        - Used as a reference to access the associated blob data.
        - Typically immutable once set to ensure consistent access.
        - May be required for operations involving blob retrieval or manipulation.
        ## IMPLEMENTATION GUIDANCE:
        - Ensure the path is valid and correctly formatted according to the storage system's conventions.
        - Validate the existence of the blob key at the specified path before processing.
        - Handle cases where the path may be null or empty gracefully.
        - Secure the path to prevent unauthorized access to blob data.
        ## EXAMPLES:
        - "/data/blobs/abc123def456"
        - "blobstore/keys/2024/06/blobkey789"
        - "s3://bucket-name/blob-keys/key123"
        ## IMPORTANT NOTES:
        - The blobKeyPath must correspond to an existing blob key in the storage backend.
        - Incorrect or malformed paths can lead to failures in blob retrieval.
        - Access permissions to the path must be properly configured.
        - The format of the path may vary depending on the underlying storage technology.
        ## DEPENDENCY CHAIN:
        - Dependent on the storage system's directory or key structure.
        - Used by blob retrieval and processing components.
        - May be linked to metadata describing the blob.
        ## TECHNICAL DETAILS:
        - Typically represented as a UTF-8 encoded string.
        - May include hierarchical directory structures or URI schemes.
        - Should be sanitized to prevent injection or path traversal vulnerabilities.
        - Often used as a lookup key in blob storage APIs or databases.
    blob:
      type: boolean
      description: |-
        The binary large object (blob) representing the raw data content to be processed, stored, or transmitted. This field typically contains encoded or serialized data such as images, files, or other multimedia content in a compact binary format.

        ## FIELD BEHAVIOR:
        - Holds the actual binary data payload.
        - Can represent various data types including images, documents, or other file formats.
        - May be encoded in formats like Base64 for safe transmission over text-based protocols.
        - Treated as opaque data by the API, with no interpretation unless specified.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure the blob data is properly encoded (e.g., Base64) if the transport medium requires text-safe encoding.
        - Validate the size and format of the blob to meet API constraints.
        - Handle decoding and encoding consistently on both client and server sides.
        - Use streaming or chunking for very large blobs to optimize performance.

        ## EXAMPLES:
        - A Base64-encoded JPEG image file.
        - A serialized JSON object converted into a binary format.
        - A PDF document encoded as a binary blob.
        - An audio file represented as a binary stream.

        ## IMPORTANT NOTES:
        - The blob content is typically opaque and should not be altered during transmission.
        - Size limits may apply depending on API or transport constraints.
        - Proper encoding and decoding are critical to avoid data corruption.
        - Security considerations should be taken into account when handling binary data.

        ## DEPENDENCY CHAIN:
        - May depend on encoding schemes (e.g., Base64) for safe transmission.
        - Often used in conjunction with metadata fields describing the blob type or format.
        - Requires appropriate content-type headers or descriptors for correct interpretation.

        ## TECHNICAL DETAILS:
        - Usually represented as a byte array or Base64-encoded string in JSON APIs.
        - May require MIME type specification to indicate the nature of the data.
        - Handling may involve buffer management and memory considerations.
        - Supports binary-safe transport mechanisms to preserve data integrity.
    assistant:
      type: string
      description: |-
        Specifies the configuration and behavior settings for the AI assistant that will interact with the user. This property defines how the assistant responds, including its personality, knowledge scope, response style, and any special instructions or constraints that guide its operation.

        ## FIELD BEHAVIOR:
        - Determines the assistant's tone, style, and manner of communication.
        - Controls the knowledge base or data sources the assistant can access.
        - Enables customization of the assistant's capabilities and limitations.
        - May include parameters for language, verbosity, and response format.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure the assistant configuration aligns with the intended user experience.
        - Validate that all required sub-properties within the assistant configuration are correctly set.
        - Support dynamic updates to the assistant settings to adapt to different contexts or user needs.
        - Provide defaults for unspecified settings to maintain consistent behavior.

        ## EXAMPLES:
        - Setting the assistant to a formal tone with technical expertise.
        - Configuring the assistant to provide concise answers with references.
        - Defining the assistant to operate within a specific domain, such as healthcare or finance.
        - Enabling multi-language support for the assistant responses.

        ## IMPORTANT NOTES:
        - Changes to the assistant property can significantly affect user interaction quality.
        - Properly securing and validating assistant configurations is critical to prevent misuse.
        - The assistant's behavior should comply with ethical guidelines and privacy regulations.
        - Overly restrictive settings may limit the assistant's usefulness, while too broad settings may reduce relevance.

        ## DEPENDENCY CHAIN:
        - May depend on user preferences or session context.
        - Interacts with the underlying AI model and its capabilities.
        - Influences downstream processing of user inputs and outputs.
        - Can be linked to external knowledge bases or APIs for enhanced responses.

        ## TECHNICAL DETAILS:
        - Typically structured as an object containing multiple nested properties.
        - May include fields such as personality traits, knowledge cutoff dates, and response constraints.
        - Supports serialization and deserialization for API communication.
        - Requires compatibility with the AI platform's configuration schema.
    deleteAfterImport:
      type: boolean
      description: |-
        Indicates whether the source file should be deleted automatically after the import process completes successfully. This boolean flag helps manage storage by removing files that are no longer needed once their data has been ingested.

        ## FIELD BEHAVIOR:
        - When set to true, the system deletes the source file immediately after a successful import.
        - When set to false or omitted, the source file remains intact after import.
        - Deletion only occurs if the import process completes without errors.

        ## IMPLEMENTATION GUIDANCE:
        - Validate that the import was successful before deleting the file.
        - Ensure proper permissions are in place to delete the file.
        - Consider logging deletion actions for audit purposes.
        - Provide clear user documentation about the implications of enabling this flag.

        ## EXAMPLES:
        - true: The file "data.csv" will be removed after import.
        - false: The file "data.csv" will remain after import for manual review or backup.

        ## IMPORTANT NOTES:
        - Enabling this flag may result in data loss if the file is needed for re-import or troubleshooting.
        - Use with caution in environments where file retention policies are strict.
        - This flag does not affect files that fail to import.

        ## DEPENDENCY CHAIN:
        - Depends on the successful completion of the import operation.
        - May interact with file system permissions and cleanup routines.

        ## TECHNICAL DETAILS:
        - Typically implemented as a boolean data type.
        - Triggers a file deletion API or system call post-import.
        - Should handle exceptions gracefully to avoid orphaned files or unintended deletions.
    assistantMetadata:
      type: object
      description: |-
        Metadata containing additional information about the assistant, such as configuration details, versioning, capabilities, and any custom attributes that help in managing or identifying the assistant's behavior and context. This metadata supports enhanced control, monitoring, and customization of the assistant's interactions.

        ## FIELD BEHAVIOR:
        - Holds supplementary data that describes or configures the assistant.
        - Can include static or dynamic information relevant to the assistant's operation.
        - Used to influence or inform the assistant's responses and functionality.
        - May be updated or extended to reflect changes in the assistant's capabilities or environment.

        ## IMPLEMENTATION GUIDANCE:
        - Structure metadata in a clear, consistent format (e.g., key-value pairs).
        - Ensure sensitive information is not exposed through metadata.
        - Use metadata to enable feature toggles, version tracking, or context awareness.
        - Validate metadata content to maintain integrity and compatibility.

        ## EXAMPLES:
        - Version number of the assistant (e.g., "v1.2.3").
        - Supported languages or locales.
        - Enabled features or modules.
        - Custom tags indicating the assistant's domain or purpose.

        ## IMPORTANT NOTES:
        - Metadata should not contain user-specific or sensitive personal data.
        - Keep metadata concise to avoid performance overhead.
        - Changes in metadata may affect assistant behavior; manage updates carefully.
        - Metadata is primarily for internal use and may not be exposed to end users.

        ## DEPENDENCY CHAIN:
        - May depend on assistant configuration settings.
        - Can influence or be referenced by response generation logic.
        - Interacts with monitoring and analytics systems for tracking.

        ## TECHNICAL DETAILS:
        - Typically represented as a JSON object or similar structured data.
        - Should be easily extensible to accommodate future attributes.
        - Must be compatible with the overall assistant API schema.
        - Should support serialization and deserialization without data loss.
    useTechAdaptorForm:
      type: boolean
      description: |-
        Indicates whether the technical adaptor form should be utilized in the current process or workflow. This boolean flag determines if the system should enable and display the technical adaptor form interface for user interaction or automated processing.

        ## FIELD BEHAVIOR:
        - When set to true, the technical adaptor form is activated and presented to the user or system.
        - When set to false, the technical adaptor form is bypassed or hidden.
        - Influences the flow of data input and validation related to technical adaptor configurations.

        ## IMPLEMENTATION GUIDANCE:
        - Default to false if the technical adaptor form is optional or not always required.
        - Ensure that enabling this flag triggers all necessary UI components and backend processes related to the technical adaptor form.
        - Validate that dependent fields or modules respond appropriately when this flag changes state.

        ## EXAMPLES:
        - true: The system displays the technical adaptor form for configuration.
        - false: The system skips the technical adaptor form and proceeds without it.

        ## IMPORTANT NOTES:
        - Changing this flag may affect downstream processing and data integrity.
        - Must be synchronized with user permissions and feature availability.
        - Should be clearly documented in user guides if exposed in UI settings.

        ## DEPENDENCY CHAIN:
        - May depend on user roles or feature toggles enabling technical adaptor functionality.
        - Could influence or be influenced by other configuration flags related to adaptor workflows.

        ## TECHNICAL DETAILS:
        - Typically implemented as a boolean data type.
        - Used in conditional logic to control UI rendering and backend processing paths.
        - May trigger event listeners or hooks when its value changes.
    distributedAdaptorData:
      type: object
      description: |-
        Contains configuration and operational data specific to distributed adaptors used within the system. This data includes parameters, status information, and metadata necessary for managing and monitoring distributed adaptor instances across different nodes or environments. It facilitates synchronization, performance tuning, and error handling for adaptors operating in a distributed architecture.

        ## FIELD BEHAVIOR:
        - Holds detailed information about each distributed adaptor instance.
        - Supports dynamic updates to reflect real-time adaptor status and configuration changes.
        - Enables centralized management and monitoring of distributed adaptors.
        - May include nested structures representing various adaptor attributes and metrics.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure data consistency and integrity when updating distributedAdaptorData.
        - Use appropriate serialization formats to handle complex nested data.
        - Implement validation to verify the correctness of adaptor configuration parameters.
        - Design for scalability to accommodate varying numbers of distributed adaptors.

        ## EXAMPLES:
        - Configuration settings for a distributed database adaptor including connection strings and timeout values.
        - Status reports indicating the health and performance metrics of adaptors deployed across multiple servers.
        - Metadata describing adaptor version, deployment environment, and last synchronization timestamp.

        ## IMPORTANT NOTES:
        - This property is critical for systems relying on distributed adaptors to function correctly.
        - Changes to this data should be carefully managed to avoid disrupting adaptor operations.
        - Sensitive information within adaptor data should be secured and access-controlled.

        ## DEPENDENCY CHAIN:
        - Dependent on the overall system configuration and deployment topology.
        - Interacts with monitoring and management modules that consume adaptor data.
        - May influence load balancing and failover mechanisms within the distributed system.

        ## TECHNICAL DETAILS:
        - Typically represented as a complex object or map with key-value pairs.
        - May include arrays or lists to represent multiple adaptor instances.
        - Requires efficient parsing and serialization to minimize performance overhead.
        - Should support versioning to handle changes in adaptor data schema over time.
    filter:
      allOf:
        - description: |
            Filter configuration for selectively processing records during import operations.
            
            ## IMPORT-SPECIFIC BEHAVIOR
            
            **Pre-Import Filtering**: Filters are applied to incoming records before they are sent to the destination system. Records that don't match the filter criteria are silently dropped and not imported.
            
            ## AVAILABLE FILTER FIELDS
            
            The fields available for filtering are the data fields from each record being imported.
        - $ref: '../../../common/schemas/filter.yml#/Filter'
    traceKeyTemplate:
      type: string
      description: |-
        A template string used to generate unique trace keys for tracking and correlating requests across distributed systems. This template supports placeholders that can be dynamically replaced with runtime values such as timestamps, unique identifiers, or contextual metadata to create meaningful and consistent trace keys.

        ## FIELD BEHAVIOR:
        - Defines the format and structure of trace keys used in logging and monitoring.
        - Supports dynamic insertion of variables or placeholders to customize trace keys per request.
        - Ensures trace keys are unique and consistent for effective traceability.
        - Can be used to correlate logs, metrics, and traces across different services.

        ## IMPLEMENTATION GUIDANCE:
        - Use clear and descriptive placeholders that map to relevant runtime data (e.g., {timestamp}, {requestId}).
        - Ensure the template produces trace keys that are unique enough to avoid collisions.
        - Validate the template syntax before applying it to avoid runtime errors.
        - Consider including service names or environment identifiers for multi-service deployments.
        - Keep the template concise to avoid excessively long trace keys.

        ## EXAMPLES:
        - "trace-{timestamp}-{requestId}"
        - "{serviceName}-{env}-{uniqueId}"
        - "traceKey-{userId}-{sessionId}-{epochMillis}"

        ## IMPORTANT NOTES:
        - The template must be compatible with the tracing and logging infrastructure in use.
        - Placeholders should be well-defined and documented to ensure consistent usage.
        - Improper templates may lead to trace key collisions or loss of traceability.
        - Avoid sensitive information in trace keys to maintain security and privacy.

        ## DEPENDENCY CHAIN:
        - Relies on runtime context or metadata to replace placeholders.
        - Integrates with logging, monitoring, and tracing systems that consume trace keys.
        - May depend on unique identifier generators or timestamp providers.

        ## TECHNICAL DETAILS:
        - Typically implemented as a string with placeholder syntax (e.g., curly braces).
        - Requires a parser or formatter to replace placeholders with actual values at runtime.
        - Should support extensibility to add new placeholders as needed.
        - May need to conform to character restrictions imposed by downstream systems.
    mockResponse:
      type: object
      description: |-
        Defines a predefined response that the system will return when the associated API endpoint is invoked, allowing for simulation of real API behavior without requiring actual backend processing. This is particularly useful for testing, development, and demonstration purposes where consistent and controlled responses are needed.

        ## FIELD BEHAVIOR:
        - Returns the specified mock data instead of executing the real API logic.
        - Can simulate various response scenarios including success, error, and edge cases.
        - Overrides the default response when enabled.
        - Supports static or dynamic content depending on implementation.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure the mock response format matches the expected API response schema.
        - Use realistic data to closely mimic actual API behavior.
        - Update mock responses regularly to reflect changes in the real API.
        - Consider including headers, status codes, and body content in the mock response.
        - Provide clear documentation on when and how the mock response is used.

        ## EXAMPLES:
        - Returning a fixed JSON object representing a user profile.
        - Simulating a 404 error response with an error message.
        - Providing a list of items with pagination metadata.
        - Mocking a successful transaction confirmation message.

        ## IMPORTANT NOTES:
        - Mock responses should not be used in production environments unless explicitly intended.
        - They are primarily for development, testing, and demonstration.
        - Overuse of mock responses can mask issues in the real API implementation.
        - Ensure that consumers of the API are aware when mock responses are active.

        ## DEPENDENCY CHAIN:
        - Dependent on the API endpoint configuration.
        - May interact with request parameters to determine the appropriate mock response.
        - Can be linked with feature flags or environment settings to toggle mock behavior.

        ## TECHNICAL DETAILS:
        - Typically implemented as static JSON or XML payloads.
        - May include HTTP status codes and headers.
        - Can be integrated with API gateways or mocking tools.
        - Supports conditional logic in advanced implementations to vary responses.
    _ediProfileId:
      type: string
      format: objectId
      description: |-
        The unique identifier for the Electronic Data Interchange (EDI) profile associated with the transaction or entity. This ID links the current data to a specific EDI configuration that defines the format, protocols, and trading partner details used for electronic communication.

        ## FIELD BEHAVIOR:
        - Uniquely identifies an EDI profile within the system.
        - Used to retrieve or reference EDI settings and parameters.
        - Must be consistent and valid to ensure proper EDI processing.
        - Typically immutable once assigned to maintain data integrity.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure the ID corresponds to an existing and active EDI profile in the system.
        - Validate the format and existence of the ID before processing transactions.
        - Use this ID to fetch EDI-specific rules, mappings, and partner information.
        - Secure the ID to prevent unauthorized changes or misuse.

        ## EXAMPLES:
        - "EDI12345"
        - "PROF-67890"
        - "X12_PROFILE_001"

        ## IMPORTANT NOTES:
        - This ID is critical for routing and formatting EDI messages correctly.
        - Incorrect or missing IDs can lead to failed or misrouted EDI transmissions.
        - The ID should be managed centrally to avoid duplication or conflicts.

        ## DEPENDENCY CHAIN:
        - Depends on the existence of predefined EDI profiles in the system.
        - Used by EDI processing modules to apply correct communication standards.
        - May be linked to trading partner configurations and document types.

        ## TECHNICAL DETAILS:
        - Typically a string or alphanumeric value.
        - Stored in a database with indexing for quick lookup.
        - May follow a naming convention defined by the organization or EDI standards.
        - Used as a foreign key in relational data models involving EDI transactions.
    parsers:
      type: string
      enum:
      - '1'
      nullable: true
      description: |-
        A collection of parser configurations that define how input data should be interpreted and processed. Each parser specifies rules, patterns, or formats to extract meaningful information from raw data sources, enabling the system to handle diverse data types and structures effectively. This property allows customization and extension of parsing capabilities to accommodate various input formats.

        ## FIELD BEHAVIOR:
        - Accepts multiple parser definitions as an array or list.
        - Each parser operates independently to process specific data formats.
        - Parsers are applied in the order they are defined unless otherwise specified.
        - Supports enabling or disabling individual parsers dynamically.
        - Can include built-in or custom parser implementations.

        ## IMPLEMENTATION GUIDANCE:
        - Ensure parsers are well-defined with clear matching criteria and extraction rules.
        - Validate parser configurations to prevent conflicts or overlaps.
        - Provide mechanisms to add, update, or remove parsers without downtime.
        - Support extensibility to integrate new parsing logic as needed.
        - Document each parser’s purpose and expected input/output formats.

        ## EXAMPLES:
        - A JSON parser that extracts fields from JSON-formatted input.
        - A CSV parser that splits input lines into columns based on delimiters.
        - A regex-based parser that identifies patterns within unstructured text.
        - An XML parser that navigates hierarchical data structures.
        - A custom parser designed to interpret proprietary log file formats.

        ## IMPORTANT NOTES:
        - Incorrect parser configurations can lead to data misinterpretation or processing errors.
        - Parsers should be optimized for performance to handle large volumes of data efficiently.
        - Consider security implications when parsing untrusted input to avoid injection attacks.
        - Testing parsers with representative sample data is crucial for reliability.
        - Parsers may depend on external libraries or modules; ensure compatibility.

        ## DEPENDENCY CHAIN:
        - Relies on input data being available and accessible.
        - May depend on schema definitions or data contracts for accurate parsing.
        - Interacts with downstream components that consume parsed output.
        - Can be influenced by global settings such as character encoding or locale.
        - May require synchronization with data validation and transformation steps.

        ## TECHNICAL DETAILS:
        - Typically implemented as modular components or plugins.
        - Configurations may include pattern definitions, field mappings, and error handling rules.
        - Supports various data formats including text, binary, and structured documents.
        - May expose APIs or interfaces for runtime configuration and monitoring.
        - Often integrated with logging and debugging tools to trace parsing operations.
    hooks:
      type: object
      properties:
        preMap:
          type: object
          properties:
            function:
              type: string
              description: |-
                Specifies the function to be executed during the pre-mapping hook phase. This function allows for custom logic to be applied before the main mapping process begins, enabling data transformation, validation, or any preparatory steps required. It should be defined in a way that it can be invoked with the appropriate context and input data.

                ## FIELD BEHAVIOR:
                - Executed before the mapping process starts.
                - Receives input data and context for processing.
                - Can modify or validate data prior to mapping.
                - Should return the processed data or relevant output for the next stage.

                ## IMPLEMENTATION GUIDANCE:
                - Define the function with clear input parameters and expected output.
                - Ensure the function handles errors gracefully to avoid interrupting the mapping flow.
                - Keep the function focused on pre-mapping concerns only.
                - Test the function independently to verify its behavior before integration.

                ## EXAMPLES:
                - A function that normalizes input data formats.
                - A function that filters out invalid entries.
                - A function that enriches data with additional attributes.
                - A function that logs input data for auditing purposes.

                ## IMPORTANT NOTES:
                - The function must be synchronous or properly handle asynchronous operations.
                - Avoid side effects that could impact other parts of the mapping process.
                - Ensure compatibility with the overall data pipeline and mapping framework.
                - Document the function’s purpose and usage clearly for maintainability.

                ## DEPENDENCY CHAIN:
                - Invoked after the preMap hook is triggered.
                - Outputs data consumed by the subsequent mapping logic.
                - May depend on external utilities or services for data processing.

                ## TECHNICAL DETAILS:
                - Typically implemented as a JavaScript or TypeScript function.
                - Receives parameters such as input data object and context metadata.
                - Returns a transformed data object or a promise resolving to it.
                - Integrated into the mapping engine’s hook system for execution timing.
            _scriptId:
              type: string
              format: objectId
              x-celigo-refModel: scripts
              description: |-
                The unique identifier for the script to be executed during the pre-mapping hook phase. This ID is used to reference and invoke the specific script that performs custom logic or transformations before the main mapping process begins.
                ## FIELD BEHAVIOR:
                - Specifies which script is triggered before the mapping operation.
                - Must correspond to a valid and existing script within the system.
                - Determines the custom pre-processing logic applied to data.
                ## IMPLEMENTATION GUIDANCE:
                - Ensure the script ID is correctly registered and accessible in the environment.
                - Validate the script's compatibility with the preMap hook context.
                - Use consistent naming conventions for script IDs to avoid conflicts.
                ## EXAMPLES:
                - "script12345"
                - "preMapTransform_v2"
                - "hookScript_001"
                ## IMPORTANT NOTES:
                - An invalid or missing script ID will result in the preMap hook being skipped or causing an error.
                - The script associated with this ID should be optimized for performance to avoid delays.
                - Permissions must be set appropriately to allow execution of the referenced script.
                ## DEPENDENCY CHAIN:
                - Depends on the existence of the script repository or script management system.
                - Linked to the preMap hook lifecycle event in the mapping process.
                - May interact with input data and influence subsequent mapping steps.
                ## TECHNICAL DETAILS:
                - Typically represented as a string identifier.
                - Used internally by the system to locate and execute the script.
                - May be stored in a database or configuration file referencing available scripts.
            _stackId:
              type: string
              format: objectId
              x-celigo-refModel: stacks
              description: "The unique identifier for the stack associated with the current operation or context. This ID\
                \ is used to reference and manage the specific stack within the system, ensuring that all related resources\
                \ and actions are correctly linked.  \n## FIELD BEHAVIOR:  \n- Uniquely identifies a stack instance within\
                \ the environment.  \n- Used internally to track and manage stack-related operations.  \n- Typically immutable\
                \ once assigned for a given stack lifecycle.  \n## IMPLEMENTATION GUIDANCE:  \n- Should be generated or assigned\
                \ by the system managing the stacks.  \n- Must be validated to ensure uniqueness within the scope of the application.\
                \  \n- Should be securely stored and transmitted to prevent unauthorized access or manipulation.  \n## EXAMPLES:\
                \  \n- \"stack-12345abcde\"  \n- \"arn:aws:cloudformation:us-east-1:123456789012:stack/my-stack/50d6f0a0-1234-11e8-9a8b-0a1234567890\"\
                \  \n- \"projX-envY-stackZ\"  \n## IMPORTANT NOTES:  \n- This ID is critical for correlating resources and\
                \ operations to the correct stack.  \n- Changing the stack ID after creation can lead to inconsistencies and\
                \ errors.  \n- Should not be confused with other identifiers like resource IDs or deployment IDs.  \n## DEPENDENCY\
                \ CHAIN:  \n- Depends on the stack creation or registration process to obtain the ID.  \n- Used by hooks,\
                \ deployment scripts, and resource managers to reference the stack.  \n## TECHNICAL DETAILS:  \n- Typically\
                \ a string value, possibly following a specific format or pattern.  \n- May include alphanumeric characters,\
                \ dashes, and colons depending on the system.  \n- Often used as a key in databases or APIs to retrieve stack\
                \ information."
            configuration:
              type: object
              description: |-
                Configuration settings that define the behavior and parameters for the preMap hook, allowing customization of its execution prior to the mapping process. This property enables users to specify options such as input validation rules, transformation parameters, or conditional logic that tailor the hook's operation to specific requirements.

                ## FIELD BEHAVIOR:
                - Accepts a structured object containing key-value pairs relevant to the preMap hook.
                - Influences how the preMap hook processes data before mapping occurs.
                - Can enable or disable specific features or validations within the hook.
                - Supports dynamic adjustment of hook behavior based on provided settings.

                ## IMPLEMENTATION GUIDANCE:
                - Validate the configuration object against the expected schema to ensure correctness.
                - Provide default values for optional settings to maintain consistent behavior.
                - Document all configurable options clearly for users to understand their impact.
                - Allow extensibility to accommodate future configuration parameters without breaking compatibility.

                ## EXAMPLES:
                - Setting a flag to enable strict input validation before mapping.
                - Specifying a list of fields to exclude from the mapping process.
                - Defining transformation rules such as trimming whitespace or converting case.
                - Providing conditional logic parameters to skip mapping under certain conditions.

                ## IMPORTANT NOTES:
                - Incorrect configuration values may cause the preMap hook to fail or behave unexpectedly.
                - Configuration should be tested thoroughly to ensure it aligns with the intended data processing flow.
                - Changes to configuration may affect downstream processes relying on the mapped data.
                - Sensitive information should not be included in the configuration to avoid security risks.

                ## DEPENDENCY CHAIN:
                - Depends on the preMap hook being enabled and invoked during the processing pipeline.
                - Influences the input data that will be passed to subsequent mapping stages.
                - May interact with other hook configurations or global settings affecting data transformation.

                ## TECHNICAL DETAILS:
                - Typically represented as a JSON object or equivalent data structure.
                - Parsed and applied at runtime before the mapping logic executes.
                - Supports nested configuration properties for complex customization.
                - Should be immutable during the execution of the preMap hook to ensure consistency.
          description: |-
            A hook function that is executed before the mapping process begins. This function allows for custom preprocessing or transformation of data prior to the main mapping logic being applied. It is typically used to modify input data, validate conditions, or set up necessary context for the mapping operation.

            ## FIELD BEHAVIOR:
            - Invoked once before the mapping starts.
            - Receives the raw input data or context.
            - Can modify or replace the input data before mapping.
            - Can abort or alter the flow based on custom logic.

            ## IMPLEMENTATION GUIDANCE:
            - Implement as a synchronous or asynchronous function depending on the environment.
            - Ensure it returns the modified data or context for the mapping to proceed.
            - Handle errors gracefully to avoid disrupting the mapping process.
            - Use for data normalization, enrichment, or validation before mapping.

            ## EXAMPLES:
            - Sanitizing input strings to remove unwanted characters.
            - Adding default values to missing fields.
            - Logging or auditing input data before transformation.
            - Validating input schema and throwing errors if invalid.

            ## IMPORTANT NOTES:
            - This hook is optional; if not provided, mapping proceeds with original input.
