AiAgent:
  type: object
  description: |
    AI Agent configuration used by both AiAgentImport and GuardrailImport (ai_agent type).

    Configures which AI provider and model to use, along with instructions, parameter
    tuning, output format, and available tools. Two providers are supported:

    - **openai**: OpenAI models (GPT-4, GPT-4o, GPT-4o-mini, GPT-5, etc.)
    - **gemini**: Google Gemini models via LiteLLM proxy

    A `_connectionId` is optional (BYOK). If not provided on the parent import,
    platform-managed credentials are used.
  properties:
    provider:
      type: string
      enum: ["openai", "gemini"]
      default: "openai"
      description: |
        AI provider to use.

        - **openai**: Uses OpenAI Responses API. Configure via the `openai` object.
        - **gemini**: Uses Google Gemini via LiteLLM. Configure via `litellm` with
          Gemini-specific overrides in `litellm._overrides.gemini`.
    openai:
      type: object
      description: |
        OpenAI-specific configuration. Used when `provider` is "openai".
      properties:
        instructions:
          type: string
          maxLength: 51200
          description: |
            System prompt that defines the AI agent's behavior, goals, and constraints.
            Maximum 50 KB.
          examples: ["You are a data validation agent. Check each record for completeness."]
        model:
          type: string
          description: |
            OpenAI model identifier.
          examples: ["gpt-5-pro", "gpt-5-mini", "gpt-5-nano", "gpt-5", "gpt-4.1-nano", "gpt-4.1-mini", "gpt-4.1"]
        reasoning:
          type: object
          description: |
            Controls depth of reasoning for complex tasks.
          properties:
            effort:
              type: string
              enum: ["minimal", "low", "medium", "high"]
              description: How much reasoning effort the model should invest
            summary:
              type: string
              enum: ["concise", "auto", "detailed"]
              description: Level of detail in reasoning summaries
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: |
            Sampling temperature. Higher values (e.g. 1.5) produce more creative output,
            lower values (e.g. 0.2) produce more focused and deterministic output.
        topP:
          type: number
          minimum: 0.1
          maximum: 1
          description: Nucleus sampling parameter
        maxOutputTokens:
          type: number
          minimum: 100
          maximum: 128000
          default: 1000
          description: Maximum number of tokens in the model's response
        serviceTier:
          type: string
          enum: ["auto", "default", "priority"]
          default: "default"
          description: |
            OpenAI service tier. "priority" provides higher rate limits and
            lower latency at increased cost.
        output:
          type: object
          description: Output format configuration
          properties:
            format:
              type: object
              description: |
                Controls the structure of the model's output.
              properties:
                type:
                  type: string
                  enum: ["text", "json_schema", "blob"]
                  default: "text"
                  description: |
                    Output format type.

                    - **text**: Free-form text response
                    - **json_schema**: Structured JSON conforming to a schema
                    - **blob**: Binary data output
                name:
                  type: string
                  description: Name for the output format (used with json_schema)
                strict:
                  type: boolean
                  default: false
                  description: Whether to enforce strict schema validation on output
                jsonSchema:
                  type: object
                  description: |
                    JSON Schema for structured output. Required when `format.type` is "json_schema".
                  properties:
                    type:
                      type: string
                      enum: ["object", "array", "string", "number", "integer", "boolean"]
                    properties:
                      type: object
                      additionalProperties: true
                    required:
                      type: array
                      items:
                        type: string
                    additionalproperties:
                      type: boolean
            verbose:
              type: string
              enum: ["low", "medium", "high"]
              default: "medium"
              description: Level of detail in the model's response
        tools:
          type: array
          description: |
            Tools available to the AI agent during processing.
          items:
            type: object
            properties:
              type:
                type: string
                enum: ["web_search", "mcp", "image_generation", "tool"]
                description: |
                  Type of tool.

                  - **web_search**: Search the web for information
                  - **mcp**: Connect to an MCP server for additional tools
                  - **image_generation**: Generate images
                  - **tool**: Reference a Celigo Tool resource
              webSearch:
                type: object
                description: Web search configuration (empty object to enable)
              imageGeneration:
                type: object
                description: Image generation configuration
                properties:
                  background:
                    type: string
                    enum: ["transparent", "opaque"]
                  quality:
                    type: string
                    enum: ["low", "medium", "high"]
                  size:
                    type: string
                    enum: ["1024x1024", "1024x1536", "1536x1024"]
                  outputFormat:
                    type: string
                    enum: ["png", "webp", "jpeg"]
              mcp:
                type: object
                description: MCP server tool configuration
                properties:
                  _mcpConnectionId:
                    type: string
                    format: objectId
                    x-celigo-refModel: connections
                    description: Connection to the MCP server
                  allowedTools:
                    type: array
                    description: Specific tools to allow from the MCP server (all if omitted)
                    items:
                      type: string
              tool:
                type: object
                description: |
                  Reference to a Celigo Tool resource.
                properties:
                  _toolId:
                    type: string
                    format: objectId
                    x-celigo-refModel: tools
                    description: Reference to the Tool resource
                  overrides:
                    type: object
                    description: Per-agent overrides for the tool's internal resources
    litellm:
      type: object
      description: |
        LiteLLM proxy configuration. Used when `provider` is "gemini".

        LiteLLM provides a unified interface to multiple AI providers.
        Gemini-specific settings are in `_overrides.gemini`.
      properties:
        model:
          type: string
          description: LiteLLM model identifier
          examples: ["gemini/gemini-2.5-pro", "gemini/gemini-2.5-flash"]
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature
        maxCompletionTokens:
          type: number
          minimum: 100
          maximum: 128000
          default: 1000
          description: Maximum number of tokens in the response
        topP:
          type: number
          minimum: 0.1
          maximum: 1
          description: Nucleus sampling parameter
        seed:
          type: number
          description: Random seed for reproducible outputs
        responseFormat:
          type: object
          description: Output format configuration
          properties:
            type:
              type: string
              enum: ["text", "json_schema", "blob"]
              default: "text"
            name:
              type: string
            strict:
              type: boolean
              default: false
            jsonSchema:
              type: object
              properties:
                type:
                  type: string
                  enum: ["object", "array", "string", "number", "integer", "boolean"]
                properties:
                  type: object
                  additionalProperties: true
                required:
                  type: array
                  items:
                    type: string
                additionalProperties:
                  type: boolean
        _overrides:
          type: object
          description: Provider-specific overrides
          properties:
            gemini:
              type: object
              description: |
                Gemini-specific configuration overrides.
              properties:
                systemInstruction:
                  type: string
                  maxLength: 51200
                  description: |
                    System instruction for Gemini models. Equivalent to OpenAI's `instructions`.
                    Maximum 50 KB.
                tools:
                  type: array
                  description: Gemini-specific tools
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: ["googleSearch", "urlContext", "fileSearch", "mcp", "tool"]
                        description: |
                          Type of Gemini tool.

                          - **googleSearch**: Google Search grounding
                          - **urlContext**: URL content retrieval
                          - **fileSearch**: Search uploaded files
                          - **mcp**: Connect to an MCP server
                          - **tool**: Reference a Celigo Tool resource
                      googleSearch:
                        type: object
                        description: Google Search configuration (empty object to enable)
                      urlContext:
                        type: object
                        description: URL context configuration (empty object to enable)
                      fileSearch:
                        type: object
                        properties:
                          fileSearchStoreNames:
                            type: array
                            items:
                              type: string
                      mcp:
                        type: object
                        properties:
                          _mcpConnectionId:
                            type: string
                            format: objectId
                            x-celigo-refModel: connections
                          allowedTools:
                            type: array
                            items:
                              type: string
                      tool:
                        type: object
                        properties:
                          _toolId:
                            type: string
                            format: objectId
                            x-celigo-refModel: tools
                          overrides:
                            type: object
                responseModalities:
                  type: array
                  description: Response output modalities
                  items:
                    type: string
                    enum: ["text", "image"]
                  default: ["text"]
                topK:
                  type: number
                  description: Top-K sampling parameter for Gemini
                thinkingConfig:
                  type: object
                  description: Controls Gemini's extended thinking capabilities
                  properties:
                    includeThoughts:
                      type: boolean
                      description: Whether to include thinking steps in the response
                    thinkingBudget:
                      type: number
                      minimum: 100
                      maximum: 4000
                      description: Maximum tokens allocated for thinking
                    thinkingLevel:
                      type: string
                      enum: ["minimal", "low", "medium", "high"]
                imageConfig:
                  type: object
                  description: Gemini image generation configuration
                  properties:
                    aspectRatio:
                      type: string
                      enum: ["1:1", "2:3", "3:2", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9", "21:9"]
                    imageSize:
                      type: string
                      enum: ["1K", "2K", "4k"]
                mediaResolution:
                  type: string
                  enum: ["low", "medium", "high"]
                  description: Resolution for media inputs (images, video)
