Request:
  type: object
  description: Fields that can be sent when inviting or updating an account user
  properties:
    disabled:
        type: boolean
        description: |-
          Set to False to enable a disabled user, or True to maintain disabled
    accessLevel:
      type: string
      description: |-
        Account-level access for the user.

        **CRITICAL**: This controls account-wide access. Choose your strategy:

        - Integration-only access: omit `accessLevel` and specify integrations in `integrationAccessLevel`
        - Account-wide monitoring + selective management: set `accessLevel: monitor` and use `integrationAccessLevel`
          to grant `manage` access for specific integrations
        - Full account access: set `accessLevel: manage` or `accessLevel: administrator` and leave
          `integrationAccessLevel` undefined/empty

        Choose the value based on what the user should be able to do across the account (applies to current and future integrations unless you use integration-specific access):

        - `administrator`: full account administration (but not owner-only actions)
          - Can: edit account settings, all resources and integrations; invite/manage users; troubleshoot flow errors
          - Cannot: transfer account ownership; manage owner permissions

        - `manage`: manage integrations but not account settings/users
          - Can: edit all integrations/resources; troubleshoot flow errors
          - Cannot: view/edit account settings; invite/manage users

        - `monitor`: read/operate flows without modifying configuration
          - Can: view all integrations; run flows; troubleshoot flow errors (retry/resolve and edit retry data)
          - Cannot: modify integrations/flows/steps; enable/disable flows; view/modify account resources (e.g., connections, API tokens); view/edit account settings; invite/manage users

        If per-integration level permissions are needed, omit `accessLevel` and instead populate `integrationAccessLevel`.
      enum:
        - monitor
        - manage
        - administrator

    integrationAccessLevel:
      type: array
      description: |-
        Per-integration access levels for the user.

        Use this for granting access to specific integrations.

        - If `accessLevel` is omitted, this creates **integration-only** access.
        - If `accessLevel` is `monitor`, this grants **elevated access** (typically `manage`) for specific integrations.
        - If `accessLevel` is `manage` or `administrator`, do not set `integrationAccessLevel`.
      items:
        type: object
        properties:
          _integrationId:
            type: string
            format: 
            x-celigo-refModel: integrations
            description: Integration ID the user should have access to.
          accessLevel:
            type: string
            description: Access level for this integration.
            enum: [monitor, manage]

    accountSSORequired:
      type: boolean
      description: Whether SSO is required for this user in this account.

    accountMFARequired:
      type: boolean
      description: Whether MFA is required for this user in this account.

    allowAccessToAPIM:
      type: boolean
      description: Whether the user is allowed to access API Management (APIM) features for this account.

    allowToEditRetryData:
      type: boolean
      description: |-
        Whether the user is allowed to edit retry data when troubleshooting flow run errors (Error Management).

        All users with **Monitor** access can view, retry, and resolve errant records. This flag controls whether they
        can also **edit the retry data payload**. If set to false, the user cannot edit retry data for flow runs in any
        integration workspace where they only have **Monitor** access.

        This setting only applies when:
        - `accessLevel` is `monitor`, or
        - an entry in `integrationAccessLevel` grants `monitor` access for a specific integration.
